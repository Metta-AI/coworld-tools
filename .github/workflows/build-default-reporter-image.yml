name: "Build Default Reporter Image"

# Builds and publishes the Softmax default reporter image to GHCR.
#
# - On push to main with a relevant path change, the image is built and
#   pushed to ghcr.io/metta-ai/reporters-default:latest plus an
#   immutable :main-<sha> tag.
# - On pull requests, the image is built but not pushed.
# - On workflow_dispatch, the latest commit on main is rebuilt
#   manually.
#
# This is the first reporter-image workflow in this repo and sets the
# pattern for future reporter images. The CI structure here cribs from
# metta's .github/workflows/build-coworld-runner-image.yml, simplified
# to drop the PyPI / version-resolution dance (the default reporter is
# pure source from this repo with no upstream package release to wait
# on).

on:
  pull_request:
    paths:
      - ".github/workflows/build-default-reporter-image.yml"
      - "reporters/reporters/default/**"
      - "reporters/reporters/reporter_sdk/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-default-reporter-image.yml"
      - "reporters/reporters/default/**"
      - "reporters/reporters/reporter_sdk/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: metta-ai/reporters-default

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAGS="${REPO}:pr-${{ github.event.number }}"
          else
            TAGS="${REPO}:latest,${REPO}:main-${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${REPO}:main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build context is the imported reporters package directory so the Dockerfile can COPY
          # both the shared reporter_sdk/ and the default reporter
          # source from a single context (matches reporters/default/build.sh).
          context: ./reporters/reporters
          file: ./reporters/reporters/default/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
