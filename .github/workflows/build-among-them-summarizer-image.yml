name: "Build Among Them Summarizer Image"

# Builds and publishes the among_them_summarizer image to GHCR.
#
# - On push to main with a relevant path change, the image is built and
#   pushed to ghcr.io/metta-ai/reporters-among-them-summarizer:latest
#   plus an immutable :main-<sha> tag.
# - On pull requests, the image is built but not pushed.
# - On workflow_dispatch, the latest commit on main is rebuilt manually.
#
# Pattern mirrors .github/workflows/build-default-reporter-image.yml.
# Every finished reporter in this repo gets a sibling workflow of this
# shape — see reporters/README.md §"Conventions for new reporters".

on:
  pull_request:
    paths:
      - ".github/workflows/build-among-them-summarizer-image.yml"
      - "reporters/reporters/among_them/among_them_summarizer/**"
      - "reporters/reporters/reporter_sdk/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-among-them-summarizer-image.yml"
      - "reporters/reporters/among_them/among_them_summarizer/**"
      - "reporters/reporters/reporter_sdk/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: metta-ai/reporters-among-them-summarizer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAGS="${REPO}:pr-${{ github.event.number }}"
          else
            TAGS="${REPO}:latest,${REPO}:main-${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${REPO}:main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build context is the imported reporters package directory so the Dockerfile can COPY
          # both the shared reporter_sdk/ and the reporter source from
          # a single context (matches reporters/among_them/among_them_summarizer/build.sh).
          context: ./reporters/reporters
          file: ./reporters/reporters/among_them/among_them_summarizer/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
