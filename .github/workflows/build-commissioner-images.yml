name: Build commissioner images

# This workflow must live at the REPO ROOT (.github/workflows/) to run. The commissioners project
# keeps its own copy under commissioners/.github/, which GitHub ignores (only root workflows run).
# Paths/context below are relative to the coworld-tools root, where the project lives under
# commissioners/ and its package under commissioners/commissioners/.

on:
  pull_request:
    paths:
      - ".github/workflows/build-commissioner-images.yml"
      - "commissioners/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-commissioner-images.yml"
      - "commissioners/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            commissioner_key: config_driven
            ruleset_strategy_config_name: default
            image: ghcr.io/metta-ai/commissioners-default
          - name: agricogla-commissioner
            commissioner_key: config_driven
            ruleset_strategy_config_name: agricogla
            image: ghcr.io/metta-ai/commissioners-agricogla
          - name: among-them-commissioner
            commissioner_key: config_driven
            ruleset_strategy_config_name: among_them
            image: ghcr.io/metta-ai/commissioners-among-them-commissioner
          - name: cogs-vs-clips-commissioner
            commissioner_key: config_driven
            ruleset_strategy_config_name: cogs_vs_clips
            image: ghcr.io/metta-ai/commissioners-cogs-vs-clips
          - name: four-score-commissioner
            commissioner_key: config_driven
            ruleset_strategy_config_name: four_score
            image: ghcr.io/metta-ai/commissioners-four-score
          - name: cue-n-woo-commissioner
            commissioner_key: config_driven
            ruleset_strategy_config_name: cue_n_woo
            image: ghcr.io/metta-ai/commissioners-cue-n-woo
          - name: proxywar-commissioner
            commissioner_key: config_driven
            ruleset_strategy_config_name: proxywar
            image: ghcr.io/metta-ai/commissioners-proxywar
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          CONTENT_TAG="${{ matrix.image }}:coworld-${SHORT_SHA}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tags=${{ matrix.image }}:pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${CONTENT_TAG},${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          fi
          echo "content_tag=${CONTENT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: commissioners
          file: commissioners/commissioners/Dockerfile
          build-args: |
            COMMISSIONER_KEY=${{ matrix.commissioner_key }}
            RULESET_STRATEGY_CONFIG_NAME=${{ matrix.ruleset_strategy_config_name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Output pinned image URIs
        if: github.event_name != 'pull_request'
        run: |
          echo "### ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "content tag: ${{ steps.tags.outputs.content_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "digest:      ${{ matrix.image }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
