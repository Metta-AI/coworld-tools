name: "Build Cogs vs Clips Summarizer Image"

on:
  pull_request:
    paths:
      - ".github/workflows/build-cogs-vs-clips-summarizer-image.yml"
      - "reporters/reporters/cogs_vs_clips/cogs_vs_clips_summarizer/**"
      - "reporters/reporters/reporter_sdk/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-cogs-vs-clips-summarizer-image.yml"
      - "reporters/reporters/cogs_vs_clips/cogs_vs_clips_summarizer/**"
      - "reporters/reporters/reporter_sdk/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: metta-ai/reporters-cogs-vs-clips-summarizer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAGS="${REPO}:pr-${{ github.event.number }}"
          else
            TAGS="${REPO}:latest,${REPO}:main-${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${REPO}:main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./reporters/reporters
          file: ./reporters/reporters/cogs_vs_clips/cogs_vs_clips_summarizer/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
