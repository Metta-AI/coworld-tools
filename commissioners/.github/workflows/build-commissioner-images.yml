name: Build commissioner images

on:
  pull_request:
    paths:
      - ".github/workflows/build-commissioner-images.yml"
      - "commissioners/**"
      - "pyproject.toml"
      - "README.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-commissioner-images.yml"
      - "commissioners/**"
      - "pyproject.toml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            dockerfile: commissioners/default/default_commissioner/Dockerfile
            image: ghcr.io/metta-ai/commissioners-default
          - name: among-them-commissioner
            dockerfile: commissioners/among_them/among_them_commissioner/Dockerfile
            image: ghcr.io/metta-ai/commissioners-among-them-commissioner
          - name: cogs-vs-clips-commissioner
            dockerfile: commissioners/cogs_vs_clips/cogs_vs_clips_commissioner/Dockerfile
            image: ghcr.io/metta-ai/commissioners-cogs-vs-clips

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ matrix.image }}:latest
