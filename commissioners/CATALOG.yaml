# Commissioner role catalog.
#
# Authoritative rule (Metta-AI/metta docs/specs/0045-coworld-role-repos.md):
# an implementation exists in this repo IF AND ONLY IF it has an entry here.
# Source on disk without a catalog entry is incomplete; a catalog entry
# without source is broken. Each entry's `image` and `source_url` are the
# values copied into a Coworld manifest's `commissioner[].image` and
# `commissioner[].source_url` fields.
#
# A commissioner must implement the per-round WebSocket contract
# (0.0.0.0:8080, GET /healthz, WEBSOCKET /round) described at
# https://github.com/Metta-AI/coworld/blob/main/src/coworld/docs/roles/COMMISSIONER.md
# — not a descriptor-output script.
#
# Entry schema (all required unless noted):
#   name        unique kebab-case id within this repo (e.g. default)
#   image       runtime Docker image reference (-> manifest commissioner[].image)
#   source      relative path from repo root to the implementation source
#   source_url  absolute GitHub URL for that source (-> manifest commissioner[].source_url)
#   status      one of: active | starter | experimental | archived
#   target      target game/domain (e.g. among_them, cogs_vs_clips, or * for game-agnostic)
#   owner       maintainer email or GitHub handle
#   description one-line summary
#   family      optional style/family label (e.g. round-robin, swiss, elimination)
#   since       optional first repo version the implementation appeared in

entries:
  - name: default
    image: ghcr.io/metta-ai/commissioners-default:latest
    source: commissioners/default
    source_url: https://github.com/Metta-AI/commissioners/tree/main/commissioners/default
    status: starter
    target: "*"
    owner: jmsboggs@gmail.com
    description: Reference commissioner — round-robin scheduling with optional percentile graduation.
    family: round-robin
