services:
  policy-optimizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cvc-policy-optimizer
    volumes:
      - ${POLICIES_DIR:-../../policies}:/app/policies
      - ${AWS_DIR:-~/.aws}:/root/.aws:ro
      - optimizer-data:/app/snapshots
      - optimizer-results:/app/results
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-softmax}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - POLICIES_DIR=/app/policies
      - RESULTS_FILE=/app/results/results.jsonl
      - PYTHONPATH=/app/policies
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G

volumes:
  optimizer-data:
  optimizer-results:
