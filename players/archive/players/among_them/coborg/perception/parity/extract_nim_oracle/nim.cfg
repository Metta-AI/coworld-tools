# Compile config for the parity oracle dumper.
#
# Adds the upstream Nim source tree at users/james/personal_cogs/among_them/
# to the import path so module-style imports resolve cleanly. Path is
# relative to this nim.cfg file's directory (6 levels up to repo root,
# then down to the upstream source tree).
--path:"../../../../../../users/james/personal_cogs/among_them"

# Always release-mode build: matches the upstream guided_bot test command
# (`nim c -r -d:release --threads:on --mm:orc ...`) so the perception
# kernels behave identically to how they do in the upstream test suite.
-d:release
--mm:orc
--threads:on

# Quiet down compiler output (this is a dev tool; we don't want
# routine regeneration to drown the terminal in compile hints).
--hints:off
