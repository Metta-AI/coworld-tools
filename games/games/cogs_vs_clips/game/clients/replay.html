<!doctype html>
<title>Cogs vs Clips Replay Client</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 24px; }
  pre { background: #f5f5f5; padding: 12px; width: min(960px, 100%); white-space: pre-wrap; }
</style>
<h1>Cogs vs Clips Replay</h1>
<div id="status"></div>
<pre id="replay"></pre>
<script type="module">
  const websocketUrl = new URL(window.location.href);
  websocketUrl.protocol = websocketUrl.protocol === "https:" ? "wss:" : "ws:";
  websocketUrl.pathname = websocketUrl.pathname.replace(/\/clients\/replay(\/.*)?$/, "/replay$1");

  const status = document.getElementById("status");
  const replay = document.getElementById("replay");

  const socket = new WebSocket(websocketUrl);
  socket.onopen = () => { status.textContent = "Connected"; };
  socket.onmessage = (event) => {
    const message = JSON.parse(event.data);
    if (message.type !== "replay") return;
    status.textContent = `Done after ${message.results.steps} steps`;
    replay.textContent = JSON.stringify(message, null, 2);
  };
  socket.onclose = () => { status.textContent = "Disconnected"; };
</script>
