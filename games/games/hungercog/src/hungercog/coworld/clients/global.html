<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Coworld Global</title>
<style>body{margin:0;font:14px system-ui;background:#101418;color:#e6edf3}main{height:100vh;display:grid;grid-template-rows:auto 1fr}header{padding:10px 14px;background:#1f2933;display:flex;gap:16px;align-items:center}pre{margin:0;padding:14px;overflow:auto;white-space:pre-wrap}.pill{padding:3px 8px;background:#334155;border-radius:6px}</style></head>
<body><main><header><strong id="game">Coworld</strong><span class="pill" id="status">connecting</span><span class="pill" id="step">step -</span></header><pre id="state"></pre></main>
<script>
function websocketAddress(path) {
  const params = new URLSearchParams(window.location.search);
  if (params.has("address")) {
    const direct = new URL(params.get("address"), window.location.href);
    direct.protocol = direct.protocol === "https:" ? "wss:" : "ws:";
    return direct.toString();
  }
  const url = new URL(window.location.href);
  url.protocol = url.protocol === "https:" ? "wss:" : "ws:";
  url.pathname = path;
  return url.toString();
}

const state = document.getElementById("state");
const status = document.getElementById("status");
const step = document.getElementById("step");
const game = document.getElementById("game");
const ws = new WebSocket(websocketAddress("/global"));
ws.onopen = () => status.textContent = "connected";
ws.onclose = () => status.textContent = "closed";
ws.onmessage = event => { const msg = JSON.parse(event.data); game.textContent = msg.game || "Coworld"; step.textContent = "step " + (msg.step ?? "-"); state.textContent = JSON.stringify(msg, null, 2); };
</script></body></html>
