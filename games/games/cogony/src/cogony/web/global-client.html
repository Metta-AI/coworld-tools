  [
    'id', 'agent_id', 'agent_name', 'name', 'team', 'team_id',
    'last_action', 'current_vibe', 'vibe', 'vibe_id',
  ].forEach(key => {
    if (object[key] != null && object[key] !== '') props[key] = object[key];
  });
  return Object.assign(props, globalViewerInventoryProps(object.inventory));
}

function globalViewerObjectTokens(object = {}) {
  const tags = object.tags || object.tag_tokens || [];
  const feats = object.feats || object.features || {};
  return worldObjectTokens(tags, feats);
}

function globalViewerObjectFromWall(wall = {}, index = 0) {
  const { row, col } = globalViewerObjectLocation(wall);
  if (!Number.isFinite(row) || !Number.isFinite(col)) return null;
  return {
    key: wall.id != null ? `wall:${wall.id}:${row},${col}` : worldObjectKey(row, col, 0, 0, 'wall'),
    type: 'wall',
    row,
    col,
    dr: null,
    dc: null,
    x: col,
    y: row,
    source: 'global',
    seenNow: false,
    props: globalViewerObjectProps(wall, { wall: 1, index }),
    tokens: [],
  };
}

function globalViewerObjectFromReplayObject(object = {}, index = 0) {
  const { row, col } = globalViewerObjectLocation(object);
  if (!Number.isFinite(row) || !Number.isFinite(col)) return null;
  const agentId = object.agent_id != null ? normalizeAgentId(object.agent_id) : null;
  const type = object.is_agent || object.type_name === 'agent'
    ? 'agent'
    : String(object.type_name || object.type || 'object');
  const props = globalViewerObjectProps(object, { index });
  if (agentId != null) {
    props.agent_id = agentId;
    if (agentId === selectedAgentId) props.self = 1;
  }
  return {
    key: agentId != null
      ? `agent:${agentId}`
      : (object.id != null ? `object:${object.id}` : worldObjectKey(row, col, 0, 0, type)),
    type,
    row,
    col,
    dr: null,
    dc: null,
    x: col,
    y: row,
    source: 'global',
    seenNow: true,
    props,
    tokens: globalViewerObjectTokens(object),
  };
}

function collectGlobalViewerObjects(data = {}) {
  const objects = [];
  (data.wall_objects || []).forEach((wall, index) => {
    const object = globalViewerObjectFromWall(wall, index);
    if (object) objects.push(object);
  });
  (data.objects || []).forEach((rawObject, index) => {
    const object = globalViewerObjectFromReplayObject(rawObject, index);
    if (object) objects.push(object);
  });
  return mergeWorldObjectLists(objects).sort((a, b) => {
    if (a.type === 'wall' && b.type !== 'wall') return -1;
    if (a.type !== 'wall' && b.type === 'wall') return 1;
    if (Number.isFinite(a.row) && Number.isFinite(b.row) && a.row !== b.row) return a.row - b.row;
    if (Number.isFinite(a.col) && Number.isFinite(b.col) && a.col !== b.col) return a.col - b.col;
    return String(a.type).localeCompare(String(b.type));
  });
}

const GLOBAL_WEBGPU_VERTEX_FLOATS = 9;
const GLOBAL_WEBGPU_SHADER = `
struct VertexOut {
  @builtin(position) position: vec4f,
  @location(0) uv: vec2f,
  @location(1) color: vec4f,
  @location(2) useTexture: f32,
};

@group(0) @binding(0) var spriteSampler: sampler;
@group(0) @binding(1) var spriteTexture: texture_2d<f32>;

@vertex
fn vertexMain(
  @location(0) position: vec2f,
  @location(1) uv: vec2f,
  @location(2) color: vec4f,
  @location(3) useTexture: f32,
) -> VertexOut {
  var out: VertexOut;
  out.position = vec4f(position, 0.0, 1.0);
  out.uv = uv;
  out.color = color;
  out.useTexture = useTexture;
  return out;
}

@fragment
fn fragmentMain(input: VertexOut) -> @location(0) vec4f {
  let texel = textureSample(spriteTexture, spriteSampler, input.uv);
  if (input.useTexture > 0.5 && texel.a < 0.05) {
    discard;
  }
  return input.color * (1.0 - input.useTexture) + texel * input.useTexture;
}
`;

function renderGlobalWebGpuViewer(data, el, context = {}) {
  if (!el) return;
  const objects = collectGlobalViewerObjects(data);
  if (context.state) context.state.lastWorldObjects = objects.map(object => cloneWorldObject(object));
  let mapHost = el.querySelector('.global-webgpu-viewer-host');
  let detailHost = el.querySelector('.world-object-detail');
  if (!mapHost || !detailHost) {
    el.innerHTML = '<div class="world-object-map-host global-webgpu-viewer-host">'
      + '<canvas class="global-webgpu-viewer-canvas"></canvas>'
      + '<div class="global-webgpu-placeholder" hidden></div>'
      + '</div><div class="world-object-detail"></div>';
    mapHost = el.querySelector('.global-webgpu-viewer-host');
    detailHost = el.querySelector('.world-object-detail');
  }
  renderGlobalWebGpuMap(objects, mapHost, context);
  const renderer = mapHost && mapHost.__globalWebGpuRenderer;
  if (renderer) renderer.detailHost = detailHost;
  renderWorldObjectDetails(objects, detailHost, context);
}

function globalWebGpuRendererForHost(host, context = {}) {
  if (host.__globalWebGpuRenderer) {
    host.__globalWebGpuRenderer.context = context;
    return host.__globalWebGpuRenderer;
  }
  const canvas = host.querySelector('.global-webgpu-viewer-canvas');
  const placeholder = host.querySelector('.global-webgpu-placeholder');
  const renderer = {
    host,
    canvas,
    placeholder,
    context,
    gpuContext: null,
    adapter: null,
    device: null,
    format: null,
    pipeline: null,
    sampler: null,
    whiteTexture: null,
    whiteBindGroup: null,
    textures: new Map(),
    objects: [],
    bounds: null,
    view: null,
    initPromise: null,
    drawPending: false,
    pointer: null,
  };
  canvas.addEventListener('pointerdown', event => beginGlobalWebGpuPan(event, renderer));
  canvas.addEventListener('wheel', event => handleGlobalWebGpuWheel(event, renderer), { passive: false });
  if (window.ResizeObserver) {
    renderer.resizeObserver = new ResizeObserver(() => requestGlobalWebGpuDraw(renderer));
    renderer.resizeObserver.observe(host);
  }
  host.__globalWebGpuRenderer = renderer;
  return renderer;
}

function renderGlobalWebGpuMap(objects, host, context = {}) {
  if (!host) return;
  const renderer = globalWebGpuRendererForHost(host, context);
  renderer.objects = objects.filter(object => Number.isFinite(object.x) && Number.isFinite(object.y));
  if (renderer.placeholder) {
    renderer.placeholder.hidden = renderer.objects.length > 0;
    renderer.placeholder.textContent = renderer.objects.length > 0
      ? ''
      : (navigator.gpu ? 'No global objects yet.' : 'WebGPU is not available in this browser.');
  }
  requestGlobalWebGpuDraw(renderer);
}

function requestGlobalWebGpuDraw(renderer) {
  if (!renderer || renderer.drawPending) return;
  renderer.drawPending = true;
  requestAnimationFrame(() => {
    renderer.drawPending = false;
    drawGlobalWebGpuRenderer(renderer).catch(error => {
      if (renderer.placeholder) {
        renderer.placeholder.hidden = false;
        renderer.placeholder.textContent = `WebGPU viewer unavailable: ${error.message || error}`;
      }
    });
  });
}

async function initGlobalWebGpuRenderer(renderer) {
  if (renderer.device) return renderer;
  if (renderer.initPromise) return renderer.initPromise;
  renderer.initPromise = (async () => {
    if (!navigator.gpu) throw new Error('navigator.gpu is missing');
    renderer.adapter = await navigator.gpu.requestAdapter();
    if (!renderer.adapter) throw new Error('no WebGPU adapter');
    renderer.device = await renderer.adapter.requestDevice();
    renderer.gpuContext = renderer.canvas.getContext('webgpu');
    renderer.format = navigator.gpu.getPreferredCanvasFormat();
    renderer.sampler = renderer.device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
    renderer.whiteTexture = createGlobalWebGpuSolidTexture(renderer.device, [255, 255, 255, 255]);
    renderer.pipeline = renderer.device.createRenderPipeline({
      layout: 'auto',
      vertex: {
        module: renderer.device.createShaderModule({ code: GLOBAL_WEBGPU_SHADER }),
        entryPoint: 'vertexMain',
        buffers: [{
          arrayStride: GLOBAL_WEBGPU_VERTEX_FLOATS * 4,
          attributes: [
            { shaderLocation: 0, offset: 0, format: 'float32x2' },
            { shaderLocation: 1, offset: 8, format: 'float32x2' },
            { shaderLocation: 2, offset: 16, format: 'float32x4' },
            { shaderLocation: 3, offset: 32, format: 'float32' },
          ],
        }],
      },
      fragment: {
        module: renderer.device.createShaderModule({ code: GLOBAL_WEBGPU_SHADER }),
        entryPoint: 'fragmentMain',
        targets: [{
          format: renderer.format,
          blend: {
            color: { srcFactor: 'src-alpha', dstFactor: 'one-minus-src-alpha', operation: 'add' },
            alpha: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' },
          },
        }],
      },
      primitive: { topology: 'triangle-list' },
    });
    renderer.whiteBindGroup = globalWebGpuBindGroupForTexture(renderer, renderer.whiteTexture);
    configureGlobalWebGpuCanvas(renderer);
    return renderer;
  })();
  return renderer.initPromise;
}

function configureGlobalWebGpuCanvas(renderer) {
  const dpr = window.devicePixelRatio || 1;
  const width = Math.max(1, Math.floor(renderer.host.clientWidth * dpr));
  const height = Math.max(1, Math.floor(renderer.host.clientHeight * dpr));
  if (renderer.canvas.width !== width || renderer.canvas.height !== height) {
    renderer.canvas.width = width;
    renderer.canvas.height = height;
  }
  renderer.gpuContext.configure({ device: renderer.device, format: renderer.format, alphaMode: 'opaque' });
}

function createGlobalWebGpuSolidTexture(device, rgba) {
  const texture = device.createTexture({
    size: [1, 1, 1],
    format: 'rgba8unorm',
    usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
  });
  device.queue.writeTexture({ texture }, new Uint8Array(rgba), { bytesPerRow: 4 }, { width: 1, height: 1 });
  return texture;
}

function globalWebGpuBindGroupForTexture(renderer, texture) {
  return renderer.device.createBindGroup({
    layout: renderer.pipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: renderer.sampler },
      { binding: 1, resource: texture.createView() },
    ],
  });
}

async function globalWebGpuTextureForUrl(renderer, url) {
  if (!url) return { texture: renderer.whiteTexture, bindGroup: renderer.whiteBindGroup };
  const cached = renderer.textures.get(url);
  if (cached) return cached;
  const entry = { texture: renderer.whiteTexture, bindGroup: renderer.whiteBindGroup, loading: true };
  renderer.textures.set(url, entry);
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`failed to load ${url}`);
    const bitmap = await createImageBitmap(await response.blob());
    const texture = renderer.device.createTexture({
      size: [bitmap.width, bitmap.height, 1],
      format: 'rgba8unorm',
      usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST | GPUTextureUsage.RENDER_ATTACHMENT,
    });
    renderer.device.queue.copyExternalImageToTexture(
      { source: bitmap },
      { texture },
      { width: bitmap.width, height: bitmap.height },
    );
    entry.texture = texture;
    entry.bindGroup = globalWebGpuBindGroupForTexture(renderer, texture);
    entry.loading = false;
  } catch (error) {
    entry.loading = false;
    console.warn('Unable to load WebGPU sprite texture:', error);
  }
  requestGlobalWebGpuDraw(renderer);
  return entry;
}

function globalWebGpuBounds(objects) {
  const xs = objects.map(object => object.x);
  const ys = objects.map(object => object.y);
  if (xs.length === 0 || ys.length === 0) return { minX: 0, minY: 0, maxX: 0, maxY: 0, cols: 1, rows: 1 };
  const minX = Math.min(...xs) - 1;
  const maxX = Math.max(...xs) + 1;
  const minY = Math.min(...ys) - 1;
  const maxY = Math.max(...ys) + 1;
  return { minX, minY, maxX, maxY, cols: maxX - minX + 1, rows: maxY - minY + 1 };
}

function globalWebGpuView(renderer, bounds) {
  const width = Math.max(1, renderer.host.clientWidth);
  const height = Math.max(1, renderer.host.clientHeight);
  const baseCellSize = Math.max(WORLD_OBJECT_MIN_CELL_PX, Math.floor(Math.min(
    width / Math.max(1, bounds.cols),
    height / Math.max(1, bounds.rows),
  )));
  const zoomBounds = {
    minZoom: 1,
    maxZoom: Math.max(1, WORLD_OBJECT_MAX_CELL_PX / Math.max(1, baseCellSize)),
  };
  const state = renderer.context?.state || {};
  const zoom = clampWorldObjectZoom(state.globalWebGpuZoom ?? 1, zoomBounds);
  state.globalWebGpuZoom = zoom;
  const cellSize = Math.max(WORLD_OBJECT_MIN_CELL_PX, Math.min(WORLD_OBJECT_MAX_CELL_PX, Math.round(baseCellSize * zoom)));
  const stride = cellSize + 1;
  const mapWidth = bounds.cols * stride - 1;
  const mapHeight = bounds.rows * stride - 1;
  if (!Number.isFinite(state.globalWebGpuPanX)) state.globalWebGpuPanX = Math.round((width - mapWidth) / 2);
  if (!Number.isFinite(state.globalWebGpuPanY)) state.globalWebGpuPanY = Math.round((height - mapHeight) / 2);
  return { width, height, baseCellSize, zoomBounds, zoom, cellSize, stride, panX: state.globalWebGpuPanX, panY: state.globalWebGpuPanY, mapWidth, mapHeight };
}

function hexToRgba(hex, alpha = 1) {
  const raw = String(hex || '#666').replace('#', '');
  const expanded = raw.length === 3 ? raw.split('').map(ch => ch + ch).join('') : raw;
  const value = Number.parseInt(expanded || '666666', 16);
  return [
    ((value >> 16) & 255) / 255,
    ((value >> 8) & 255) / 255,
    (value & 255) / 255,
    alpha,
  ];
}

function pushGlobalWebGpuQuad(vertices, view, x0, y0, x1, y1, color, useTexture = 0) {
  if (x1 < 0 || y1 < 0 || x0 > view.width || y0 > view.height) return;
  const clip = (x, y) => [(x / view.width) * 2 - 1, 1 - (y / view.height) * 2];
  const p0 = clip(x0, y0);
  const p1 = clip(x1, y0);
  const p2 = clip(x1, y1);
  const p3 = clip(x0, y1);
  const add = (point, u, v) => vertices.push(point[0], point[1], u, v, color[0], color[1], color[2], color[3], useTexture);
  add(p0, 0, 0); add(p1, 1, 0); add(p2, 1, 1);
  add(p0, 0, 0); add(p2, 1, 1); add(p3, 0, 1);
}

function pushGlobalWebGpuBorder(vertices, view, x0, y0, x1, y1, color) {
  const thickness = Math.max(2, Math.round(view.cellSize * 0.08));
  pushGlobalWebGpuQuad(vertices, view, x0, y0, x1, y0 + thickness, color, 0);
  pushGlobalWebGpuQuad(vertices, view, x0, y1 - thickness, x1, y1, color, 0);
  pushGlobalWebGpuQuad(vertices, view, x0, y0, x0 + thickness, y1, color, 0);
  pushGlobalWebGpuQuad(vertices, view, x1 - thickness, y0, x1, y1, color, 0);
}

function globalWebGpuCellRect(object, bounds, view, inset = 0) {
  const x = view.panX + (object.x - bounds.minX) * view.stride + inset;
  const y = view.panY + (object.y - bounds.minY) * view.stride + inset;
  return [x, y, x + view.cellSize - inset * 2, y + view.cellSize - inset * 2];
}

function globalWebGpuObjectGroups(objects, bounds, view) {
  const white = { url: '', vertices: [] };
  const groups = new Map([['', white]]);
  const emptyColor = hexToRgba(COLORS.empty_in, 1);
  for (let y = bounds.minY; y <= bounds.maxY; y++) {
    for (let x = bounds.minX; x <= bounds.maxX; x++) {
      const rect = globalWebGpuCellRect({ x, y }, bounds, view, 0);
      pushGlobalWebGpuQuad(white.vertices, view, rect[0], rect[1], rect[2], rect[3], emptyColor, 0);
    }
  }
  const byCoord = objectAtCoord(objects);
  for (const object of byCoord.values()) {
    const rect = globalWebGpuCellRect(object, bounds, view, 2);
    const baseColor = hexToRgba(object.type === 'wall' ? COLORS.wall : (object.props?.self ? COLORS.self : entityColor(object.type)), 1);
    pushGlobalWebGpuQuad(white.vertices, view, rect[0], rect[1], rect[2], rect[3], baseColor, 0);
    if (object.key === selectedCell) pushGlobalWebGpuBorder(white.vertices, view, rect[0], rect[1], rect[2], rect[3], [1, 1, 1, 1]);
    const spriteUrl = worldObjectSpriteUrl(object);
    if (spriteUrl) {
      const group = groups.get(spriteUrl) || { url: spriteUrl, vertices: [] };
      groups.set(spriteUrl, group);
      const inset = Math.max(3, Math.round(view.cellSize * 0.08));
      const spriteRect = globalWebGpuCellRect(object, bounds, view, inset);
      pushGlobalWebGpuQuad(group.vertices, view, spriteRect[0], spriteRect[1], spriteRect[2], spriteRect[3], [1, 1, 1, 1], 1);
    }
  }
  return Array.from(groups.values()).filter(group => group.vertices.length > 0);
}

async function drawGlobalWebGpuRenderer(renderer) {
  await initGlobalWebGpuRenderer(renderer);
  configureGlobalWebGpuCanvas(renderer);
  const bounds = globalWebGpuBounds(renderer.objects);
  const view = globalWebGpuView(renderer, bounds);
  renderer.bounds = bounds;
  renderer.view = view;
  const groups = globalWebGpuObjectGroups(renderer.objects, bounds, view);
  const transientVertexBuffers = [];
  const commandEncoder = renderer.device.createCommandEncoder();
  const pass = commandEncoder.beginRenderPass({
    colorAttachments: [{
      view: renderer.gpuContext.getCurrentTexture().createView(),
      clearValue: { r: 0.062, g: 0.062, b: 0.078, a: 1 },
      loadOp: 'clear',
      storeOp: 'store',
    }],
  });
  pass.setPipeline(renderer.pipeline);
  for (const group of groups) {
    const texture = await globalWebGpuTextureForUrl(renderer, group.url);
    const vertexBuffer = renderer.device.createBuffer({
      size: group.vertices.length * 4,
      usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
    });
    transientVertexBuffers.push(vertexBuffer);
    renderer.device.queue.writeBuffer(vertexBuffer, 0, new Float32Array(group.vertices));
    pass.setBindGroup(0, texture.bindGroup);
    pass.setVertexBuffer(0, vertexBuffer);
    pass.draw(group.vertices.length / GLOBAL_WEBGPU_VERTEX_FLOATS);
  }
  pass.end();
  renderer.device.queue.submit([commandEncoder.finish()]);
  renderer.device.queue.onSubmittedWorkDone().then(() => {
    for (const vertexBuffer of transientVertexBuffers) {
      vertexBuffer.destroy();
    }
  }).catch(error => console.warn('Unable to release WebGPU vertex buffers:', error));
}

function globalWebGpuObjectAtEvent(renderer, event) {
  const bounds = renderer.bounds;
  const view = renderer.view;
  if (!bounds || !view) return null;
  const rect = renderer.canvas.getBoundingClientRect();
  const x = Math.floor((event.clientX - rect.left - view.panX) / view.stride + bounds.minX);
  const y = Math.floor((event.clientY - rect.top - view.panY) / view.stride + bounds.minY);
  return objectAtCoord(renderer.objects).get(`${x},${y}`) || null;
}

function globalWebGpuObjectIsAgent(object) {
  return object?.props?.agent_id != null || String(object?.type || '').toLowerCase().includes('agent');
}

function centerGlobalWebGpuViewOnObject(renderer, object) {
  if (!renderer || !object || !Number.isFinite(object.x) || !Number.isFinite(object.y)) return false;
  const state = renderer.context?.state || {};
  const bounds = renderer.bounds || globalWebGpuBounds(renderer.objects);
  let view = renderer.view || globalWebGpuView(renderer, bounds);
  const targetZoom = 36 / Math.max(1, view.baseCellSize);
  state.globalWebGpuZoom = Math.max(view.zoom, Math.min(view.zoomBounds.maxZoom, targetZoom));
  view = globalWebGpuView(renderer, bounds);
  const objectCenterX = (object.x - bounds.minX) * view.stride + view.cellSize / 2;
  const objectCenterY = (object.y - bounds.minY) * view.stride + view.cellSize / 2;
  state.globalWebGpuPanX = Math.round(view.width / 2 - objectCenterX);
  state.globalWebGpuPanY = Math.round(view.height / 2 - objectCenterY);
  renderer.bounds = bounds;
  renderer.view = globalWebGpuView(renderer, bounds);
  return true;
}

function selectGlobalWebGpuObject(object, renderer) {
  if (!object || !renderer) return;
  const context = renderer.context || {};
  selectedCell = object.key;
  clientState.selectedCell = selectedCell;
  if (!AGENT_CLIENT_MODE && object?.props?.agent_id != null) setSelectedAgentId(object.props.agent_id);
  if (globalWebGpuObjectIsAgent(object)) centerGlobalWebGpuViewOnObject(renderer, object);
  if (context.state) {
    context.state.worldObjectInfoCollapsed = false;
    context.state.lastWorldObjects = renderer.objects.map(item => cloneWorldObject(item));
  }
  const detailHost = renderer.detailHost || renderer.host.parentElement?.querySelector('.world-object-detail');
  if (detailHost) renderWorldObjectDetails(renderer.objects, detailHost, context);
  if (context.saveState) context.saveState();
  else saveClientState();
  requestGlobalWebGpuDraw(renderer);
}

function globalWebGpuRendererForGlobalViewer() {
  return document.querySelector('.global-webgpu-viewer-host')?.__globalWebGpuRenderer || null;
}

function globalViewerObjectForAgentId(agentId, renderer = null) {
  const normalized = normalizeAgentId(agentId);
  const objects = renderer && Array.isArray(renderer.objects) && renderer.objects.length > 0
    ? renderer.objects
    : collectGlobalViewerObjects(lastGlobalData || {});
  return objects.find(object => object?.props?.agent_id != null && normalizeAgentId(object.props.agent_id) === normalized) || null;
}

function selectGlobalAgentFromPanel(agentId) {
  const normalized = normalizeAgentId(agentId);
  const renderer = globalWebGpuRendererForGlobalViewer();
  const object = globalViewerObjectForAgentId(normalized, renderer);
  if (object && renderer) selectGlobalWebGpuObject(object, renderer);
  else setSelectedAgentId(normalized);
  if (object) {
    selectedCell = object.key;
    clientState.selectedCell = selectedCell;
    saveClientState();
  }
  renderGlobalPanels(lastGlobalData || {});
}

function handleGlobalAgentRowKeydown(event, agentId) {
  if (event.key !== 'Enter' && event.key !== ' ') return;
  event.preventDefault();
  selectGlobalAgentFromPanel(agentId);
}

function beginGlobalWebGpuPan(event, renderer) {
  if (event.button !== 0) return;
  const state = renderer.context?.state || {};
  const startX = event.clientX;
  const startY = event.clientY;
  const startPanX = Number(state.globalWebGpuPanX) || 0;
  const startPanY = Number(state.globalWebGpuPanY) || 0;
  let moved = false;
  renderer.canvas.setPointerCapture(event.pointerId);
  renderer.canvas.classList.add('is-panning');

  function onMove(moveEvent) {
    const dx = moveEvent.clientX - startX;
    const dy = moveEvent.clientY - startY;
    if (!moved && Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
    moved = true;
    state.globalWebGpuPanX = startPanX + dx;
    state.globalWebGpuPanY = startPanY + dy;
    requestGlobalWebGpuDraw(renderer);
    moveEvent.preventDefault();
  }

  function onUp(upEvent) {
    renderer.canvas.classList.remove('is-panning');
    renderer.canvas.removeEventListener('pointermove', onMove);
    if (!moved) {
      const object = globalWebGpuObjectAtEvent(renderer, upEvent);
      if (object) selectGlobalWebGpuObject(object, renderer);
    }
    if (renderer.context?.saveState) renderer.context.saveState();
  }

  renderer.canvas.addEventListener('pointermove', onMove);
  renderer.canvas.addEventListener('pointerup', onUp, { once: true });
  event.preventDefault();
}

function handleGlobalWebGpuWheel(event, renderer) {
  if (!event.deltaY || !renderer.view) return;
  event.preventDefault();
  const state = renderer.context?.state || {};
  const view = renderer.view;
  const rect = renderer.canvas.getBoundingClientRect();
  const cursorX = event.clientX - rect.left;
  const cursorY = event.clientY - rect.top;
  const previousZoom = view.zoom;
  const nextZoom = clampWorldObjectZoom(
    previousZoom * (event.deltaY > 0 ? WORLD_OBJECT_ZOOM_STEP : 1 / WORLD_OBJECT_ZOOM_STEP),
    view.zoomBounds,
  );
  if (nextZoom === previousZoom) return;
  const ratio = nextZoom / previousZoom;
  state.globalWebGpuZoom = nextZoom;
  state.globalWebGpuPanX = cursorX - (cursorX - view.panX) * ratio;
  state.globalWebGpuPanY = cursorY - (cursorY - view.panY) * ratio;
  if (renderer.context?.saveState) renderer.context.saveState();
  requestGlobalWebGpuDraw(renderer);
}

function upsertAgentOption(agentId, agentName = null) {
  const normalized = normalizeAgentId(agentId);
  const known = agentOptions.get(normalized);
  const name = String(agentName || (known && known.name) || 'agent');
  agentOptions.set(normalized, { id: normalized, name });
}

function updateAgentOptionFromObject(agent) {
  if (!agent || agent.agent_id == null) return;
  upsertAgentOption(agent.agent_id, agentNameFromObject(agent));
}

function syncPanelSourceControls() {
  renderSelectedAgentStatus();
}

function renderSelectedAgentStatus(data = currentAgentHeaderData()) {
  const elements = document.querySelectorAll('[data-agent-header-status]');
  if (elements.length === 0) return;
  const agentId = data && data.__agent_id != null ? data.__agent_id : selectedAgentId;
  const known = agentOptions.get(normalizeAgentId(agentId));
  const agentName = data && data.__agent_name__ ? data.__agent_name__ : ((known && known.name) || 'agent');
  const tick = data && data.__tick != null ? data.__tick : (lastTick ?? lastAdminState?.step ?? '?');
  const lastAction = data && data.last_action ? data.last_action : 'none';
  const currentVibe = data && data.current_vibe ? data.current_vibe : 'none';
  const fields = [
    ['agent_id', agentId],
    ['agent_name', agentName],
    ['current_tick', tick],
    ['last_action', lastAction],
    ['current_vibe', currentVibe],
  ];
  const html = fields.map(([key, value]) => (
    `<span class="agent-header-field"><span class="agent-header-key">${esc(key)}</span> `
    + `<span class="agent-header-value">${esc(value)}</span></span>`
  )).join('');
  elements.forEach(el => { el.innerHTML = html; });
}

function setSelectedAgentId(agentId) {
  const normalized = normalizeAgentId(agentId);
  if (normalized === selectedAgentId && agentPanelWs) {
    syncPanelSourceControls();
    return;
  }
  selectedAgentId = normalized;
  clientState.selectedAgentId = selectedAgentId;
  clientState.panelSource = { kind: 'agent', agentId: selectedAgentId };

  syncPanelSourceControls();

async function adminCommand(command, extra = {}) {
  const response = await fetch('/admin', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ command, ...extra }),
  });
  const state = await response.json();
  renderAdminState(state);
  return state;
}

async function refreshAdminState() {
  const response = await fetch('/admin?format=json');
  renderAdminState(await response.json());
}

function renderAdminState(state) {
  if (!state || !state.ok) return;
  lastAdminState = state;
  syncAutostepToggle(state);
  syncGlobalAdminControls(state);
  syncFooterGameControls(state);
  renderGameStatus(state.step == null ? '?' : state.step);
}

function syncAutostepToggle(state = lastAdminState) {
  const toggle = document.getElementById('autostep-toggle');
  if (!toggle || !state) return;
  toggle.checked = !!state.step_on_action;
}

async function setAutostepMode(enabled) {
  return adminCommand('set_mode', { mode: enabled ? 'step-on-action' : 'manual' });
}

function globalAdminStepFromState(state = lastAdminState) {
  const stateStep = finiteNumber(state?.step, null);
  const tickStep = finiteNumber(lastTick, null);
  return Math.max(0, Math.floor(Math.max(stateStep ?? 0, tickStep ?? 0)));
}

function syncGlobalAdminControls(state = lastAdminState) {
  const controls = document.getElementById('global-admin-controls');
  if (!controls || AGENT_CLIENT_MODE) return;
  const step = globalAdminStepFromState(state);
  const playButton = document.getElementById('global-play-button');
  if (playButton) {
    playButton.textContent = state?.playing ? 'Pause' : 'Play';
    playButton.title = state?.playing ? 'Pause simulation' : 'Play simulation';
  }
  const scrubber = document.getElementById('global-frame-scrubber');
  const scrubberValue = document.getElementById('global-frame-scrubber-value');
  if (scrubber) {
    scrubber.max = String(step);
    if (document.activeElement !== scrubber && globalScrubFrame == null) scrubber.value = String(step);
    if (globalScrubFrame != null) scrubber.value = String(Math.min(step, Math.max(0, Math.floor(globalScrubFrame))));
  }
  if (scrubberValue) {
    const value = scrubber ? scrubber.value : String(step);
    scrubberValue.textContent = `t${value}`;
  }
}

function stepGlobalFrame() {
  globalScrubFrame = null;
  syncGlobalAdminControls();
  return adminCommand('step');
}

function toggleGlobalPlay() {
  globalScrubFrame = null;
  syncGlobalAdminControls();
  if (!lastAdminState) return adminCommand('start');
  return adminCommand(lastAdminState.playing ? 'stop' : 'start');
}

function scrubGlobalFrame(frame) {
  const normalizedFrame = Math.max(0, Math.floor(finiteNumber(frame, 0) || 0));
  const currentStep = globalAdminStepFromState();
  const buffered = globalFrameBuffer.get(normalizedFrame);
  if (buffered && normalizedFrame < currentStep) {
    globalScrubFrame = normalizedFrame;
    if (!AGENT_CLIENT_MODE) renderGlobalPanels(displayedGlobalData() || {});
    syncGlobalAdminControls();
    renderGameStatus(lastTick ?? normalizedFrame);
    saveClientState();
    return Promise.resolve(lastAdminState);
  }
  if (normalizedFrame < currentStep) {
    syncGlobalAdminControls();
    return Promise.resolve(lastAdminState);
  }
  globalScrubFrame = null;
  syncGlobalAdminControls();
  return adminCommand('goto', { frame: normalizedFrame });
}

function toggleAgentClientPlay() {
  if (!AGENT_CLIENT_MODE) return null;
  if (!lastAdminState) return adminCommand('start');
  return adminCommand(lastAdminState.playing ? 'stop' : 'start');
}

function renderGameStatus(step) {
  if (!lastAdminState) {
    document.getElementById('game-status').textContent = `tick ${step}`;
    syncGlobalAdminControls();
    renderSelectedAgentStatus();
    return;
  }
  const state = lastAdminState;
  const mode = state.mode || (state.playing ? 'playing' : 'stopped');
  const scrubLabel = globalScrubFrame == null ? '' : ` | view t${globalScrubFrame}`;
  document.getElementById('game-status').textContent = `tick ${step}${scrubLabel} | ${mode} | ${state.speed} tps`;
  syncGlobalAdminControls(state);
  renderSelectedAgentStatus();
}

function setGlobalWsState(state) {
  globalWsState = state;
  renderConnectionStatus();
}

function setPlayerWsState(state) {
  playerWsState = state;
  renderConnectionStatus();
}

function setAgentWsState(state) {
  agentWsState = state;
  renderConnectionStatus();
}

function recordHeartbeat(message) {
  lastHeartbeatAt = Date.now();
  if (message.admin) {
    renderAdminState(message.admin);
    if (message.admin.step != null) lastTick = message.admin.step;
  }
  if (message.connections) connectionCounts = message.connections;
  renderConnectionStatus();
}

function renderConnectionStatus() {
  const wsEl = document.getElementById('ws-status');
  const heartbeatEl = document.getElementById('heartbeat-status');
  const tickEl = document.getElementById('last-tick-status');
  const countsEl = document.getElementById('connection-counts');

  if (AGENT_CLIENT_MODE) {
    wsEl.textContent = PLAYER_CLIENT_MODE
      ? `player ${playerWsState}`
      : `policy-debug ${selectedAgentId} ${agentWsState}`;
    wsEl.className = PLAYER_CLIENT_MODE
      ? (playerWsState === 'connected' ? 'connected'
        : playerWsState === 'connecting' || playerWsState === 'reconnecting' ? 'stale'
        : 'disconnected')
      : (agentWsState === 'connected' ? 'connected'
        : agentWsState === 'connecting' || agentWsState === 'reconnecting' ? 'stale'
        : 'disconnected');
  } else {
    wsEl.textContent = `global ${globalWsState}`;
    wsEl.className = globalWsState === 'connected' ? 'connected'
      : globalWsState === 'connecting' || globalWsState === 'reconnecting' ? 'stale'
      : 'disconnected';
  }

  if (!lastHeartbeatAt) {
    heartbeatEl.textContent = 'waiting';
    heartbeatEl.className = 'disconnected';
  } else {
    const age = Date.now() - lastHeartbeatAt;
    const ageText = age < 1000 ? 'now' : `${(age / 1000).toFixed(age < 10000 ? 1 : 0)}s ago`;
    heartbeatEl.textContent = age > HEARTBEAT_STALE_MS ? `stale ${ageText}` : `ok ${ageText}`;
    heartbeatEl.className = age > HEARTBEAT_STALE_MS ? 'stale' : 'connected';
  }

  tickEl.textContent = lastTick == null ? '?' : String(lastTick);
  countsEl.textContent = AGENT_CLIENT_MODE
    ? (PLAYER_CLIENT_MODE ? `players ${connectionCounts.players || 0}` : `debug ${connectionCounts.policy_debug || 0}`)
    : `players ${connectionCounts.players || 0} / panels ${connectionCounts.global || 0} / agents ${connectionCounts.agents || 0}`;
}

function isTypingTarget(target) {
  if (!target) return false;
  const tag = target.tagName ? target.tagName.toLowerCase() : '';
  return tag === 'input' || tag === 'textarea' || tag === 'select' || target.isContentEditable;
}

function isQuitShortcut(event) {
  return (event.altKey || event.metaKey) && !event.ctrlKey && event.key.toLowerCase() === 'q';
}

function handleViewerShortcut(event) {
  if (!isQuitShortcut(event)) return;
  event.preventDefault();
  event.stopImmediatePropagation();
  quitViewer();
}

function isAgentPlayShortcut(event) {
  return event.key === ' ' || event.code === 'Space';
}

function requestQuitBeacon() {
  if (!quitRequested) return;
  const payload = JSON.stringify({ command: 'quit' });
  if (navigator.sendBeacon) {
    const body = new Blob([payload], { type: 'application/json' });
    if (navigator.sendBeacon('/admin', body)) return;
  }
  try {
    fetch('/admin', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: payload,
      keepalive: true,
    });
  } catch (err) {
    console.warn('Failed to request viewer quit during unload:', err);
  }
}

async function quitViewer() {
  if (quitRequested) return;
  quitRequested = true;
  setGlobalWsState('quitting');
  setPlayerWsState('quitting');
  setAgentWsState('quitting');
  try {
    await adminCommand('quit');
  } catch (err) {
    console.error('Failed to quit viewer:', err);
  } finally {
    window.close();
  }
}

function installUnloadQuitHandler() {
  window.addEventListener('pagehide', requestQuitBeacon);
}

function handlePolicyClientActionKey(event) {
  if (!AGENT_CLIENT_MODE || isTypingTarget(event.target)) return;
  if (AGENT_CLIENT_MODE && isAgentPlayShortcut(event)) {
    event.preventDefault();
    event.stopImmediatePropagation();
    if (event.repeat) return;
    toggleAgentClientPlay();
    return;
  }
  const actionName = POLICY_ACTION_KEYS.get(event.key.toLowerCase());
  if (!actionName) return;
  event.preventDefault();
  event.stopImmediatePropagation();
  sendAgentAction(actionName);
}

function policyDataFromStep(message) {
  const objects = message.objects || [];
  const agents = objects.filter(o => o.is_agent || o.type_name === 'agent');
  agents.forEach(updateAgentOptionFromObject);
  const agent = agents.find(o => o.agent_id === selectedAgentId) || agents[0] || {};
  const policy = Object.assign({}, agent.policy_infos || {});
  if (agent.agent_id != null) selectedAgentId = normalizeAgentId(agent.agent_id);
  policy.__agent_id = selectedAgentId;
  policy.__agent_name__ = agentOptions.get(normalizeAgentId(selectedAgentId))?.name || 'agent';
  policy.current_vibe = currentVibeFromAgent(agent || {}, policy);
  policy.__tick = message.step;
  policy.episode_stats = message.episode_stats || {};
  return policy;
}

function updateAgentOptionsFromStep(message) {
  const objects = message.objects || [];
  objects.filter(o => o.is_agent || o.type_name === 'agent').forEach(updateAgentOptionFromObject);
}

function mergeAgentLogEntries(entries) {
  if (!Array.isArray(entries)) return;
  for (const entry of entries) {
    const tick = Number(entry.step || 0);
    const log = entry.log || '';
    if (entry.delta === true) addLlmTickSection(tick, log, entry.system || '');
    else appendLlmLogSnapshot(tick, log, entry.system || '');
  }
}

function agentDataFromState(message) {
  mergeAgentLogEntries(message.agent_log || []);
  if (message.agent) updateAgentOptionFromObject(message.agent);
  else upsertAgentOption(message.agent_id, agentNameFromPolicyInfos(message.policy_infos || {}));
  const policy = Object.assign({}, message.policy_infos || {});
  policy.obs_grid = message.obs || message.last_obs || policy.obs_grid || {};
  policy.llm_log = policy.llm_log || message.llm_log || '';
  policy.llm_system = policy.llm_system || message.llm_system || '';
  if (policy.current_goals == null && message.current_goals != null) policy.current_goals = message.current_goals;
  policy.agent_log = message.agent_log || [];
  policy.last_action = message.last_action || '';
  policy.__agent_id = message.agent_id;
  policy.__agent_name__ = agentOptions.get(normalizeAgentId(message.agent_id))?.name || 'agent';
  policy.current_vibe = currentVibeFromAgent(message.agent || {}, policy);
  policy.__tick = message.step || 0;
  policy.episode_stats = message.episode_stats || {};
  return policy;
}

function rememberGlobalFrame(message) {
  const step = Math.max(0, Math.floor(finiteNumber(message?.step, -1) || -1));
  if (step < 0) return;
  globalFrameBuffer.set(step, Object.assign({}, message));
  while (globalFrameBuffer.size > GLOBAL_FRAME_BUFFER_LIMIT) {
    const oldest = Math.min(...globalFrameBuffer.keys());
    globalFrameBuffer.delete(oldest);
  }
}

function displayedGlobalData() {
  if (globalScrubFrame != null && globalFrameBuffer.has(globalScrubFrame)) {
    return Object.assign({}, lastGlobalData || {}, globalFrameBuffer.get(globalScrubFrame), {
      wall_objects: (lastGlobalData && lastGlobalData.wall_objects) || [],
    });
  }
  return lastGlobalData;
}

function renderDisplayedGlobalPanels() {
  if (!AGENT_CLIENT_MODE) renderGlobalPanels(displayedGlobalData() || {});
}

function onGlobalData(message) {
  if (message.type === 'walls') {
    lastGlobalData = Object.assign({}, lastGlobalData || {}, { wall_objects: message.objects || [] });
    renderDisplayedGlobalPanels();
    renderConnectionStatus();
    return;
  }
  lastGlobalData = Object.assign({}, lastGlobalData || {}, message);
  if (message.type === 'hello') {
    renderDisplayedGlobalPanels();
    renderConnectionStatus();
    return;
  }
  if (message.type === 'heartbeat') {
    recordHeartbeat(message);
    renderDisplayedGlobalPanels();
    return;
  }
  if (message.type === 'done') {
    lastTick = 'done';
    renderDisplayedGlobalPanels();
    renderConnectionStatus();
    return;
  }
  if (message.type === 'step') {
    rememberGlobalFrame(message);
    updateAgentOptionsFromStep(message);
    lastTick = message.step || lastTick;
    renderGameStatus(lastTick);
    renderSelectedAgentStatus(agentHeaderDataFromGlobalStep(message));
    renderDisplayedGlobalPanels();
    renderConnectionStatus();
    return;
  }
  renderDisplayedGlobalPanels();
}

function onAgentData(message) {
  if (message.type === 'hello') {
    renderConnectionStatus();
    return;
  }
  if (message.type === 'heartbeat') {
    recordHeartbeat(message);
    return;
  }
  if (message.type === 'done') {
    lastTick = 'done';
    renderConnectionStatus();
    return;
  }
  if (message.type === 'agent_log') {
    mergeAgentLogEntries(message.agent_log || []);
    renderPolicyWidgets(lastData || { __tick: lastTick || 0 });
    return;
  }
  if (message.type === 'add_goal') {
    lastData = Object.assign({}, lastData || {}, {
      current_goals: message.current_goals || '',
      goal_tasks: Array.isArray(message.goal_tasks) ? message.goal_tasks : normalizeToolsyGoalTasks({ current_goals: message.current_goals || '' }),
    });
    renderPolicyWidgets(lastData);
    return;
  }
  if (message.type !== 'agent_state') {
    return;
  }
  const data = agentDataFromState(message);
  lastData = data;
  lastTick = data.__tick || 0;
  renderGameStatus(data.__tick || 0);
  renderSelectedAgentStatus(data);
  renderPolicyWidgets(data);
  renderConnectionStatus();
}

function resetPanelData() {
  lastData = null;
  lastTick = null;
  llmTickSections.clear();
  latestLlmTick = null;
  lastLlmLogSnapshot = '';
  document.getElementById('policy-widget-container').innerHTML = '';
  renderSelectedAgentStatus();
}

function reconnectPolicyDebugStream() {
  agentPanelGeneration += 1;
  if (agentPanelWs) {
    agentPanelWs.onclose = null;
    agentPanelWs.close();
    agentPanelWs = null;
  }
  resetPanelData();
  connectPolicyDebugStream(agentPanelGeneration);
}

function sendAgentAction(actionName) {
  if (!agentPanelWs || agentPanelWs.readyState !== WebSocket.OPEN) return false;
  agentPanelWs.send(JSON.stringify({ type: 'action', agent_id: selectedAgentId, action_name: actionName, client_action: true }));
  if (AGENT_CLIENT_MODE) requestWorldModelRecenterOnAgent(selectedAgentId);
  return true;
}

function sendLlmTrigger() {
  if (!AGENT_CLIENT_MODE || !agentPanelWs || agentPanelWs.readyState !== WebSocket.OPEN) return false;
  agentPanelWs.send(JSON.stringify({ type: 'trigger_llm', agent_id: selectedAgentId }));
  return true;
}

function connectGlobalStream(generation = globalStreamGeneration) {
  console.log('Global WS connecting to', globalWsUrl());
  setGlobalWsState('connecting');
  var ws;
  try { ws = new WebSocket(globalWsUrl()); } catch(e) {
    console.error('Global WS create error:', e);
    setGlobalWsState('reconnecting');
    setTimeout(() => connectGlobalStream(generation), 2000);
    return;
  }
  globalWs = ws;
  ws.onopen = () => {
    console.log('Global WS connected');
    setGlobalWsState('connected');
  };
  ws.onmessage = e => { try { onGlobalData(JSON.parse(e.data)); } catch(err) { console.error(err); } };
  ws.onclose = (e) => {
    console.log('Global WS closed:', e.code, e.reason);
    if (generation !== globalStreamGeneration) return;
    globalWs = null;
    setGlobalWsState('reconnecting');
    setTimeout(() => connectGlobalStream(generation), 2000);
  };
  ws.onerror = (e) => {
    console.error('Global WS error:', e);
    setGlobalWsState('error');
  };
}

function onPlayerData(message) {
  if (message.type === 'assign') {
    if (message.agent_id != null) {
      selectedAgentId = normalizeAgentId(message.agent_id);
      clientState.selectedAgentId = selectedAgentId;
      clientState.panelSource = { kind: 'agent', agentId: selectedAgentId };
      saveClientState();
      syncPanelSourceControls();
    }
    if (message.admin) renderAdminState(message.admin);
    renderConnectionStatus();
    return;
  }
  if (message.type === 'heartbeat') {
    recordHeartbeat(message);
    return;
  }
  if (message.type === 'done') {
    lastTick = 'done';
    renderConnectionStatus();
    return;
  }
  if (message.type === 'walls') {
    renderConnectionStatus();
    return;
  }
  if (message.type !== 'step') return;
  const data = policyDataFromStep(message);
  lastData = data;
  lastTick = data.__tick || 0;
  renderGameStatus(data.__tick || 0);
  renderSelectedAgentStatus(data);
  renderPolicyWidgets(data);
  renderConnectionStatus();
}

});
document.getElementById('footer-pause-button').addEventListener('click', () => {
  adminCommand('stop');
});
document.getElementById('footer-llm-button').addEventListener('click', () => {
  sendLlmTrigger();
});
document.getElementById('global-step-button').addEventListener('click', () => {
  stepGlobalFrame();
});
document.getElementById('global-play-button').addEventListener('click', () => {
  toggleGlobalPlay();
});
document.getElementById('global-frame-scrubber').addEventListener('input', event => {
  const value = document.getElementById('global-frame-scrubber-value');
  if (value) value.textContent = `t${event.target.value}`;
});
document.getElementById('global-frame-scrubber').addEventListener('change', event => {
  scrubGlobalFrame(event.target.value);
});
if (AGENT_CLIENT_MODE) document.getElementById('add-policy-widget').addEventListener('click', togglePolicyWidgetMenu);
if (!AGENT_CLIENT_MODE) document.getElementById('add-global-panel').addEventListener('click', toggleGlobalPanelMenu);
document.addEventListener('click', event => {
  const inAgentSelector = event.target.closest && event.target.closest('.agent-widget-actions');
  const inGlobalSelector = event.target.closest && event.target.closest('.global-panel-selector');
  const menu = document.getElementById('policy-widget-menu');
  if (menu && !inAgentSelector) menu.hidden = true;
  const globalMenu = document.getElementById('global-panel-menu');
  if (globalMenu && !inGlobalSelector) globalMenu.hidden = true;
});
window.addEventListener('keydown', handleViewerShortcut, true);
if (AGENT_CLIENT_MODE) {
  window.addEventListener('keydown', handlePolicyClientActionKey, true);
}
installUnloadQuitHandler();
installClientLiveReload();
if (PLAYER_CLIENT_MODE) connectPlayerStream(); else if (POLICY_DEBUGGER_MODE) connectPolicyDebugStream(); else connectGlobalStream();
refreshAdminState();
setInterval(refreshAdminState, 2000);
setInterval(renderConnectionStatus, 500);
renderConnectionStatus();

</script>
</body>
</html>
