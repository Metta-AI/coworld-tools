<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cogony Panels</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #101010; color: #ccc; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; overflow: hidden; }
.workspace { position: fixed; inset: 2px 2px 27px 2px; min-width: 320px; min-height: 240px; overflow: hidden; }
body:not(.policy-client-mode) #agent-panel { display: none !important; }
body.policy-client-mode #game-panel { display: none !important; }
body.policy-client-mode #agent-panel { inset: 0 !important; width: auto !important; height: auto !important; display: flex !important; }
body.policy-client-mode #agent-panel .panel-header { cursor: default; }
body.policy-client-mode .world-object-map-host { min-height: 240px; }
body.policy-client-mode #agent-panel > .panel-header .panel-title { display: none; }
.panel { position: absolute; display: flex; flex-direction: column; min-width: 0; min-height: 0;
  background: #1a1a1a; border: 1px solid #333; box-shadow: 0 8px 18px #0008; overflow: hidden; }
.panel.active { border-color: #555; box-shadow: 0 10px 22px #000b; }
.panel.is-dragging { opacity: 0.55; }
.panel-header { background: #222; padding: 6px 10px; min-height: 30px; font-weight: bold; color: #aaa; font-size: 12px;
  text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px; cursor: grab; user-select: none; touch-action: none; overflow: visible; }
.panel.is-dragging .panel-header { cursor: grabbing; }
.panel-title { flex: 0 0 auto; }
.panel-tabs { display: inline-flex; gap: 3px; min-width: 0; overflow: hidden; }
.panel-tab { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  background: #303030; border: 1px solid #4a4a4a; color: #8f8f8f; padding: 2px 7px; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
.panel-tab.active { background: #3a3a3a; color: #d0d0d0; border-color: #666; }
.panel-status { margin-left: auto; font-weight: normal; font-size: 11px; color: #666; text-transform: none; letter-spacing: 0; }
.global-admin-controls { display: inline-flex; align-items: center; gap: 6px; flex: 0 1 330px; min-width: 170px;
  margin-left: 2px; font-weight: normal; font-size: 11px; color: #777; text-transform: none; letter-spacing: 0; }
.global-admin-button { flex: 0 0 auto; background: #303030; color: #cfcfcf; border: 1px solid #555; border-radius: 3px;
  padding: 2px 7px; font: inherit; line-height: 1.35; cursor: pointer; }
.global-admin-button:hover { background: #444; color: #fff; }
.global-frame-scrubber { display: inline-flex; align-items: center; gap: 5px; flex: 1 1 130px; min-width: 92px; }
.global-frame-scrubber input { width: 100%; min-width: 54px; accent-color: #d0d0d0; }
.global-frame-scrubber span { flex: 0 0 auto; min-width: 34px; color: #aaa; text-align: right; }
.agent-header-status { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; min-width: 0; overflow: hidden;
  font-weight: normal; font-size: 11px; color: #9aa; text-transform: none; letter-spacing: 0; white-space: nowrap; }
.agent-header-field { flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.agent-header-key { color: #777; }
.agent-header-value { color: #c4cccc; }
.selected-agent-status { margin-left: auto; }
.agent-header-status + .agent-widget-actions { margin-left: 0; }
.policy-widget-body.agent-status-widget { padding: 6px 8px; overflow: hidden; }
.agent-status-compact { display: flex; flex-wrap: wrap; align-items: center; gap: 3px 8px;
  color: #9aa; font-size: 11px; line-height: 1.35; white-space: normal; }
.agent-status-compact .agent-header-field { flex: 0 1 auto; }
#game-status { margin-left: 0; }
@media (max-width: 780px) {
  .global-admin-controls { flex-basis: 220px; min-width: 138px; gap: 4px; }
  .global-frame-scrubber span { min-width: 26px; }
}
.panel-body { background: #1a1a1a; flex: 1; min-height: 0; overflow-y: auto; padding: 8px; }
.panel-body::-webkit-scrollbar { width: 6px; }
.panel-body::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
.splitter { position: absolute; z-index: 20; background: transparent; touch-action: none; }
.splitter:hover, .splitter.active { background: #7774; }
.splitter-vertical { cursor: ew-resize; }
.splitter-horizontal { cursor: ns-resize; }
.drop-highlight { position: absolute; z-index: 30; display: none; pointer-events: none;
  border: 2px solid #d6b94a; background: #d6b94a26; }
.panel-interaction-active iframe { pointer-events: none; }

/* LLM Log */
.llm-log .sep { color: #444; }
.llm-log .header { color: #ddb44a; font-weight: bold; }
.llm-log .user { color: #78a8dc; }
.llm-log .assistant { color: #a0dc8c; }
.llm-log .tool-call { color: #dcb44a; }
.llm-log .tool-result { color: #aa8cd8; }
.llm-log .system { color: #666; }
.llm-log .line { white-space: pre-wrap; word-break: break-word; line-height: 1.5; margin: 1px 0; }
.llm-log details { border-bottom: 1px solid #292929; padding: 3px 0; }
.llm-log summary { cursor: pointer; color: #ddb44a; font-weight: bold; list-style: none; }
.llm-log summary::-webkit-details-marker { display: none; }
.llm-log summary::before { content: ">"; display: inline-block; width: 14px; color: #777; }
.llm-log details[open] summary::before { content: "v"; }
.llm-log details.tick-section > summary { position: sticky; top: 0; left: 0; right: 0; z-index: 3; display: block; background: #1a1a1a; box-shadow: 0 1px 0 #333, 0 8px 12px #1a1a1a; margin: -3px 0 0 -14px; padding: 4px 8px 4px 14px; }
.llm-log details.tick-section[open] > summary { border-bottom: 1px solid #333; }
.llm-log details.tick-section[open] > .tick-body { background: #242424; box-shadow: inset 2px 0 0 #3a3a3a;
  margin: 0 0 0 -14px; padding: 6px 8px 8px 28px; }
.llm-log .tick-body { padding: 4px 0 6px 14px; }
.llm-log .tick-meta { color: #666; font-weight: normal; margin-left: 8px; }
.llm-log .tick-summary-head { display: inline-block; }
.llm-log .tick-tools { display: flex; flex-direction: column; gap: 2px; margin: 3px 0 0 18px; color: #dcb44a; }
.llm-log .tick-tool { display: block; max-width: 100%; overflow-wrap: anywhere; white-space: normal;
  border-left: 1px solid #4b3d18; padding-left: 6px; font-weight: normal; }
.llm-log .tick-tool.new-goal { color: #888; }
.llm-log details.llm-log-subsection { border-bottom: 0; border-left: 1px solid #333; margin: 3px 0; padding: 2px 0 2px 8px; }
.llm-log details.llm-log-subsection summary { color: #aaa; font-weight: bold; }
.llm-log .llm-log-subsection-body { padding-bottom: 3px; }

/* Policy Info */
.policy-info .key { color: #888; }
.policy-info .val { color: #ddd; }
.policy-info .row { margin: 4px 0; display: flex; gap: 8px; }

/* Obs */
.obs-map { display: grid; gap: 1px; margin: 8px auto; }
.obs-cell { width: 100%; aspect-ratio: 1; border-radius: 2px; cursor: pointer; transition: outline 0.1s; }
.obs-cell:hover { outline: 1px solid #fff8; }
.obs-cell.selected { outline: 2px solid #fff; }
.obs-entities { display: flex; flex-direction: column; gap: 4px; }
.obs-entities .entity { border: 1px solid #3a3a3a; background: #171717; margin: 0; padding: 4px 5px; border-radius: 2px; cursor: pointer; }
.obs-entities .entity.selected { background: #203040; border-color: #8ab4d8; }
.obs-entities .entity-head { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 6px; align-items: baseline; }
.obs-entities .etype { color: #ddd; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.obs-entities .epos { color: #888; font-size: 11px; white-space: nowrap; }
.obs-entities .edist { color: #777; font-size: 10px; white-space: nowrap; }
.obs-entities .efeats, .global-token-list { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.obs-entities .feat, .global-token-card { border: 1px solid #333; background: #101010; color: #98bd98;
  font-size: 10px; line-height: 1.2; padding: 2px 4px; border-radius: 2px; }
.global-token-card { color: #b8b8b8; }
.policy-widgets { position: relative; background: #333; padding: 0; overflow: hidden; }
.policy-widget { position: absolute; min-height: 0; display: flex; flex-direction: column; background: #1a1a1a; border: 1px solid #2d2d2d; overflow: hidden; }
.policy-widget.is-dragging { opacity: 0.55; }
.policy-widget.is-unavailable { opacity: 0.48; filter: grayscale(0.9); }
.policy-widget-header { min-height: 24px; padding: 5px 8px; display: flex; align-items: center;
  border-bottom: 1px solid #333; background: #202020; gap: 6px; cursor: grab; user-select: none; touch-action: none; }
.policy-widget.is-dragging .policy-widget-header { cursor: grabbing; }
.policy-widget-title { flex: 0 0 auto; color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.7px; }
.policy-widget-status { margin-left: auto; color: #666; font-size: 10px; }
.policy-widget-tabs { display: inline-flex; gap: 3px; min-width: 0; overflow: hidden; }
.policy-widget-tab { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  background: #303030; border: 1px solid #4a4a4a; color: #8f8f8f; padding: 2px 7px; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
.policy-widget-tab.active { background: #3a3a3a; color: #d0d0d0; border-color: #666; }
.policy-widget-tab.unavailable { color: #666; border-color: #333; }
.policy-widget-body { flex: 1; min-height: 0; padding: 8px; overflow: auto; }
.policy-widget-placeholder { color: #777; font-size: 12px; line-height: 1.5; padding: 8px; }
.policy-widget-splitter { position: absolute; z-index: 20; background: transparent; touch-action: none; }
.policy-widget-splitter:hover, .policy-widget-splitter.active { background: #7774; }
.policy-widget-splitter-vertical { cursor: ew-resize; }
.policy-widget-splitter-horizontal { cursor: ns-resize; }
.policy-widget-drop-highlight { position: absolute; z-index: 30; display: none; pointer-events: none;
  border: 2px solid #d6b94a; background: #d6b94a26; }
.global-panel-container { position: absolute; inset: 0; min-width: 0; min-height: 0; overflow: hidden; background: #333; }
.global-panels { width: 100%; height: 100%; }
.global-panel { position: absolute; min-height: 0; display: flex; flex-direction: column; background: #1a1a1a; border: 1px solid #2d2d2d; overflow: hidden; }
.global-panel.is-dragging { opacity: 0.55; }
.global-panel-header { min-height: 24px; padding: 5px 8px; display: flex; align-items: center;
  border-bottom: 1px solid #333; background: #202020; gap: 6px; cursor: grab; user-select: none; touch-action: none; }
.global-panel.is-dragging .global-panel-header { cursor: grabbing; }
.global-panel-title { flex: 0 0 auto; color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.7px; }
.global-panel-status { margin-left: auto; color: #666; font-size: 10px; }
.global-panel-tabs { display: inline-flex; gap: 3px; min-width: 0; overflow: hidden; }
.global-panel-tab { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  background: #303030; border: 1px solid #4a4a4a; color: #8f8f8f; padding: 2px 7px; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
.global-panel-tab.active { background: #3a3a3a; color: #d0d0d0; border-color: #666; }
.global-panel-body { flex: 1; min-height: 0; padding: 8px; overflow: auto; }
.global-panel-body.global-webgpu-viewer { overflow: hidden; }
.global-panel-placeholder { color: #777; font-size: 12px; line-height: 1.5; padding: 8px; }
.global-agents { display: flex; flex-direction: column; gap: 6px; color: #bdbdbd; font-size: 12px; }
.global-agent-row { display: grid; grid-template-columns: minmax(0, 1fr) auto auto auto; gap: 6px; align-items: center;
  border: 1px solid #303030; background: #151515; padding: 6px; border-radius: 2px; cursor: pointer; }
.global-agent-row:hover { background: #1d1d1d; border-color: #454545; }
.global-agent-row.selected { background: #203040; border-color: #8ab4d8; }
.global-agent-row.selected .global-agent-name { color: #fff; }
.global-agent-open { justify-self: end; width: 24px; height: 24px; padding: 0; display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid #3f3f3f; background: #232323; color: #d6d6d6; border-radius: 2px; font-size: 10px;
  cursor: pointer; text-decoration: none; }
.global-agent-open:hover { background: #303030; border-color: #5a5a5a; color: #fff; }
.global-agent-open-icon { width: 13px; height: 13px; fill: currentColor; display: block; }
.global-agent-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ddd; font-weight: bold; }
.global-agent-status { justify-self: end; width: 9px; height: 9px; border: 1px solid #101010; border-radius: 999px; box-shadow: 0 0 0 1px #333; }
.global-agent-status.connected { background: #62c462; box-shadow: 0 0 0 1px #315531, 0 0 5px #62c46266; }
.global-agent-status.disconnected { background: #c46262; box-shadow: 0 0 0 1px #553131; }
.global-agent-resources { display: inline-flex; gap: 4px; justify-content: flex-end; }
.global-agent-resource { border: 1px solid #333; background: #101010; color: #a8c0a8; padding: 2px 5px; border-radius: 2px; font-size: 10px; }
.global-panel-splitter { position: absolute; z-index: 20; background: transparent; touch-action: none; }
.global-panel-splitter:hover, .global-panel-splitter.active { background: #7774; }
.global-panel-splitter-vertical { cursor: ew-resize; }
.global-panel-splitter-horizontal { cursor: ns-resize; }
.global-panel-drop-highlight { position: absolute; z-index: 30; display: none; pointer-events: none;
  border: 2px solid #d6b94a; background: #d6b94a26; }
.global-panel-collapsed-rail { position: absolute; top: 0; right: 0; bottom: 0; width: 36px; z-index: 35;
  display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 30px 4px 4px;
  border-left: 1px solid #333; background: #202020; }
.global-panel-collapsed-tab { width: 26px; min-height: 92px; display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid #444; background: #161616; color: #ccc; border-radius: 2px; font: inherit; font-size: 10px;
  letter-spacing: 0; writing-mode: vertical-rl; transform: rotate(180deg); cursor: pointer; }
.global-panel-collapsed-tab:hover { color: #fff; border-color: #666; background: #2a2a2a; }
.toolsy-diary { display: flex; flex-direction: column; gap: 5px; color: #bdbdbd; font-size: 12px; line-height: 1.35; }
.toolsy-diary-entry { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 4px 8px;
  border-bottom: 1px solid #2a2a2a; padding: 3px 0 6px; }
.toolsy-diary-step { color: #777; font-size: 10px; }
.toolsy-diary-event { color: #d0d0d0; overflow-wrap: anywhere; }
.toolsy-goals { display: flex; flex-direction: column; gap: 6px; }
.toolsy-goal-list { display: flex; flex-direction: column; gap: 4px; }
.toolsy-goal-task { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 6px; align-items: start;
  border: 1px solid #333; background: #131313; padding: 5px 6px; border-radius: 2px; cursor: pointer; }
.toolsy-goal-task:hover { border-color: #555; background: #191919; }
.toolsy-goal-task.completed { opacity: 0.62; background: #101010; }
.toolsy-goal-task.completed .toolsy-goal-text { color: #777; text-decoration: line-through; }
.toolsy-goal-checkbox { margin: 2px 0 0; accent-color: #78a878; }
.toolsy-goal-text { color: #d0d0d0; overflow-wrap: anywhere; line-height: 1.35; }
.toolsy-autopilocy { display: flex; flex-direction: column; gap: 7px; color: #cfcfcf; font-size: 12px; line-height: 1.35; }
.toolsy-autopilocy-head { display: flex; align-items: center; gap: 8px; min-width: 0; }
.toolsy-autopilocy-name { color: #ffd84a; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toolsy-autopilocy-state { margin-left: auto; color: #8fbf8f; border: 1px solid #394a39; background: #132013; padding: 2px 6px; border-radius: 2px; font-size: 10px; text-transform: uppercase; }
.toolsy-autopilocy-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 5px; }
.toolsy-autopilocy-stat { border: 1px solid #333; background: #121212; padding: 5px 6px; min-width: 0; }
.toolsy-autopilocy-label { display: block; color: #777; font-size: 10px; text-transform: uppercase; }
.toolsy-autopilocy-value { display: block; color: #d8d8d8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toolsy-autopilocy-result { border-top: 1px solid #303030; padding-top: 6px; color: #999; overflow-wrap: anywhere; }
.toolsy-world-model { display: flex; flex-direction: column; gap: 6px; font-size: 11px; color: #bdbdbd; }
.policy-widget-body.toolsy-world-model { overflow: hidden; }
.world-object-map-host { flex: 1; min-height: 112px; display: flex; align-items: flex-start; justify-content: flex-start; overflow: auto; overscroll-behavior: contain; cursor: grab; user-select: none; touch-action: none; }
.world-object-map-host.is-panning { cursor: grabbing; }
.global-webgpu-viewer-host { position: relative; align-items: stretch; justify-content: stretch; overflow: hidden; background: #101014; cursor: default; }
.global-webgpu-viewer-canvas { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
.global-webgpu-viewer-canvas.is-panning { cursor: grabbing; }
.global-webgpu-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: #777; font-size: 12px; line-height: 1.5; padding: 12px; text-align: center; pointer-events: none; }
.global-webgpu-placeholder[hidden] { display: none; }
.world-object-map { display: grid; gap: 1px; margin: 8px auto; }
.world-object-cell { width: 100%; aspect-ratio: 1; box-sizing: border-box; display: block; min-height: 0; padding: 0;
  border: 1px solid #252525; border-radius: 2px; background: #11121a; }
.world-object-cell.unexplored { background: #383838; border-color: #484848; }
.world-object-cell.observed-now { background: #181d2a; border-color: #2a3650; }
.world-object-cell.object { cursor: pointer; box-shadow: inset 0 0 0 1px #0008; }
.world-object-cell.object.sprite { background-position: center; background-repeat: no-repeat; background-size: 86% 86%; image-rendering: auto; }
.world-object-cell.object.observed-now { filter: brightness(1.16); }
.world-object-cell.object:hover { outline: 1px solid #fff8; }
.world-object-cell.wall { background: #d8d8d8; border-color: #f1f1f1; box-shadow: inset 0 0 0 1px #8f8f8f; }
.world-object-cell.wall.observed-now { background: #eeeeee; border-color: #ffffff; }
.world-object-cell.seen-now { border-color: #ececec; }
.world-object-cell.selected { outline: 2px solid #fff; }
.world-object-detail { border-top: 1px solid #333; display: flex; flex-direction: column; gap: 5px; min-height: 72px; flex-shrink: 0; overflow: auto; }
.world-object-detail.collapsed { min-height: 30px; height: 30px !important; overflow: hidden; }
.world-object-info-resize-handle { flex: 0 0 7px; cursor: ns-resize; background: #2a2a2a; border-bottom: 1px solid #333; touch-action: none; }
.world-object-info-resize-handle:hover, .world-object-info-resize-handle.active { background: #555; }
.world-object-info-panel { display: flex; flex-direction: column; gap: 5px; padding: 0 0 6px; }
.world-object-detail-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 6px; align-items: center; }
.world-object-type { font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.world-object-info-toggle { background: transparent; border: 0; color: #777; font: inherit; font-size: 12px; line-height: 1; cursor: pointer;
  width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }
.world-object-info-toggle:hover { color: #ddd; background: #333; }
.world-object-seen-now { color: #ddd; border: 1px solid #555; background: #2a2a2a; padding: 1px 5px; font-size: 9px; text-transform: uppercase; }
.world-object-props, .world-object-tokens { display: flex; flex-wrap: wrap; gap: 3px; min-width: 0; }
.world-object-prop, .world-object-token { border: 1px solid #333; background: #111; padding: 2px 4px; border-radius: 2px; color: #a8c0a8; font-size: 10px; line-height: 1.2; }
.world-object-token { color: #b8b8d8; }

.agent-widget-actions { margin-left: auto; position: relative; display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
.agent-add-widget { background: #333; color: #ccc; border: 1px solid #555; border-radius: 2px;
  font: inherit; font-size: 13px; line-height: 16px; width: 20px; height: 20px; cursor: pointer; }
.agent-add-widget:hover { background: #444; }
.policy-widget-menu { position: absolute; top: 24px; right: 0; z-index: 80; min-width: 180px; max-width: 260px;
  background: #202020; border: 1px solid #444; box-shadow: 0 8px 18px #000b; padding: 4px; }
.policy-widget-menu[hidden] { display: none; }
.policy-widget-menu button, .policy-widget-menu .empty { display: block; width: 100%; text-align: left; background: transparent;
  border: 0; color: #ccc; font: inherit; font-size: 11px; padding: 5px 7px; cursor: pointer; }
.policy-widget-menu button:hover { background: #333; }
.policy-widget-menu .empty { color: #777; cursor: default; }
.global-panel-selector { position: relative; display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
.global-add-panel { background: #333; color: #ccc; border: 1px solid #555; border-radius: 2px;
  font: inherit; font-size: 13px; line-height: 16px; width: 20px; height: 20px; cursor: pointer; }
.global-add-panel:hover { background: #444; }
.global-panel-menu { position: absolute; top: 24px; right: 0; z-index: 80; min-width: 180px; max-width: 260px;
  background: #202020; border: 1px solid #444; box-shadow: 0 8px 18px #000b; padding: 4px; }
.global-panel-menu[hidden] { display: none; }
.global-panel-menu button, .global-panel-menu .empty { display: block; width: 100%; text-align: left; background: transparent;
  border: 0; color: #ccc; font: inherit; font-size: 11px; padding: 5px 7px; cursor: pointer; }
.global-panel-menu button:hover { background: #333; }
.global-panel-menu .empty { color: #777; cursor: default; }
.policy-widget-close, .global-panel-close { flex: 0 0 auto; background: transparent; border: 0; color: #777;
  font: inherit; font-size: 12px; line-height: 1; width: 18px; height: 18px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; }
.policy-widget-close:hover, .global-panel-close:hover { color: #ddd; background: #333; }
.ui-icon { width: 14px; height: 14px; display: block; fill: none; stroke: currentColor; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
.global-panel-collapsed-tab .ui-icon { flex: 0 0 auto; width: 12px; height: 12px; }
.collapsed-tab-title { pointer-events: none; }
.agent-panel-container { padding: 0; min-height: 0; background: #333; overflow: hidden; }

/* Status bar */
.status-bar { position: fixed; left: 0; right: 0; bottom: 0; height: 25px; background: #222; padding: 4px 12px; font-size: 11px; color: #666;
  border-top: 1px solid #333; display: flex; align-items: center; min-width: 0; overflow: hidden; white-space: nowrap; }
.status-bar input { background: #333; color: #ccc; border: 1px solid #555; border-radius: 2px;
  font: inherit; font-size: 11px; height: 17px; margin: 0 3px; }
.status-bar input { width: 44px; }
.footer-game-controls { display: none; align-items: center; gap: 4px; margin-right: 8px; flex: 0 0 auto; }
body.policy-client-mode .footer-game-controls { display: inline-flex; }
.footer-game-control-button { display: inline-flex; align-items: center; justify-content: center; background: #303030; border: 1px solid #555;
  color: #ddd; border-radius: 2px; font: inherit; font-size: 11px; line-height: 16px; height: 17px; padding: 0 7px; cursor: pointer;
  text-transform: none; letter-spacing: 0; white-space: nowrap; }
.footer-game-control-button:hover:not(:disabled) { background: #444; color: #fff; }
.footer-game-control-button:disabled { opacity: 0.45; cursor: default; }
.footer-autostep-toggle { display: inline-flex; align-items: center; gap: 5px; color: #aaa; font-size: 11px; font-weight: normal;
  line-height: 17px; text-transform: none; letter-spacing: 0; white-space: nowrap; cursor: pointer; }
.footer-autostep-toggle input { position: absolute; opacity: 0; pointer-events: none; }
.footer-autostep-switch { position: relative; display: inline-block; width: 26px; height: 14px; border: 1px solid #555;
  border-radius: 999px; background: #303030; box-sizing: border-box; }
.footer-autostep-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 8px; height: 8px;
  border-radius: 50%; background: #888; transition: transform 120ms ease, background 120ms ease; }
.footer-autostep-toggle input:checked + .footer-autostep-switch { border-color: #6a8; background: #25402d; }
.footer-autostep-toggle input:checked + .footer-autostep-switch::after { transform: translateX(12px); background: #6ee071; }
.footer-autostep-toggle:hover .footer-autostep-switch { border-color: #777; }
.status-bar .tick { color: #aaa; }
.status-bar .connected { color: #4a4; }
.status-bar .disconnected { color: #a44; }
.status-bar .stale { color: #c98c36; }
.status-bar .label { color: #777; margin-left: 10px; }
.status-bar .label:first-child { margin-left: 0; }
.status-bar .counts { color: #777; }

#no-data { text-align: center; padding: 40px; color: #555; font-size: 16px; }
</style>
</head>
<body>
<div id="no-data" style="display:none">Connecting to cogony...</div>
<div class="workspace" id="main">

  <div class="panel" id="game-panel" data-panel-id="game">
    <div class="panel-header" data-panel-drag-handle>
      <span class="panel-title">Game</span>
      <span id="selected-agent-status" class="agent-header-status selected-agent-status" data-agent-header-status></span>
      <span id="game-status" class="panel-status"></span>

        <button id="global-step-button" class="global-admin-button" type="button" title="Step one frame">Step</button>
        <button id="global-play-button" class="global-admin-button" type="button" title="Play">Play</button>
        <label class="global-frame-scrubber" title="Scrub to a captured frame">
          <input id="global-frame-scrubber" type="range" min="0" max="0" value="0" step="1">
          <span id="global-frame-scrubber-value">t0</span>

      </span>
      <span class="global-panel-selector">

        <div id="global-panel-menu" class="global-panel-menu" hidden></div>
      </span>
    </div>
    <div class="panel-body" style="padding:0;position:relative" id="game-container">
      <div class="global-panel-container global-panels" id="global-panel-container">
        <div class="global-panel-drop-highlight" id="global-panel-drop-highlight"></div>
      </div>
    </div>
  </div>

  <div class="panel" id="agent-panel" data-panel-id="agent">
    <div class="panel-header" data-panel-drag-handle>
      <span class="panel-title">Agent</span>
      <span class="agent-widget-actions">
        <button id="add-policy-widget" class="agent-add-widget" type="button" title="Add policy widget">+</button>
        <div id="policy-widget-menu" class="policy-widget-menu" hidden></div>
      </span>
    </div>
    <div class="panel-body agent-panel-container policy-widgets" id="policy-widget-container"></div>
  </div>

  <div class="drop-highlight" id="drop-highlight"></div>

</div>
<div class="status-bar" id="status-bar">
  <span id="footer-game-controls" class="footer-game-controls">
    <button id="footer-step-button" class="footer-game-control-button" type="button" title="Step one frame">Step</button>
    <button id="footer-play-button" class="footer-game-control-button" type="button" title="Play (Space)">Play</button>
    <button id="footer-pause-button" class="footer-game-control-button" type="button" title="Pause (Space)">Pause</button>
    <button id="footer-llm-button" class="footer-game-control-button" type="button" title="Run LLM brain now">Run LLM</button>

  <span class="label">tick</span> <span id="last-tick-status" class="tick">?</span>
  <span class="label">clients</span> <span id="connection-counts" class="counts">players 0 / panels 0</span>
</div>

<script>
const COLORS = {
  wall: '#d8d8d8', agent: '#ccc', extractor: '#2ecc71', junction: '#a064dc',
  hub: '#f1c40f', market: '#e6962c', station: '#3498db', trap: '#e74c3c',
  heart: '#dc3250', self: '#50c8f0', empty_in: '#1a1a24', empty_out: '#0a0a0a',
};
const VISION_R = 6;
const SIDE = VISION_R * 2 + 1;
const COGONY_CLIENT_STATE_KEY = 'cogony.clientState.v1';
const POLICY_DEBUGGER_MODE = window.location.pathname === '/policy-debugger';
const PLAYER_CLIENT_MODE = window.location.pathname === '/player';
const AGENT_CLIENT_MODE = POLICY_DEBUGGER_MODE || PLAYER_CLIENT_MODE;
const PANEL_LAYOUT_VERSION = 2;
const POLICY_WIDGET_LAYOUT_VERSION = 5;
const POLICY_CLIENT_WIDGET_LAYOUT_VERSION = 5;
const GLOBAL_PANEL_LAYOUT_VERSION = 3;
const GLOBAL_PANEL_KEY = 'global';
const CLIENT_LIVE_RELOAD_INTERVAL_MS = 1000;
const PANEL_IDS = AGENT_CLIENT_MODE ? ['agent'] : ['game'];
const PANEL_MIN_WIDTH = 110;
const PANEL_MIN_HEIGHT = 90;
const PANEL_GAP = 6;
const AREA_HEADER_HEIGHT = 30;
const WIDGET_MIN_WIDTH = 120;
const WIDGET_MIN_HEIGHT = 96;
const WIDGET_HEADER_HEIGHT = 24;
const COLLAPSED_RIGHT_RAIL_WIDTH = 36;
const DRAG_THRESHOLD = 10;
const POLICY_WIDGET_MERGES = { obs_map: 'toolsy_world_model' };
const BUILTIN_POLICY_WIDGETS = [
  { id: 'agent_status', module: 'agent_status', title: 'Agent', config: {} },
  { id: 'toolsy_autopilocy', module: 'toolsy_autopilocy', title: 'AutoPilocy()', config: {} },
  { id: 'llm_log', module: 'llm_log', title: 'LLM Log', config: {} },
  { id: 'policy_info', module: 'policy_info', title: 'Policy', config: {} },
  { id: 'entities', module: 'entities', title: 'Entities', config: {} },
  { id: 'toolsy_goals', module: 'toolsy_goals', title: 'Goals', config: {} },
  { id: 'toolsy_diary', module: 'toolsy_diary', title: 'Diary', config: {} },
  { id: 'toolsy_world_model', module: 'toolsy_world_model', title: 'World Model', config: {} },
];
const BUILTIN_GLOBAL_PANELS = [
  { id: 'global_viewer', module: 'global_viewer', title: 'Viewer', config: {} },
  { id: 'agents', module: 'agents', title: 'Agents', config: {} },
];

function workspaceControlIcon(name) {
  const paths = {
    close: '<path d="M4 4l8 8"></path><path d="M12 4l-8 8"></path>',
    collapseRight: '<path d="M6 4l4 4-4 4"></path><path d="M3 3v10"></path>',
    expandLeft: '<path d="M10 4L6 8l4 4"></path><path d="M13 3v10"></path>',
  };
  return `<svg class="ui-icon workspace-control-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">${paths[name] || paths.close}</svg>`;
}

function worldObjectInfoToggleIcon(collapsed) {
  const path = collapsed ? '<path d="M4 10l4-4 4 4"></path>' : '<path d="M4 6l4 4 4-4"></path>';
  return `<svg class="ui-icon world-object-info-toggle-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">${path}</svg>`;
}

function clientLiveReloadSignature(text) {
  let hash = 0;
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  }
  return `${text.length}:${hash}`;
}

function installClientLiveReload() {
  if (new URLSearchParams(window.location.search).get('live_reload') === '0') return;
  let lastSignature = null;
  const poll = async () => {
    try {
      const response = await fetch(window.location.href, { cache: 'no-store', headers: { Accept: 'text/html' } });
      if (response.ok) {
        const signature = clientLiveReloadSignature(await response.text());
        if (lastSignature && signature !== lastSignature) {
          location.reload();
          return;
        }
        lastSignature = signature;
      }
    } catch (error) {
      console.debug('Client live reload check failed', error);
    }
    setTimeout(poll, CLIENT_LIVE_RELOAD_INTERVAL_MS);
  };
  setTimeout(poll, CLIENT_LIVE_RELOAD_INTERVAL_MS);
}

let clientState = loadClientState();
document.body.classList.toggle('policy-client-mode', AGENT_CLIENT_MODE);
document.body.classList.toggle('player-client-mode', PLAYER_CLIENT_MODE);
if (AGENT_CLIENT_MODE) document.title = PLAYER_CLIENT_MODE ? 'Cogony Player Client' : 'Cogony Policy Debugger';
const initialParams = new URLSearchParams(window.location.search);
const queryAgentId = initialParams.has('agent')
  ? Number(initialParams.get('agent'))
  : (initialParams.has('slot') ? Number(initialParams.get('slot')) : null);
let selectedAgentId = Math.max(0, Number(queryAgentId ?? clientState.selectedAgentId ?? clientState.panelSource?.agentId ?? 0) || 0);
clientState.selectedAgentId = selectedAgentId;
clientState.panelSource = { kind: 'agent', agentId: selectedAgentId };
let selectedCell = clientState.selectedCell || null;
const agentOptions = new Map();
agentOptions.set(selectedAgentId, { id: selectedAgentId, name: 'agent' });
const policyWidgetModules = new Map();
const globalPanelModules = new Map();
const policyWidgetState = clientState.policyWidgetState || {};
clientState.policyWidgetState = policyWidgetState;
const globalPanelState = clientState.globalPanelState || {};
clientState.globalPanelState = globalPanelState;
if (clientState.policyWidgetLayoutVersion !== POLICY_WIDGET_LAYOUT_VERSION) {
  clientState.policyWidgets = null;
  clientState.policyWidgetLayout = null;
  clientState.policyWidgetCatalog = {};
  clientState.policyWidgetLayoutVersion = POLICY_WIDGET_LAYOUT_VERSION;
}
if (clientState.policyClientWidgetLayoutVersion !== POLICY_CLIENT_WIDGET_LAYOUT_VERSION) {
  clientState.policyClientWidgets = null;
  clientState.policyClientWidgetLayout = null;
  clientState.policyClientWidgetLayoutVersion = POLICY_CLIENT_WIDGET_LAYOUT_VERSION;
}
clientState.policyWidgetCatalog = clientState.policyWidgetCatalog || {};
const policyWidgetCatalog = clientState.policyWidgetCatalog;
migrateMergedPolicyWidgets();
if (
  clientState.globalPanelLayoutVersion !== GLOBAL_PANEL_LAYOUT_VERSION
  || Array.isArray(clientState.globalPanels)
  || Array.isArray(clientState.globalPanelLayouts)
) {
  clientState.globalPanels = {};
  clientState.globalPanelLayouts = {};
  clientState.globalPanelLayoutVersion = GLOBAL_PANEL_LAYOUT_VERSION;
}
clientState.globalPanels = clientState.globalPanels || {};
clientState.globalPanelLayouts = clientState.globalPanelLayouts || {};
clientState.globalPanelCollapsedRight = clientState.globalPanelCollapsedRight || {};
if (!Array.isArray(clientState.globalPanels[GLOBAL_PANEL_KEY])) {
  clientState.globalPanels[GLOBAL_PANEL_KEY] = BUILTIN_GLOBAL_PANELS.map(panel => panel.id);
}
clientState.globalPanelLayouts[GLOBAL_PANEL_KEY] = clientState.globalPanelLayouts[GLOBAL_PANEL_KEY] || {};
if (!Array.isArray(clientState.globalPanelCollapsedRight[GLOBAL_PANEL_KEY])) {
  clientState.globalPanelCollapsedRight[GLOBAL_PANEL_KEY] = [];
}

function entityColor(type) {
  if (type.includes('extractor')) return COLORS.extractor;
  if (type.includes('junction')) return COLORS.junction;
  if (type.includes('hub')) return COLORS.hub;
  if (type.includes('market')) return COLORS.market;
  if (type.includes('station') || type.includes('_st')) return COLORS.station;
  if (type.includes('agent')) return COLORS.agent;
  if (type.includes('trap')) return COLORS.trap;
  if (type.includes('heart')) return COLORS.heart;
  if (type.includes('wall')) return COLORS.wall;
  return '#666';
}

function worldObjectSpriteName(object) {
  const type = String(object?.type || '').trim();
  if (!type || type === 'wall') return '';
  if (type.includes('agent')) return 'agent';
  return type;
}

function worldObjectSpriteUrl(object) {
  const spriteName = worldObjectSpriteName(object);
  if (!spriteName) return '';
  return `/mettascope-assets/objects/${encodeURIComponent(spriteName)}.png`;
}

function worldObjectCellStyle(object) {
  const color = object.type === 'agent' && object.props.self ? COLORS.self : entityColor(object.type);
  const spriteUrl = worldObjectSpriteUrl(object);
  if (!spriteUrl) return `background:${color}`;
  return `background-color:${color};background-image:url('${spriteUrl}')`;
}

function lineClass(line) {
  if (line.startsWith('===') || line.startsWith('---')) return 'sep';
  if (line.startsWith('LLM CALL') || line.startsWith('RESPONSE')) return 'header';
  if (line.startsWith('TOOL')) return 'tool-call';
  if (line.startsWith('  user:')) return 'user';
  if (line.startsWith('  assistant:')) return 'assistant';
  if (line.includes('CALL ')) return 'tool-call';
  if (line.includes('RESULT ')) return 'tool-result';
  if (line.startsWith('  tool:')) return 'tool-call';
  if (line.startsWith('  text:')) return 'assistant';
  if (line.startsWith('SYSTEM')) return 'system';
  return '';
}

const llmTickSections = new Map();
const expandedLlmTicks = new Set(clientState.expandedLlmTicks || []);
const LLM_LOG_OPEN_GOAL_MARK = '+';
const LLM_LOG_DONE_GOAL_MARK = '✅';
const llmLogGoalTextById = new Map();
let latestLlmTick = null;
let llmSystemPrompt = '';
let lastLlmLogSnapshot = '';

function llmLogDelta(previous, current) {
  if (!current) return '';
  if (!previous) return current;
  if (current === previous) return '';
  if (current.startsWith(previous)) return current.slice(previous.length).replace(/^\n+/, '');
  return current;
}

function addLlmTickSection(tick, sectionLog, system = '') {
  const lines = sectionLog.split('\n').filter(Boolean);
  if (lines.length === 0) return;
  const visibleLines = llmLogVisibleLines(lines);
  if (visibleLines.length === 0) return;
  const existing = llmTickSections.get(tick);
  const existingLog = existing?.log || '';
  if (existingLog === sectionLog || existingLog.endsWith(`\n${sectionLog}`)) {
    if (system) llmSystemPrompt = system;
    return;
  }
  const mergedLog = existingLog ? `${existingLog}\n${sectionLog}` : sectionLog;
  llmTickSections.set(tick, { tick, log: mergedLog });
  latestLlmTick = Math.max(latestLlmTick || 0, tick);
  if (system) llmSystemPrompt = system;
}

function appendLlmLogSnapshot(tick, log, system = '') {
  const delta = llmLogDelta(lastLlmLogSnapshot, log || '');
  if (log) lastLlmLogSnapshot = log;
  addLlmTickSection(tick, delta, system);
}

function llmLogPlainUserLine(line) {
  const prefix = '  user: ';
  return line.startsWith(prefix) ? line.slice(prefix.length) : line;
}

function llmLogStartsGoals(line) {
  const text = llmLogPlainUserLine(line).trim();
  return text === 'Current goals:' || text === 'Goals:' || text === 'Re-evaluate goals:';
}

function llmLogStartsExplicitSituation(line) {
  const text = llmLogPlainUserLine(line).trim();
  return text === 'Situation:';
}

function llmLogStartsSituation(line) {
  const text = llmLogPlainUserLine(line).trim();
  return llmLogStartsExplicitSituation(line) || /^Step \d+\./.test(text);
}

function llmLogHardBoundary(line) {
  const cls = lineClass(line);
  return cls === 'sep' || cls === 'header' || cls === 'assistant'
    || cls === 'tool-call' || cls === 'tool-result' || cls === 'system';
}

function llmCollapsibleSectionAt(lines, index) {
  const line = lines[index] || '';
  let title = '';
  if (llmLogStartsGoals(line)) title = 'Goals';
  else if (llmLogStartsSituation(line)) title = 'Situation';
  if (!title) return null;

  let end = index + 1;
  while (end < lines.length) {
    if (llmLogHardBoundary(lines[end])) break;
    if (llmLogStartsGoals(lines[end]) || llmLogStartsExplicitSituation(lines[end])) break;
    end += 1;
  }
  return { title, lines: lines.slice(index, end), nextIndex: end };
}

function llmSubsectionBodyLines(title, lines) {
  if (lines.length === 0) return lines;
  const first = llmLogPlainUserLine(lines[0]).trim();
  if (title === 'Goals' && (first === 'Current goals:' || first === 'Goals:' || first === 'Re-evaluate goals:')) return lines.slice(1);
  if (title === 'Situation' && first === 'Situation:') return lines.slice(1);
  return lines;
}

function renderLlmLogLine(line) {
  const cls = lineClass(line);
  const displayLines = llmLogFormattedToolCallsForLine(line);
  if (displayLines.length) {
    return displayLines.map(displayLine => `<div class="line ${cls}">${esc(displayLine)}</div>`).join('');
  }
  return `<div class="line ${cls}">${esc(line)}</div>`;
}

function llmLogVerboseAssistantLine(line) {
  return line.startsWith('  text:') || line.startsWith('  assistant:');
}

function llmLogActionBoundaryLine(line) {
  if (line.startsWith('  tool:')) return true;
  const cls = lineClass(line);
  return cls === 'sep' || cls === 'header' || cls === 'tool-call'
    || cls === 'tool-result' || cls === 'user' || cls === 'system';
}

function llmLogVisibleLines(lines) {
  const visible = [];
  let skippingAssistantText = false;
  for (const line of lines) {
    if (llmLogVerboseAssistantLine(line)) {
      skippingAssistantText = true;
      continue;
    }
    if (skippingAssistantText && !llmLogActionBoundaryLine(line)) continue;
    skippingAssistantText = false;
    visible.push(line);
  }
  return visible;
}

function renderLlmLogSubsection(title, lines) {
  const bodyLines = llmSubsectionBodyLines(title, lines);
  let html = `<details class="llm-log-subsection" data-section="${escAttr(title.toLowerCase())}">`;
  html += `<summary>${esc(title)}<span class="tick-meta">${bodyLines.length} lines</span></summary>`;
  html += '<div class="tick-body llm-log-subsection-body">';
  for (const line of bodyLines) html += renderLlmLogLine(line);
  html += '</div></details>';
  return html;
}

function renderLlmLogLines(lines) {
  let html = '';
  let goalsRendered = false;
  for (let i = 0; i < lines.length;) {
    const section = llmCollapsibleSectionAt(lines, i);
    if (section) {
      html += renderLlmLogSubsection(section.title, section.lines);
      if (section.title === 'Goals') goalsRendered = true;
      i = section.nextIndex;
    } else {
      html += renderLlmLogLine(lines[i]);
      if (llmLogHardBoundary(lines[i])) goalsRendered = false;
      i += 1;
    }
  }
  return html;
}

function collapseOtherLlmTickSections(container, activeDetails) {
  container.querySelectorAll('details.tick-section').forEach(details => {
    if (details !== activeDetails) details.open = false;
  });
}

function scrollLlmTickHeaderToTop(container, tickKey) {
  const details = Array.from(container.querySelectorAll('details.tick-section'))
    .find(section => section.dataset.tick === tickKey);
  if (!details) return;
  container.scrollTop = Math.max(0, details.offsetTop);
}

function llmLogToolCallText(line) {
  const trimmed = String(line || '').trim();
  if (trimmed.startsWith('tool:')) return trimmed.slice(5).trim();
  const toolMatch = trimmed.match(/^TOOL\s+(.+?)(?:\s+SCHEDULED)?$/);
  return toolMatch ? toolMatch[1].trim() : '';
}

function llmLogTopLevelBoundaryIndex(text, start, boundaryChars) {
  const boundaries = new Set(boundaryChars);
  let depth = 0;
  let quote = '';
  let escaped = false;
  for (let i = start; i < text.length; i++) {
    const ch = text[i];
    if (escaped) {
      escaped = false;
      continue;
    }
    if (quote) {
      if (ch === '\\') escaped = true;
      else if (ch === quote) quote = '';
      continue;
    }
    if (ch === '"' || ch === "'") {
      quote = ch;
      continue;
    }
    if (depth === 0 && boundaries.has(ch)) return i;
    if (ch === '(' || ch === '[' || ch === '{') depth += 1;
    else if (ch === ')' || ch === ']' || ch === '}') depth = Math.max(0, depth - 1);
  }
  return text.length;
}

function llmLogSplitToolCalls(callText) {
  const calls = [];
  let start = 0;
  while (start < callText.length) {
    const end = llmLogTopLevelBoundaryIndex(callText, start, [';']);
    const call = callText.slice(start, end).trim();
    if (call) calls.push(call);
    start = end + 1;
  }
  const tail = callText.slice(start).trim();
  if (tail) calls.push(tail);
  return calls;
}

function llmLogToolCallName(callText) {
  const match = String(callText || '').trim().match(/^([A-Za-z_][A-Za-z0-9_]*)\s*\(/);
  return match ? match[1] : '';
}

function llmLogToolCallArgValue(callText, argNames) {
  const text = String(callText || '');
  for (const argName of argNames) {
    const marker = `${argName}=`;
    const start = text.indexOf(marker);
    if (start < 0) continue;
    const valueStart = start + marker.length;
    const valueEnd = llmLogTopLevelBoundaryIndex(text, valueStart, [',', ')']);
    return text.slice(valueStart, valueEnd).trim();
  }
  return '';
}

function llmLogUnquotePythonString(value) {
  const trimmed = String(value || '').trim();
  if (trimmed.length >= 2 && ((trimmed[0] === "'" && trimmed.at(-1) === "'") || (trimmed[0] === '"' && trimmed.at(-1) === '"'))) {
    return trimmed.slice(1, -1)
      .replace(/\\n/g, '\n')
      .replace(/\\'/g, "'")
      .replace(/\\"/g, '"')
      .replace(/\\\\/g, '\\');
  }
  return trimmed;
}

function llmLogQuotedValues(valueText) {
  const values = [];
  const pattern = /'((?:\\.|[^'\\])*)'|"((?:\\.|[^"\\])*)"/g;
  let match;
  while ((match = pattern.exec(valueText)) !== null) {
    values.push(llmLogUnquotePythonString(match[0]).trim());
  }
  return values.filter(Boolean);
}

function llmLogGoalTextsFromValue(valueText) {
  const quoted = llmLogQuotedValues(valueText);
  if (quoted.length) return quoted;
  const stripped = String(valueText || '').replace(/^[\s[\](){}]+|[\s[\](){}]+$/g, '').trim();
  return stripped ? [stripped] : [];
}

function rememberLlmLogGoalTasks(data) {
  for (const task of normalizeToolsyGoalTasks(data || {})) {
    if (task.id && task.text) llmLogGoalTextById.set(String(task.id), task.text);
  }
}

function llmLogGoalTextForId(goalId) {
  const key = String(goalId || '').trim();
  return key ? llmLogGoalTextById.get(key) || '' : '';
}

function llmLogFormattedGoalToolCalls(callText) {
  const name = llmLogToolCallName(callText);
  if (name === 'add_goal') {
    const goals = llmLogGoalTextsFromValue(llmLogToolCallArgValue(callText, ['goals', 'current_goals', 'goal', 'text']));
    return goals.map(goal => `${LLM_LOG_OPEN_GOAL_MARK} ${goal}`);
  }
  if (name === 'complete_goal') {
    const explicitGoal = llmLogGoalTextsFromValue(llmLogToolCallArgValue(callText, ['goal', 'text']))[0];
    const goalId = llmLogGoalTextsFromValue(llmLogToolCallArgValue(callText, ['goal_id', 'id']))[0];
    const goal = llmLogGoalTextForId(goalId) || goalId;
    const displayGoal = explicitGoal || goal;
    if (!displayGoal) return [];
    return [`${LLM_LOG_DONE_GOAL_MARK} ${displayGoal}`];
  }
  return [];
}

function llmLogFormattedToolCalls(callText) {
  const formatted = [];
  for (const call of llmLogSplitToolCalls(String(callText || ''))) {
    const goalCalls = llmLogFormattedGoalToolCalls(call);
    formatted.push(...(goalCalls.length ? goalCalls : [call]));
  }
  return formatted;
}

function llmLogFormattedToolCallsForLine(line) {
  const call = llmLogToolCallText(line);
  if (!call) return [];
  const formatted = llmLogFormattedToolCalls(call);
  return formatted.some(displayCall => displayCall !== call) ? formatted : [];
}

function collectLlmLogToolCalls(lines, includeToolStatusLines) {
  const seen = new Set();
  const calls = [];
  for (const line of lines) {
    if (!includeToolStatusLines && !String(line || '').trim().startsWith('tool:')) continue;
    const call = llmLogToolCallText(line);
    if (!call) continue;
    const formatted = llmLogFormattedToolCalls(call);
    for (const displayCall of formatted) {
      if (!displayCall || seen.has(displayCall)) continue;
      seen.add(displayCall);
      calls.push(displayCall);
    }
  }
  return calls;
}

function llmLogToolCalls(lines) {
  const calls = collectLlmLogToolCalls(lines, false);
  return calls.length ? calls : collectLlmLogToolCalls(lines, true);
}

function llmLogTickToolClass(call) {
  const classes = ['tick-tool'];
  if (call.startsWith(LLM_LOG_OPEN_GOAL_MARK)) classes.push('new-goal');
  return classes.join(' ');
}

function renderLlmTickSummary(section, lines) {
  const toolCalls = llmLogToolCalls(lines);
  let html = `<summary><span class="tick-summary-head">Tick ${section.tick}<span class="tick-meta">${lines.length} lines</span></span>`;
  if (toolCalls.length) {
    html += '<span class="tick-tools" role="list">';
    for (const call of toolCalls) {
      html += `<span class="${llmLogTickToolClass(call)}" role="listitem">${esc(call)}</span>`;
    }
    html += '</span>';
  }
  html += '</summary>';
  return html;
}

function renderLlmLog(data, el) {
  if (!el) return;
  rememberLlmLogGoalTasks(data);
  const previousScrollTop = el.scrollTop;
  const log = data.llm_log || '';
  const system = data.llm_system || '';
  const tick = Number(data.__tick || 0);
  const hasAgentLog = Array.isArray(data.agent_log) && data.agent_log.length > 0;
  if (system) llmSystemPrompt = system;
  if (!hasAgentLog) appendLlmLogSnapshot(tick, log, system);

  let html = '';
  if (llmSystemPrompt) {
    html += '<details class="system-section"><summary>SYSTEM PROMPT</summary><div class="tick-body">';
    llmSystemPrompt.split('\n').forEach(l => { html += `<div class="line system">  ${esc(l)}</div>`; });
    html += '</div></details>';
  }

  const sections = Array.from(llmTickSections.values()).sort((a, b) => a.tick - b.tick);
  for (const section of sections) {
    const tickKey = String(section.tick);
    const lines = llmLogVisibleLines(section.log ? section.log.split('\n').filter(Boolean) : []);
    const open = expandedLlmTicks.has(tickKey);
    html += `<details class="tick-section llm-log-tick-panel" data-tick="${tickKey}"${open ? ' open' : ''}>`;
    html += renderLlmTickSummary(section, lines);
    html += '<div class="tick-body">';
    html += renderLlmLogLines(lines);
    html += '</div></details>';
  }

  el.innerHTML = html;
  el.querySelectorAll('details.tick-section').forEach(details => {
    details.addEventListener('toggle', () => {
      const tickKey = details.dataset.tick;
      if (!tickKey) return;
      if (details.open) collapseOtherLlmTickSections(el, details);
      if (!details.open && el.querySelector('details.tick-section[open]')) return;
      expandedLlmTicks.clear();
      if (details.open) expandedLlmTicks.add(tickKey);
      clientState.expandedLlmTicks = Array.from(expandedLlmTicks);
      saveClientState();
      if (details.open) scrollLlmTickHeaderToTop(el, tickKey);
    });
  });
  el.scrollTop = previousScrollTop;
}

function renderPolicyInfo(data, el) {
  if (!el) return;
  const skip = new Set(['llm_log', 'llm_system', 'obs_grid', 'policy_widgets', '__policy_widgets__', '__policy_name__', 'diary', 'current_goals', 'world_model']);
  let html = '';
  for (const [k, v] of Object.entries(data)) {
    if (skip.has(k)) continue;
    const val = typeof v === 'object' ? JSON.stringify(v) : String(v);
    html += `<div class="row"><span class="key">${esc(k)}:</span> <span class="val">${esc(val)}</span></div>`;
  }
  el.innerHTML = html;
}

function isObservedRelativeCoord(dr, dc) {
  if (!Number.isFinite(dr) || !Number.isFinite(dc)) return false;
  return Math.sqrt(dr * dr + dc * dc) <= VISION_R + 0.5;
}

function renderSquareCellMap(container, mapClass, cellClass, cellAt) {
  if (!container) return;
  const gridGap = 1;
  const availableWidth = Math.max(0, container.clientWidth - 16);
  const availableHeight = Math.max(0, container.clientHeight - 16);
  const mapSize = Math.max(0, Math.min(availableWidth, availableHeight));
  const cellSize = Math.max(4, Math.floor((mapSize - (SIDE - 1) * gridGap) / SIDE));
  const gridSize = cellSize * SIDE + (SIDE - 1) * gridGap;

  let html = `<div class="${mapClass}" style="grid-template-columns:repeat(${SIDE},${cellSize}px);width:${gridSize}px;height:${gridSize}px">`;
  for (let r = -VISION_R; r <= VISION_R; r++) {
    for (let c = -VISION_R; c <= VISION_R; c++) {
      const inCircle = isObservedRelativeCoord(r, c);
      const key = `${r},${c}`;
      const cell = cellAt(r, c, key, inCircle) || {};
      const color = cell.color || (inCircle ? COLORS.empty_in : COLORS.empty_out);
      const type = cell.type || '';
      const title = cell.title || `${key} ${type}`;

      const sel = selectedCell === key ? ' selected' : '';
      html += `<div class="${cellClass}${sel}" style="background:${color}" `
           + `data-key="${key}" data-type="${esc(type)}" `
           + `onclick="selectCell('${key}')" title="${esc(title)}"></div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderObsMap(data, container = document.getElementById('policy-widget-container')) {
  const grid = data.obs_grid || {};
  renderSquareCellMap(container, 'obs-map', 'obs-cell', (r, c, key, inCircle) => {
    const cell = grid[key];
    if (r === 0 && c === 0) return { color: COLORS.self };
    if (!cell || !inCircle) return null;
    const tags = cell.tags || [];
    let type = '';
    for (const t of tags) {
      if (t.startsWith('type:')) { type = t.slice(5); break; }
    }
    return { color: entityColor(type), type };
  });
}

function normalizePolicyWidgets(rawWidgets) {
  if (rawWidgets == null) return [];
  const values = Array.isArray(rawWidgets) ? rawWidgets : [rawWidgets];
  const widgets = [];
  values.forEach((rawWidget, index) => {
    if (typeof rawWidget === 'string') {
      widgets.push({ id: rawWidget, module: rawWidget, title: titleForWidget(rawWidget), config: {} });
      return;
    }
    if (!rawWidget || typeof rawWidget !== 'object') return;
    const moduleName = String(rawWidget.module || rawWidget.type || rawWidget.name || rawWidget.id || '');
    if (!moduleName) return;
    widgets.push({
      id: String(rawWidget.id || moduleName || `widget_${index}`),
      module: moduleName,
      title: String(rawWidget.title || titleForWidget(moduleName)),
      config: rawWidget.config && typeof rawWidget.config === 'object' ? rawWidget.config : {},
    });
  });
  return widgets;
}

function clonePolicyWidgetDefinition(widget) {
  const cloned = {
    id: widget.id,
    module: widget.module,
    title: widget.title,
    config: widget.config && typeof widget.config === 'object' ? Object.assign({}, widget.config) : {},
  };
  if (widget.unavailable) cloned.unavailable = true;
  return cloned;
}

function mergePolicyWidgetDefinitions(baseWidgets, extraWidgets) {
  const byId = new Map();
  baseWidgets.forEach(widget => byId.set(widget.id, clonePolicyWidgetDefinition(widget)));
  extraWidgets.forEach(widget => {
    const existing = byId.get(widget.id);
    const merged = Object.assign({}, existing || {}, clonePolicyWidgetDefinition(widget), {
      config: Object.assign({}, (existing && existing.config) || {}, widget.config || {}),
    });
    merged.unavailable = Boolean(widget.unavailable);
    byId.set(widget.id, merged);
  });
  return Array.from(byId.values());
}

function mergedPolicyWidgetId(widgetId) {
  return POLICY_WIDGET_MERGES[widgetId] || widgetId;
}

function uniqueMergedPolicyWidgetIds(widgetIds) {
  const seen = new Set();
  return (Array.isArray(widgetIds) ? widgetIds : []).map(mergedPolicyWidgetId).filter(widgetId => {
    if (seen.has(widgetId)) return false;
    seen.add(widgetId);
    return true;
  });
}

function migratePolicyWidgetLayoutNode(node) {
  if (!node || typeof node !== 'object') return;
  if (node.type === 'leaf') {
    node.widgets = uniqueMergedPolicyWidgetIds(node.widgets);
    if (node.selected) node.selected = mergedPolicyWidgetId(node.selected);
    if (!node.widgets.includes(node.selected)) node.selected = node.widgets[0] || null;
    return;
  }
  migratePolicyWidgetLayoutNode(node.first);
  migratePolicyWidgetLayoutNode(node.second);
}

function migrateMergedPolicyWidgets() {
  const hadObsMap = (
    Array.isArray(clientState.policyWidgets) && clientState.policyWidgets.includes('obs_map')
  ) || (
    Array.isArray(clientState.policyClientWidgets) && clientState.policyClientWidgets.includes('obs_map')
  );
  if (Array.isArray(clientState.policyWidgets)) {
    clientState.policyWidgets = uniqueMergedPolicyWidgetIds(clientState.policyWidgets);
  }
  if (Array.isArray(clientState.policyClientWidgets)) {
    clientState.policyClientWidgets = uniqueMergedPolicyWidgetIds(clientState.policyClientWidgets);
  }
  if (clientState.policyWidgetLayout) migratePolicyWidgetLayoutNode(clientState.policyWidgetLayout);
  if (clientState.policyClientWidgetLayout) migratePolicyWidgetLayoutNode(clientState.policyClientWidgetLayout);
  delete policyWidgetCatalog.obs_map;
  if (hadObsMap && !policyWidgetState.toolsy_world_model) policyWidgetState.toolsy_world_model = {};
}

function titleForWidget(moduleName) {
  return String(moduleName).replace(/[_-]+/g, ' ').replace(/\b\w/g, ch => ch.toUpperCase());
}

function registerPolicyWidgetModule(moduleName, module) {
  policyWidgetModules.set(moduleName, module);
}

function sendPolicyWidgetRequest(message) {
  if (!agentPanelWs || agentPanelWs.readyState !== WebSocket.OPEN) return false;
  agentPanelWs.send(JSON.stringify(message));
  return true;
}

function createPolicyWidgetContext(widget, data, container) {
  const stateKey = widget.id;
  if (!policyWidgetState[stateKey]) policyWidgetState[stateKey] = {};
  return {
    agentId: selectedAgentId,
    widget,
    config: widget.config || {},
    data,
    container,
    websocket: agentPanelWs,
    state: policyWidgetState[stateKey],
    send(message) {
      return sendPolicyWidgetRequest(message);
    },
    requestState(extra = {}) {
      return sendPolicyWidgetRequest({ type: 'get_state', request_id: `${widget.id}:state:${Date.now()}`, ...extra });
    },
    requestLog(extra = {}) {
      return sendPolicyWidgetRequest({ type: 'get_log', request_id: `${widget.id}:log:${Date.now()}`, ...extra });
    },
    sendAction(actionName) {
      return sendAgentAction(actionName);
    },
    saveState() {
      clientState.policyWidgetState = policyWidgetState;
      saveClientState();
    },
  };
}

function policyWidgetsFromData(_data = {}) {
  const availableWidgets = mergePolicyWidgetDefinitions(BUILTIN_POLICY_WIDGETS, []);
  rememberPolicyWidgetDefinitions(availableWidgets);
  return mergePolicyWidgetDefinitions(availableWidgets, unavailableActivePolicyWidgets(availableWidgets));
}

function rememberPolicyWidgetDefinitions(widgets) {
  widgets.forEach(widget => {
    if (widget.unavailable) return;
    policyWidgetCatalog[widget.id] = clonePolicyWidgetDefinition(widget);
  });
  clientState.policyWidgetCatalog = policyWidgetCatalog;
}

function unavailableActivePolicyWidgets(availableWidgets) {
  const available = new Set(availableWidgets.map(widget => widget.id));
  const storedIds = AGENT_CLIENT_MODE ? clientState.policyClientWidgets : clientState.policyWidgets;
  const activeIds = Array.isArray(storedIds) ? storedIds : [];
  return activeIds
    .filter(widgetId => !available.has(widgetId))
    .map(widgetId => {
      const stored = policyWidgetCatalog[widgetId] || {
        id: widgetId,
        module: widgetId,
        title: titleForWidget(widgetId),
        config: {},
      };
      return Object.assign({}, clonePolicyWidgetDefinition(stored), { unavailable: true });
    });
}

function defaultPolicyWidgetIds(widgets) {
  const available = new Set(widgets.filter(widget => !widget.unavailable).map(widget => widget.id));
  const builtins = BUILTIN_POLICY_WIDGETS.map(widget => widget.id).filter(widgetId => available.has(widgetId));
  if (builtins.length > 0) return builtins;
  return [];
}

function defaultPolicyClientWidgetIds(widgets) {
  const available = new Set(widgets.filter(widget => !widget.unavailable).map(widget => widget.id));
  const preferred = ['agent_status', 'toolsy_world_model', 'entities', 'llm_log', 'toolsy_goals', 'toolsy_autopilocy', 'toolsy_diary'];
  const ids = preferred.filter(widgetId => available.has(widgetId));
  if (ids.length > 0) return ids;
  return defaultPolicyWidgetIds(widgets);
}

function activePolicyWidgetIds(widgets) {
  const available = new Set(widgets.map(widget => widget.id));
  let ids = AGENT_CLIENT_MODE ? clientState.policyClientWidgets : clientState.policyWidgets;
  if (!Array.isArray(ids)) {
    ids = AGENT_CLIENT_MODE ? defaultPolicyClientWidgetIds(widgets) : defaultPolicyWidgetIds(widgets);
  }
  ids = uniqueMergedPolicyWidgetIds(ids);
  ids = ids.filter(id => available.has(id));
  if (AGENT_CLIENT_MODE) clientState.policyClientWidgets = ids;
  else clientState.policyWidgets = ids;
  return ids;
}

function setActivePolicyWidgetIds(ids) {
  if (AGENT_CLIENT_MODE) clientState.policyClientWidgets = uniqueMergedPolicyWidgetIds(ids);
  else clientState.policyWidgets = uniqueMergedPolicyWidgetIds(ids);
  saveClientState();
}

function defaultPolicyWidgetLayout(widgetIds) {
  const leaf = widgetId => ({ type: 'leaf', widgets: [widgetId], selected: widgetId });
  const has = widgetId => widgetIds.includes(widgetId);
  if (has('llm_log') && has('policy_info') && has('toolsy_world_model') && has('entities')) {
    return {
      type: 'split',
      direction: 'vertical',
      ratio: 0.5,
      first: {
        type: 'split',
        direction: 'horizontal',
        ratio: 0.42,
        first: leaf('llm_log'),
        second: leaf('toolsy_world_model'),
      },
      second: {
        type: 'split',
        direction: 'horizontal',
        ratio: 0.42,
        first: leaf('policy_info'),
        second: leaf('entities'),
      },
    };
  }
  if (widgetIds.length <= 1) return { type: 'leaf', widgets: widgetIds.slice(0, 1), selected: widgetIds[0] || null };
  return {
    type: 'split',
    direction: 'vertical',
    ratio: 0.5,
    first: leaf(widgetIds[0]),
    second: { type: 'leaf', widgets: widgetIds.slice(1), selected: widgetIds[1] || null },
  };
}

function stackPolicyClientLayouts(layouts) {
  if (layouts.length <= 1) return layouts[0] || { type: 'leaf', widgets: [], selected: null };
  const first = layouts[0];
  return {
    type: 'split',
    direction: 'horizontal',
    ratio: first.compact ? 0.14 : 0.5,
    first,
    second: stackPolicyClientLayouts(layouts.slice(1)),
  };
}

function defaultPolicyClientWidgetLayout(widgetIds) {
  const leaf = widgetId => ({ type: 'leaf', widgets: [widgetId], selected: widgetId });
  const leafOrNull = widgetId => widgetIds.includes(widgetId) ? leaf(widgetId) : null;
  const split = (direction, ratio, first, second) => {
    if (!first) return second;
    if (!second) return first;
    return { type: 'split', direction, ratio, first, second };
  };
  if (!widgetIds.includes('toolsy_world_model')) return defaultPolicyWidgetLayout(widgetIds);
  const leftColumn = split('horizontal', 0.12, leafOrNull('agent_status'),
    split('horizontal', 0.62, leafOrNull('toolsy_world_model'), leafOrNull('entities')));
  const middleColumn = leafOrNull('llm_log');
  const rightColumn = split('horizontal', 0.43, leafOrNull('toolsy_goals'),
    split('horizontal', 0.39, leafOrNull('toolsy_autopilocy'), leafOrNull('toolsy_diary')));
  const mainLayout = split('vertical', 0.36, leftColumn, split('vertical', 0.5, middleColumn, rightColumn));
  const known = new Set(['agent_status', 'toolsy_world_model', 'entities', 'llm_log', 'toolsy_goals', 'toolsy_autopilocy', 'toolsy_diary']);
  const extra = widgetIds.filter(widgetId => !known.has(widgetId));
  if (extra.length === 0) return mainLayout || defaultPolicyWidgetLayout(widgetIds);
  return split('horizontal', 0.86, mainLayout, { type: 'leaf', widgets: extra, selected: extra[0] || null });
}


function policyWidgetConfig() {
  return {
    containerId: 'policy-widget-container',
    itemKey: 'widgets',
    rootPath: 'widgets',
    itemClass: 'policy-widget',
    headerClass: 'policy-widget-header',
    bodyClass: 'policy-widget-body',
    titleClass: 'policy-widget-title',
    statusClass: 'policy-widget-status',
    tabsClass: 'policy-widget-tabs',
    tabClass: 'policy-widget-tab',
    closeClass: 'policy-widget-close',
    splitterClass: 'policy-widget-splitter',
    dropHighlightClass: 'policy-widget-drop-highlight',
    placeholderClass: 'policy-widget-placeholder',
    itemIdDataset: 'policyWidgetId',
    itemModuleDataset: 'policyWidgetModule',
    itemAreaDataset: 'policyWidgetAreaPath',
    splitPathDataset: 'policyWidgetSplitPath',
    definitions: policyWidgetsFromData,
    activeIds: activePolicyWidgetIds,
    setActiveIds: setActivePolicyWidgetIds,
    getStoredLayout: () => AGENT_CLIENT_MODE ? clientState.policyClientWidgetLayout : clientState.policyWidgetLayout,
    setStoredLayout: layout => {
      if (AGENT_CLIENT_MODE) clientState.policyClientWidgetLayout = layout;
      else clientState.policyWidgetLayout = layout;
    },
    defaultLayout: AGENT_CLIENT_MODE ? defaultPolicyClientWidgetLayout : defaultPolicyWidgetLayout,
    currentData: () => lastData || {},
    emptyText: count => count > 0 ? 'Use + to add a policy widget.' : 'No policy widgets available.',
    allAddedText: count => count > 0 ? 'All widgets added' : 'No widgets available',
    menuId: 'policy-widget-menu',
    addButtonId: 'add-policy-widget',
    onRenderItem(body, widget, data) {
      body.className = 'policy-widget-body';
      if (widget.unavailable) {
        body.innerHTML = '<div class="policy-widget-placeholder">Widget not available for this agent.</div>';
        return;
      }
      const module = policyWidgetModules.get(widget.module);
      if (!module || typeof module.render !== 'function') {
        body.innerHTML = `<div class="policy-widget-placeholder">No browser module registered for ${esc(widget.module)}</div>`;
        return;
      }
      module.render(body, createPolicyWidgetContext(widget, data, body));
    },
    save: saveClientState,
  };
}
