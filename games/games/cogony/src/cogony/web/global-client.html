function finiteNumber(value, fallback = null) {
  const num = Number(value);
  return Number.isFinite(num) ? num : fallback;
}

const WORLD_OBJECT_MEMORY_VERSION = 3;
const WORLD_OBJECT_MIN_CELL_PX = 2;
const WORLD_OBJECT_MAX_CELL_PX = 76;
const WORLD_OBJECT_ZOOM_STEP = 1.15;
const WORLD_OBJECT_INFO_MIN_HEIGHT = 72;
const WORLD_OBJECT_INFO_MAX_HEIGHT = 360;
const WORLD_OBJECT_INFO_DEFAULT_HEIGHT = 128;

function normalizeWorldCenter(value) {
  if (!Array.isArray(value) || value.length < 2) return null;
  const row = finiteNumber(value[0]);
  const col = finiteNumber(value[1]);
  return row == null || col == null ? null : [row, col];
}

function worldModelCenterForData(data) {
  const model = data.world_model || data.__world_model__ || {};
  return normalizeWorldCenter(model.center);
}

function agentStateKey(context) {
  return String(context && context.agentId != null ? context.agentId : selectedAgentId);
}

function requestWorldModelRecenterOnAgent(agentId = selectedAgentId) {
  const state = policyWidgetState.toolsy_world_model || (policyWidgetState.toolsy_world_model = {});
  state.worldObjectRecenterAgent = String(normalizeAgentId(agentId));
  state.worldObjectRecenterRequest = Date.now();
  clientState.policyWidgetState = policyWidgetState;
  saveClientState();
}

function ensureWorldObjectMemoryVersion(context) {
  if (!context || !context.state) return;
  if (context.state.worldObjectMemoryVersion === WORLD_OBJECT_MEMORY_VERSION) return;
  delete context.state.objectsByAgent;
  delete context.state.centerByAgent;
  delete context.state.lastMovementTickByAgent;
  context.state.worldObjectMemoryVersion = WORLD_OBJECT_MEMORY_VERSION;
  if (context.saveState) context.saveState();
}

function movementDeltaForAction(actionName) {
  const deltas = {
    move_north: [-1, 0],
    move_south: [1, 0],
    move_west: [0, -1],
    move_east: [0, 1],
  };
  return deltas[String(actionName || '').toLowerCase()] || null;
}

function lastActionMoveForData(data) {
  const globals = data.obs_global || data.__obs_global__ || {};
  const value = data.last_action_move ?? globals.last_action_move;
  if (value === true) return true;
  if (value === false || value == null) return false;
  return Number(value) > 0;
}

function updateEstimatedAgentCenter(context, data, obsCenter) {
  if (!context || !context.state) return obsCenter || null;
  ensureWorldObjectMemoryVersion(context);
  if (!context.state.centerByAgent) context.state.centerByAgent = {};
  if (!context.state.lastMovementTickByAgent) context.state.lastMovementTickByAgent = {};
  const agentKey = agentStateKey(context);
  const previous = normalizeWorldCenter(context.state.centerByAgent[agentKey]);
  if (obsCenter) {
    context.state.centerByAgent[agentKey] = obsCenter;
    if (context.saveState) context.saveState();
    return obsCenter;
  }
  if (!previous) return null;
  if (!lastActionMoveForData(data)) return previous;
  const tick = Number(data.__tick ?? data.step ?? 0);
  const tickKey = Number.isFinite(tick) && tick > 0 ? String(tick) : '';
  if (tickKey && context.state.lastMovementTickByAgent[agentKey] === tickKey) return previous;
  const delta = movementDeltaForAction(data.last_action);
  if (!delta) return previous;
  const next = [previous[0] + delta[0], previous[1] + delta[1]];
  context.state.centerByAgent[agentKey] = next;
  if (tickKey) context.state.lastMovementTickByAgent[agentKey] = tickKey;
  if (context.saveState) context.saveState();
  return next;
}

function observationCenterForData(data, context, fallbackCenter = null) {
  const obsCenter = normalizeWorldCenter(data.obs_center || data.__obs_center__);
  if (obsCenter) return updateEstimatedAgentCenter(context, data, obsCenter);
  const estimatedCenter = updateEstimatedAgentCenter(context, data, null);
  if (estimatedCenter) return estimatedCenter;
  const fallback = normalizeWorldCenter(fallbackCenter);
  return fallback ? updateEstimatedAgentCenter(context, data, fallback) : null;
}

function worldObjectZoomBounds(container, cols, rows) {
  const availableWidth = Math.max(1, container.clientWidth - 16);
  const availableHeight = Math.max(1, container.clientHeight - 16);
  const fitCellSize = Math.max(WORLD_OBJECT_MIN_CELL_PX, Math.floor(Math.min(
    availableWidth / Math.max(1, cols),
    availableHeight / Math.max(1, rows),
  )));
  const baseCellSize = Math.min(WORLD_OBJECT_MAX_CELL_PX, fitCellSize);
  return {
    baseCellSize,
    minZoom: 1,
    maxZoom: Math.max(1, WORLD_OBJECT_MAX_CELL_PX / Math.max(1, baseCellSize)),
  };
}

function clampWorldObjectZoom(value, zoomBounds = null) {
  const zoom = Number(value);
  const bounds = zoomBounds || { minZoom: 1, maxZoom: 1 };
  if (!Number.isFinite(zoom)) return bounds.minZoom;
  return Math.max(bounds.minZoom, Math.min(bounds.maxZoom, zoom));
}

function worldObjectMapZoomForContext(context, zoomBounds = null) {
  return clampWorldObjectZoom(context?.state?.worldObjectMapZoom ?? 1, zoomBounds);
}

function setWorldObjectMapZoom(context, zoom, zoomBounds = null) {
  const nextZoom = clampWorldObjectZoom(zoom, zoomBounds);
  if (!context || !context.state) return nextZoom;
  if (context.state.worldObjectMapZoom === nextZoom) return nextZoom;
  context.state.worldObjectMapZoom = nextZoom;
  if (context.saveState) context.saveState();
  return nextZoom;
}

function clampWorldObjectInfoHeight(value) {
  const height = Number(value);
  if (!Number.isFinite(height)) return WORLD_OBJECT_INFO_DEFAULT_HEIGHT;
  return Math.max(WORLD_OBJECT_INFO_MIN_HEIGHT, Math.min(WORLD_OBJECT_INFO_MAX_HEIGHT, height));
}

function worldObjectInfoHeightForContext(context) {
  return clampWorldObjectInfoHeight(context?.state?.worldObjectInfoHeight ?? WORLD_OBJECT_INFO_DEFAULT_HEIGHT);
}

function setWorldObjectInfoHeight(context, height, save = true) {
  const nextHeight = clampWorldObjectInfoHeight(height);
  if (!context || !context.state) return nextHeight;
  context.state.worldObjectInfoHeight = nextHeight;
  if (save && context.saveState) context.saveState();
  return nextHeight;
}

function worldObjectInfoCollapsedForContext(context) {
  return context?.state?.worldObjectInfoCollapsed === true;
}

function toggleWorldObjectInfoCollapsed(context) {
  if (!context || !context.state) return;
  context.state.worldObjectInfoCollapsed = !worldObjectInfoCollapsedForContext(context);
  if (context.saveState) context.saveState();
  if (AGENT_CLIENT_MODE) renderPolicyWidgets(lastData || {});
  else renderGlobalPanels(lastGlobalData || {});
}

function beginWorldObjectInfoResize(event, context) {
  if (event.button !== 0) return;
  const handle = event.currentTarget;
  const panel = handle.closest('.world-object-detail');
  if (!panel) return;
  const startY = event.clientY;
  const startHeight = panel.getBoundingClientRect().height;
  handle.classList.add('active');
  handle.setPointerCapture(event.pointerId);

  function onMove(moveEvent) {
    const nextHeight = setWorldObjectInfoHeight(context, startHeight + moveEvent.clientY - startY, false);
    panel.style.height = `${nextHeight}px`;
    moveEvent.preventDefault();
  }

  function onUp() {
    handle.classList.remove('active');
    handle.removeEventListener('pointermove', onMove);
    setWorldObjectInfoHeight(context, panel.getBoundingClientRect().height, true);
  }

  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onUp, { once: true });
  event.preventDefault();
}

function worldObjectKey(row, col, dr, dc, type) {
  if (row != null && col != null) return `abs:${row},${col}`;
  return `rel:${dr || 0},${dc || 0}:${type || 'object'}`;
}

function entityTagChip(tag) {
  return `[${tag}]`;
}

function worldObjectTokens(tags, feats) {
  const tokens = [];
  (Array.isArray(tags) ? tags : []).forEach(tag => {
    if (!String(tag).startsWith('type:')) tokens.push(entityTagChip(tag));
  });
  Object.entries(feats || {}).forEach(([key, value]) => tokens.push(`${key}=${value}`));
  return tokens;
}

function typeFromTags(tags) {
  for (const tag of Array.isArray(tags) ? tags : []) {
    if (String(tag).startsWith('type:')) return String(tag).slice(5);
  }
  return '';
}

function mergeWorldObject(target, source) {
  const object = target || {
    key: source.key,
    type: source.type || 'object',
    row: source.row,
    col: source.col,
    dr: source.dr,
    dc: source.dc,
    x: source.x,
    y: source.y,
    source: source.source,
    seenNow: false,
    props: {},
    tokens: [],
  };
  object.source = object.source || source.source;
  object.type = source.type && source.type !== 'token' ? source.type : object.type;
  object.row = object.row ?? source.row;
  object.col = object.col ?? source.col;
  object.dr = object.dr ?? source.dr;
  object.dc = object.dc ?? source.dc;
  object.x = object.x ?? source.x;
  object.y = object.y ?? source.y;
  object.seenNow = object.seenNow || Boolean(source.seenNow);
  object.props = Object.assign({}, object.props, source.props || {});
  const tokenSet = new Set(object.tokens);
  (source.tokens || []).forEach(token => tokenSet.add(String(token)));
  object.tokens = Array.from(tokenSet);
  return object;
}

function cloneWorldObject(object, seenNow = object.seenNow) {
  return {
    key: object.key,
    type: object.type,
    row: object.row,
    col: object.col,
    dr: object.dr,
    dc: object.dc,
    x: object.x,
    y: object.y,
    source: object.source,
    seenNow: Boolean(seenNow),
    props: Object.assign({}, object.props || {}),
    tokens: Array.from(object.tokens || []),
  };
}

function mergeWorldObjectLists(...lists) {
  const byKey = new Map();
  lists.flat().forEach(object => {
    if (!object || !object.key) return;
    byKey.set(object.key, mergeWorldObject(byKey.get(object.key), object));
  });
  return Array.from(byKey.values());
}

function collectKnownWallObjects(model, modelCenter) {
  const walls = Array.isArray(model.walls) ? model.walls : [];
  const objects = [];
  for (const wall of Array.isArray(walls) ? walls : []) {
    let row = finiteNumber(wall.row);
    let col = finiteNumber(wall.col);
    const fallbackDr = row != null && modelCenter ? row - modelCenter[0] : null;
    const fallbackDc = col != null && modelCenter ? col - modelCenter[1] : null;
    const dr = finiteNumber(wall.dr, fallbackDr);
    const dc = finiteNumber(wall.dc, fallbackDc);
    if ((!Number.isFinite(row) || !Number.isFinite(col)) && modelCenter && Number.isFinite(dr) && Number.isFinite(dc)) {
      row = modelCenter[0] + dr;
      col = modelCenter[1] + dc;
    }
    if ((!Number.isFinite(row) || !Number.isFinite(col)) && (!Number.isFinite(dr) || !Number.isFinite(dc))) continue;
    const key = worldObjectKey(row, col, dr, dc, 'wall');
    objects.push({
      key,
      type: 'wall',
      row,
      col,
      dr,
      dc,
      x: Number.isFinite(col) ? col : dc,
      y: Number.isFinite(row) ? row : dr,
      source: 'world_model',
      seenNow: false,
      props: { wall: 1 },
      tokens: [],
    });
  }
  return objects;
}

function worldObjectMemoryForContext(context) {
  if (!context || !context.state) return null;
  ensureWorldObjectMemoryVersion(context);
  if (!context.state.objectsByAgent) context.state.objectsByAgent = {};
  const agentKey = agentStateKey(context);
  if (!context.state.objectsByAgent[agentKey]) context.state.objectsByAgent[agentKey] = {};
  return context.state.objectsByAgent[agentKey];
}

function rememberWorldObjects(context, objects) {
  const memory = worldObjectMemoryForContext(context);
  if (!memory) return false;
  let changed = false;
  objects.forEach(object => {
    if (!object || !object.key || object.props?.self) return;
    if (object.source === 'obs_grid') return;
    if (!Number.isFinite(object.row) || !Number.isFinite(object.col)) return;
    const remembered = cloneWorldObject(object, false);
    const before = JSON.stringify(memory[object.key] || null);
    memory[object.key] = cloneWorldObject(mergeWorldObject(memory[object.key], remembered), false);
    if (JSON.stringify(memory[object.key]) !== before) changed = true;
  });
  if (changed && context.saveState) context.saveState();
  return changed;
}

function collectRememberedWorldObjects(context) {
  const memory = worldObjectMemoryForContext(context);
  if (!memory) return [];
  return Object.values(memory).map(object => cloneWorldObject(object, false));
}

function collectWorldObjects(data, context = {}) {
  const model = data.world_model || data.__world_model__ || {};
  const modelCenter = worldModelCenterForData(data);
  const obsCenter = observationCenterForData(data, context, modelCenter);
  const byKey = new Map();

  for (const wall of collectKnownWallObjects(model, modelCenter)) {
    byKey.set(wall.key, mergeWorldObject(byKey.get(wall.key), wall));
  }

  for (const entity of Array.isArray(model.entities) ? model.entities : []) {
    const type = String(entity.type || 'object');
    const row = finiteNumber(entity.row);
    const col = finiteNumber(entity.col);
    const dr = finiteNumber(entity.dr, row != null && modelCenter ? row - modelCenter[0] : 0);
    const dc = finiteNumber(entity.dc, col != null && modelCenter ? col - modelCenter[1] : 0);
    const key = worldObjectKey(row, col, dr, dc, type);
    const props = {};
    for (const [prop, value] of Object.entries(entity)) {
      if (['type', 'row', 'col', 'dr', 'dc'].includes(prop)) continue;
      props[prop] = value;
    }
    byKey.set(key, mergeWorldObject(byKey.get(key), {
      key,
      type,
      row,
      col,
      dr,
      dc,
      x: col ?? dc,
      y: row ?? dr,
      source: 'world_model',
      props,
      tokens: [],
    }));
  }

  for (const [relativeLocation, cell] of Object.entries(data.obs_grid || {})) {
    const [dr, dc] = String(relativeLocation).split(',').map(Number);
    if (!Number.isFinite(dr) || !Number.isFinite(dc)) continue;
    if (!isObservedRelativeCoord(dr, dc)) continue;
    const tags = cell.tags || [];
    const feats = cell.feats || {};
    const type = typeFromTags(tags) || (Object.keys(feats).length || tags.length ? 'token' : '');
    if (!type) continue;
    const row = obsCenter ? obsCenter[0] + dr : null;
    const col = obsCenter ? obsCenter[1] + dc : null;
    const key = worldObjectKey(row, col, dr, dc, type);
    byKey.set(key, mergeWorldObject(byKey.get(key), {
      key,
      type,
      row,
      col,
      dr,
      dc,
      x: col ?? dc,
      y: row ?? dr,
      source: 'obs_grid',
      seenNow: true,
      props: { dr, dc, dist: Math.abs(dr) + Math.abs(dc) },
      tokens: worldObjectTokens(tags, feats),
    }));
  }

  const center = obsCenter || modelCenter;
  if (center) {
    const key = worldObjectKey(center[0], center[1], 0, 0, 'agent');
    byKey.set(key, mergeWorldObject(byKey.get(key), {
      key,
      type: 'agent',
      row: center[0],
      col: center[1],
      dr: 0,
      dc: 0,
      x: center[1],
      y: center[0],
      source: 'obs_grid',
      seenNow: true,
      props: { self: 1, dr: 0, dc: 0, dist: 0 },
      tokens: [],
    }));
  }

  return Array.from(byKey.values()).sort((a, b) => {
    const seen = Number(b.seenNow) - Number(a.seenNow);
    if (seen) return seen;
    return (Number(a.props.dist ?? Math.abs(a.dr || 0) + Math.abs(a.dc || 0)))
      - (Number(b.props.dist ?? Math.abs(b.dr || 0) + Math.abs(b.dc || 0)));
  });
}

function objectAtCoord(objects) {
  const byCoord = new Map();
  objects.forEach(object => {
    if (!Number.isFinite(object.x) || !Number.isFinite(object.y)) return;
    const key = `${object.x},${object.y}`;
    const existing = byCoord.get(key);
    if (existing?.type === 'wall' && object.type !== 'wall') {
      byCoord.set(key, object);
      return;
    }
    if (!existing || (!existing.seenNow && object.seenNow)) byCoord.set(key, object);
  });
  return byCoord;
}

function observedWorldCoords(data, currentObjects) {
  const self = currentObjects.find(object => object.props?.self && Number.isFinite(object.row) && Number.isFinite(object.col));
  const hasAbsoluteCenter = Boolean(self);
  const centerRow = hasAbsoluteCenter ? self.row : 0;
  const centerCol = hasAbsoluteCenter ? self.col : 0;
  const observed = new Set();
  if (hasAbsoluteCenter) {
    for (let dr = -VISION_R; dr <= VISION_R; dr++) {
      for (let dc = -VISION_R; dc <= VISION_R; dc++) {
        if (!isObservedRelativeCoord(dr, dc)) continue;
        observed.add(`${centerCol + dc},${centerRow + dr}`);
      }
    }
    return observed;
  }
  for (const relativeLocation of Object.keys(data.obs_grid || {})) {
    const [dr, dc] = String(relativeLocation).split(',').map(Number);
    if (isObservedRelativeCoord(dr, dc)) observed.add(`${dc},${dr}`);
  }
  return observed;
}

function updateWorldObjectPanDataset(container) {
  if (!container) return;
  container.dataset.worldObjectPan = `${Math.round(container.scrollLeft)},${Math.round(container.scrollTop)}`;
}

function worldObjectZoomAnchor(container, event) {
  const rect = container.getBoundingClientRect();
  const cursorX = event.clientX - rect.left;
  const cursorY = event.clientY - rect.top;
  const map = container.querySelector('.world-object-map');
  if (!map) return { cursorX, cursorY, mapX: cursorX + container.scrollLeft, mapY: cursorY + container.scrollTop, mapWidth: 1, mapHeight: 1 };
  const mapRect = map.getBoundingClientRect();
  return {
    cursorX,
    cursorY,
    mapX: event.clientX - mapRect.left,
    mapY: event.clientY - mapRect.top,
    mapWidth: Math.max(1, map.offsetWidth || mapRect.width),
    mapHeight: Math.max(1, map.offsetHeight || mapRect.height),
  };
}

function restoreWorldObjectZoomAnchor(container, anchor) {
  if (!container || !anchor) return;
  const map = container.querySelector('.world-object-map');
  if (!map) return;
  const rect = container.getBoundingClientRect();
  const mapRect = map.getBoundingClientRect();
  const newMapWidth = Math.max(1, map.offsetWidth || mapRect.width);
  const newMapHeight = Math.max(1, map.offsetHeight || mapRect.height);
  const ratioX = newMapWidth / Math.max(1, anchor.mapWidth);
  const ratioY = newMapHeight / Math.max(1, anchor.mapHeight);
  const mapLeft = mapRect.left - rect.left + container.scrollLeft;
  const mapTop = mapRect.top - rect.top + container.scrollTop;
  container.scrollLeft = Math.max(0, mapLeft + anchor.mapX * ratioX - anchor.cursorX);
  container.scrollTop = Math.max(0, mapTop + anchor.mapY * ratioY - anchor.cursorY);
}

function recenterWorldObjectMapOnAgent(container, objects, minX, minY, cellSize, context = {}) {
  if (!container || !context || !context.state) return false;
  if (String(context.state.worldObjectRecenterAgent ?? '') !== agentStateKey(context)) return false;
  const self = objects.find(object => object.props?.self && Number.isFinite(object.x) && Number.isFinite(object.y));
  if (!self) return false;
  const stride = cellSize + 1;
  const targetLeft = (self.x - minX) * stride + (cellSize / 2) - (container.clientWidth / 2);
  const targetTop = (self.y - minY) * stride + (cellSize / 2) - (container.clientHeight / 2);
  container.scrollLeft = Math.max(0, targetLeft);
  container.scrollTop = Math.max(0, targetTop);
  delete context.state.worldObjectRecenterAgent;
  delete context.state.worldObjectRecenterRequest;
  if (context.saveState) context.saveState();
  updateWorldObjectPanDataset(container);
  return true;
}

function centerWorldObjectMapOnObject(container, object, minX, minY, cellSize, context) {
  if (!container || !object || !Number.isFinite(object.x) || !Number.isFinite(object.y)) return false;
  const stride = cellSize + 1;
  const targetLeft = (object.x - minX) * stride + (cellSize / 2) - (container.clientWidth / 2);
  const targetTop = (object.y - minY) * stride + (cellSize / 2) - (container.clientHeight / 2);
  container.scrollLeft = Math.max(0, targetLeft);
  container.scrollTop = Math.max(0, targetTop);
  if (context?.state?.worldObjectFocusKey === object.key) {
    delete context.state.worldObjectFocusKey;
    if (context.saveState) context.saveState();
  }
  updateWorldObjectPanDataset(container);
  return true;
}

function consumeWorldObjectSuppressedClick(container, event) {
  if (container.dataset.worldObjectSuppressClick !== 'true') return false;
  delete container.dataset.worldObjectSuppressClick;
  event.preventDefault();
  event.stopPropagation();
  return true;
}

function worldObjectCellForEvent(container, event) {
  const cell = event.target.closest('.world-object-cell.object');
  return cell && container.contains(cell) ? cell : null;
}

function applyWorldObjectSelection(key, object = null, context = null) {
  selectedCell = key;
  clientState.selectedCell = selectedCell;
  if (!AGENT_CLIENT_MODE && object?.props?.agent_id != null) setSelectedAgentId(object.props.agent_id);
  if (context?.state) context.state.worldObjectInfoCollapsed = false;
}

function beginWorldObjectMapPan(event) {
  if (event.button !== 0) return;
  if (event.target.closest('.world-object-cell.object')) return;
  const container = event.currentTarget;
  const startX = event.clientX;
  const startY = event.clientY;
  const startScrollLeft = container.scrollLeft;
  const startScrollTop = container.scrollTop;
  let moved = false;
  container.setPointerCapture(event.pointerId);

  function onMove(moveEvent) {
    const dx = moveEvent.clientX - startX;
    const dy = moveEvent.clientY - startY;
    if (!moved && Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
    moved = true;
    container.classList.add('is-panning');
    container.scrollLeft = startScrollLeft - dx;
    container.scrollTop = startScrollTop - dy;
    updateWorldObjectPanDataset(container);
    moveEvent.preventDefault();
  }

  function onUp() {
    container.classList.remove('is-panning');
    container.removeEventListener('pointermove', onMove);
    if (moved) {
      container.dataset.worldObjectSuppressClick = 'true';
      setTimeout(() => { delete container.dataset.worldObjectSuppressClick; }, 250);
    }
    updateWorldObjectPanDataset(container);
  }

  container.addEventListener('pointermove', onMove);
  container.addEventListener('pointerup', onUp, { once: true });
}

function renderWorldObjectMap(objects, container, bounds = {}, context = {}, observedCoords = new Set()) {
  if (!container) return;
  const placed = objects.filter(object => Number.isFinite(object.x) && Number.isFinite(object.y));
  const byKey = new Map(placed.map(object => [object.key, object]));
  if (context?.state) context.state.lastWorldObjects = objects.map(object => cloneWorldObject(object));
  if (placed.length === 0) {
    container.innerHTML = '<div class="policy-widget-placeholder">No known objects yet.</div>';
    return;
  }
  const observedPoints = Array.from(observedCoords).map(coord => {
    const [x, y] = coord.split(',').map(Number);
    return { x, y };
  }).filter(coord => Number.isFinite(coord.x) && Number.isFinite(coord.y));
  const xs = [...placed.map(object => object.x), ...observedPoints.map(coord => coord.x)];
  const ys = [...placed.map(object => object.y), ...observedPoints.map(coord => coord.y)];
  const minX = Math.min(...xs, finiteNumber(bounds.min_col, xs[0])) - 1;
  const maxX = Math.max(...xs, finiteNumber(bounds.max_col, xs[0])) + 1;
  const minY = Math.min(...ys, finiteNumber(bounds.min_row, ys[0])) - 1;
  const maxY = Math.max(...ys, finiteNumber(bounds.max_row, ys[0])) + 1;
  const cols = maxX - minX + 1;
  const rows = maxY - minY + 1;
  const zoomBounds = worldObjectZoomBounds(container, cols, rows);
  const zoom = setWorldObjectMapZoom(context, worldObjectMapZoomForContext(context, zoomBounds), zoomBounds);
  const cellSize = Math.max(
    WORLD_OBJECT_MIN_CELL_PX,
    Math.min(WORLD_OBJECT_MAX_CELL_PX, Math.round(zoomBounds.baseCellSize * zoom)),
  );
  const focusObject = context?.state?.worldObjectFocusKey ? byKey.get(context.state.worldObjectFocusKey) : null;
  const focusPadX = focusObject ? Math.ceil(container.clientWidth / Math.max(1, 2 * (cellSize + 1))) : 0;
  const focusPadY = focusObject ? Math.ceil(container.clientHeight / Math.max(1, 2 * (cellSize + 1))) : 0;
  const renderMinX = minX - focusPadX;
  const renderMaxX = maxX + focusPadX;
  const renderMinY = minY - focusPadY;
  const renderMaxY = maxY + focusPadY;
  const renderCols = renderMaxX - renderMinX + 1;
  const byCoord = objectAtCoord(placed);
  let html = `<div class="world-object-map" style="grid-template-columns:repeat(${renderCols},${cellSize}px);width:${renderCols * cellSize + (renderCols - 1)}px">`;
  for (let y = renderMinY; y <= renderMaxY; y++) {
    for (let x = renderMinX; x <= renderMaxX; x++) {
      const object = byCoord.get(`${x},${y}`);
      const observed = observedCoords.has(`${x},${y}`) ? ' observed-now' : '';
      if (!object) {
        const unexplored = observed ? '' : ' unexplored';
        html += `<div class="world-object-cell${observed}${unexplored}"></div>`;
        continue;
      }
      const title = `${object.type} ${object.row != null && object.col != null ? `r=${object.row} c=${object.col}` : `d=${object.dr},${object.dc}`}`;
      const selected = selectedCell === object.key ? ' selected' : '';
      if (object.type === 'wall') {
        html += `<button type="button" class="world-object-cell object wall${observed}${selected}" `
          + `title="${esc(title)}" aria-label="${escAttr(title)}" data-object-key="${escAttr(object.key)}"></button>`;
        continue;
      }
      const seen = object.seenNow ? ' seen-now' : '';
      html += `<button type="button" class="world-object-cell object sprite${observed}${seen}${selected}" style="${escAttr(worldObjectCellStyle(object))}" `
        + `title="${esc(title)}" aria-label="${escAttr(title)}" data-object-key="${escAttr(object.key)}"></button>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
  container.dataset.worldObjectZoom = String(zoom);
  container.addEventListener('pointerdown', beginWorldObjectMapPan);
  if (focusObject) {
    centerWorldObjectMapOnObject(container, focusObject, renderMinX, renderMinY, cellSize, context);
  } else {
    recenterWorldObjectMapOnAgent(container, placed, minX, minY, cellSize, context);
  }
  updateWorldObjectPanDataset(container);
  container.onwheel = event => {
    if (!event.deltaY) return;
    event.preventDefault();
    const previousZoom = worldObjectMapZoomForContext(context, zoomBounds);
    const nextZoom = clampWorldObjectZoom(
      previousZoom * (event.deltaY > 0 ? WORLD_OBJECT_ZOOM_STEP : 1 / WORLD_OBJECT_ZOOM_STEP),
      zoomBounds,
    );
    if (nextZoom === previousZoom) return;
    const anchor = worldObjectZoomAnchor(container, event);
    setWorldObjectMapZoom(context, nextZoom, zoomBounds);
    renderWorldObjectMap(objects, container, bounds, context, observedCoords);
    restoreWorldObjectZoomAnchor(container, anchor);
    updateWorldObjectPanDataset(container);
  };
  container.ondblclick = event => {
    if (consumeWorldObjectSuppressedClick(container, event)) return;
    const cell = worldObjectCellForEvent(container, event);
    if (!cell) return;
    const object = byKey.get(cell.getAttribute('data-object-key'));
    if (!object) return;
    event.preventDefault();
    event.stopPropagation();
    applyWorldObjectSelection(object.key, object, context);
    if (context?.state) context.state.worldObjectFocusKey = object.key;
    const targetZoom = 36 / Math.max(1, zoomBounds.baseCellSize);
    setWorldObjectMapZoom(context, Math.max(worldObjectMapZoomForContext(context, zoomBounds), targetZoom), zoomBounds);
    if (context?.saveState) context.saveState();
    else saveClientState();
    renderWorldObjectMap(objects, container, bounds, context, observedCoords);
    const detailHost = container.parentElement?.querySelector('.world-object-detail');
    if (detailHost) renderWorldObjectDetails(objects, detailHost, context);
  };
  container.onclick = event => {
    if (consumeWorldObjectSuppressedClick(container, event)) return;
    const cell = worldObjectCellForEvent(container, event);
    if (!cell) return;
    cell.classList.add('selected');
    selectWorldObjectCell(cell.getAttribute('data-object-key'), context);
  };
  container.querySelectorAll('.world-object-cell.object').forEach(cell => {
    const selectObject = event => {
      event.stopPropagation();
      event.preventDefault();
      cell.classList.add('selected');
      selectWorldObjectCell(cell.getAttribute('data-object-key'), context);
    };
    cell.onclick = event => selectObject(event);
    cell.onkeydown = event => {
      if (event.key === 'Enter' || event.key === ' ') selectObject(event);
    };
  });
}

function selectedWorldObject(objects) {
  return objects.find(object => object.key === selectedCell) || null;
}

function renderWorldObjectDetails(objects, el, context = {}) {
  if (!el) return;
  const object = selectedWorldObject(objects);
  const collapsed = worldObjectInfoCollapsedForContext(context);
  el.hidden = false;
  el.classList.toggle('collapsed', collapsed);
  el.style.height = collapsed ? '30px' : `${worldObjectInfoHeightForContext(context)}px`;
  const toggleLabel = collapsed ? 'Expand info panel' : 'Collapse info panel to bottom';
  const toggleText = worldObjectInfoToggleIcon(collapsed);
  const headerTitle = object ? object.type : 'Info';
  const headerColor = object ? entityColor(object.type) : '';
  if (collapsed) {
    el.innerHTML = '<div class="world-object-info-panel">'
      + '<div class="world-object-detail-head">'
      + `<span class="world-object-type" style="color:${headerColor}">${esc(headerTitle)}</span>`
      + `<button type="button" class="world-object-info-toggle" title="${escAttr(toggleLabel)}">${toggleText}</button>`
      + '</div></div>';
    el.querySelector('.world-object-info-toggle').addEventListener('click', () => toggleWorldObjectInfoCollapsed(context));
    return;
  }
  if (!object) {
    el.innerHTML = '<div class="world-object-info-resize-handle" title="Drag to resize"></div>'
      + '<div class="world-object-info-panel">'
      + '<div class="world-object-detail-head">'
      + '<span class="world-object-type">Info</span>'
      + `<button type="button" class="world-object-info-toggle" title="Collapse info panel to bottom">${worldObjectInfoToggleIcon(false)}</button>`
      + '</div><div class="policy-widget-placeholder">Click an object on the map.</div></div>';
    el.querySelector('.world-object-info-toggle').addEventListener('click', () => toggleWorldObjectInfoCollapsed(context));
    el.querySelector('.world-object-info-resize-handle').addEventListener('pointerdown', event => beginWorldObjectInfoResize(event, context));
    return;
  }
  const color = entityColor(object.type);
  const props = Object.assign({}, object.props);
  if (object.row != null) props.row = object.row;
  if (object.col != null) props.col = object.col;
  if (object.dr != null) props.dr = object.dr;
  if (object.dc != null) props.dc = object.dc;
  let html = '<div class="world-object-info-resize-handle" title="Drag to resize"></div>'
    + '<div class="world-object-info-panel">'
    + '<div class="world-object-detail-head">'
    + `<span class="world-object-type" style="color:${color}">${esc(object.type)}</span>`
    + `<button type="button" class="world-object-info-toggle" title="Collapse info panel to bottom">${worldObjectInfoToggleIcon(false)}</button>`
    + '</div><div class="world-object-detail-head">'
    + '<span></span>'
    + `<span class="world-object-seen-now">${object.seenNow ? 'currently seen' : 'remembered'}</span>`
    + '</div>';
  html += '<div class="world-object-props">';
  Object.entries(props).forEach(([key, value]) => {
    html += `<span class="world-object-prop">${esc(key)}=${esc(value)}</span>`;
  });
  html += '</div><div class="world-object-tokens">';
  if (object.tokens.length === 0) html += '<span class="world-object-token">no tokens</span>';
  object.tokens.forEach(token => { html += `<span class="world-object-token">${esc(token)}</span>`; });
  html += '</div></div>';
  el.innerHTML = html;
  el.querySelector('.world-object-info-toggle').addEventListener('click', () => toggleWorldObjectInfoCollapsed(context));
  el.querySelector('.world-object-info-resize-handle').addEventListener('pointerdown', event => beginWorldObjectInfoResize(event, context));
}

function renderToolsyWorldModel(data, el, context = {}) {
  if (!el) return;
  const model = data.world_model || data.__world_model__ || {};
  const currentObjects = collectWorldObjects(data, context);
  const observedCoords = observedWorldCoords(data, currentObjects);
  rememberWorldObjects(context, currentObjects);
  const objects = mergeWorldObjectLists(collectRememberedWorldObjects(context), currentObjects);
  let html = '<div class="world-object-map-host"></div>'
    + '<div class="world-object-detail"></div>';
  el.innerHTML = html;
  const mapHost = el.querySelector('.world-object-map-host');
  const detailHost = el.querySelector('.world-object-detail');
  renderWorldObjectMap(objects, mapHost, model.seen_bounds || {}, context, observedCoords);
  renderWorldObjectDetails(objects, detailHost, context);
}

function renderObsEntities(data, el) {
  if (!el) return;
  const grid = data.obs_grid || {};
  const globalTokens = data.obs_global || data.__obs_global__ || {};
  const entries = [];
  for (const [key, val] of Object.entries(grid)) {
    const [dr, dc] = key.split(',').map(Number);
    const tags = val.tags || [];
    let type = '';
    for (const t of tags) { if (t.startsWith('type:')) { type = t.slice(5); break; } }
    if (type === 'wall') continue;
    const feats = val.feats || {};
    const nonTypeTags = tags.filter(tag => !tag.startsWith('type:'));
    if (!type && nonTypeTags.length === 0 && Object.keys(feats).length === 0) continue;
    const dist = Math.abs(dr) + Math.abs(dc);
    entries.push({ key, dr, dc, dist, type: type || 'token', feats, tags: nonTypeTags });
  }
  entries.sort((a, b) => a.dist - b.dist);

  let html = '';
  const globalEntries = Object.entries(globalTokens);
  if (globalEntries.length > 0) {
    html += '<div class="global-token-list">';
    for (const [key, value] of globalEntries) {
      html += `<span class="global-token-card">${esc(key)}=${esc(value)}</span>`;
    }
    html += '</div>';
  }
  for (const e of entries) {
    const sel = selectedCell === e.key ? ' selected' : '';
    const color = entityColor(e.type);
    const pos = `(${e.dr > 0 ? '+' : ''}${e.dr},${e.dc > 0 ? '+' : ''}${e.dc})`;
    html += `<div class="entity${sel}" style="border-color:${color}88" onclick="selectCell('${e.key}')">`;
    html += '<div class="entity-head">';
    html += `<span class="epos">${esc(pos)}</span>`;
    html += `<span class="etype" style="color:${color}">${esc(e.type)}</span>`;
    html += `<span class="edist">d=${esc(e.dist)}</span>`;
    html += '</div>';
    const chips = [
      ...e.tags.map(entityTagChip),
      ...Object.entries(e.feats).map(([k, v]) => `${k}=${v}`),
    ];
    if (chips.length > 0) {
      html += '<div class="efeats">';
      for (const chip of chips) html += `<span class="feat">${esc(chip)}</span>`;
      html += '</div>';
    }
    html += '</div>';
  }
  el.innerHTML = html || '<div style="color:#555">no entities</div>';
}

function selectCell(key) {
  selectedCell = selectedCell === key ? null : key;
  clientState.selectedCell = selectedCell;
  saveClientState();
  if (lastData) renderPolicyWidgets(lastData);
}

function selectWorldObjectCell(key, context = null) {
  const object = (context?.state?.lastWorldObjects || []).find(item => item.key === key) || null;
  applyWorldObjectSelection(key, object, context);
  if (context?.saveState) context.saveState();
  else saveClientState();
  if (AGENT_CLIENT_MODE) renderPolicyWidgets(lastData || {});
  else renderGlobalPanels(lastGlobalData || {});
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return esc(s).replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

function loadClientState() {
  try {
    return JSON.parse(localStorage.getItem(COGONY_CLIENT_STATE_KEY) || '{}') || {};
  } catch (err) {
    console.warn('Failed to load Cogony client state:', err);
    return {};
  }
}

function saveClientState() {
  try {
    localStorage.setItem(COGONY_CLIENT_STATE_KEY, JSON.stringify(clientState));
  } catch (err) {
    console.warn('Failed to save Cogony client state:', err);
  }
}

function defaultPanelLayoutTree() {
  if (!AGENT_CLIENT_MODE) {
    return { type: 'leaf', panels: ['game'], selected: 'game' };
  }
  return {
    type: 'leaf',
    panels: ['agent'],
    selected: 'agent',
  };
}

function currentWorkspaceSize() {
  const workspace = document.getElementById('main');
  return {
    w: Math.max(workspace.clientWidth, 320),
    h: Math.max(workspace.clientHeight, 240),
  };
}

function panelElement(panelId) {
  return document.querySelector(`[data-panel-id="${panelId}"]`);
}

function panelLabel(panelId) {
  const panel = panelElement(panelId);
  return panel ? panel.querySelector('.panel-title').textContent.trim() : panelId;
}

function cloneLayout(node) {
  return JSON.parse(JSON.stringify(node));
}

function layoutLeaf(itemKey, itemIds = [], selected = null) {
  const leaf = { type: 'leaf', selected };
  leaf[itemKey] = Array.from(itemIds);
  return leaf;
}

function firstLayoutLeaf(node) {
  if (!node) return null;
  if (node.type === 'leaf') return node;
  return firstLayoutLeaf(node.first) || firstLayoutLeaf(node.second);
}

function normalizeLayoutTree(node, itemIds, itemKey, defaultTreeFactory) {
  if (!node || !node.type) node = defaultTreeFactory();
  const available = new Set(itemIds);
  const used = new Set();

  function visit(current) {
    if (!current || !current.type) return;
    if (current.type === 'split') {
      current.direction = current.direction === 'horizontal' ? 'horizontal' : 'vertical';
      current.ratio = Math.min(0.9, Math.max(0.1, Number(current.ratio) || 0.5));
      if (!current.first) current.first = layoutLeaf(itemKey);
      if (!current.second) current.second = layoutLeaf(itemKey);
      visit(current.first);
      visit(current.second);
      return;
    }

    current.type = 'leaf';
    current[itemKey] = (current[itemKey] || []).filter(itemId => {
      if (!available.has(itemId) || used.has(itemId)) return false;
      used.add(itemId);
      return true;
    });
    if (!current[itemKey].includes(current.selected)) {
      current.selected = current[itemKey][0] || null;
    }
  }

  visit(node);
  const missing = itemIds.filter(itemId => !used.has(itemId));
  if (missing.length > 0) {
    const leaf = firstLayoutLeaf(node);
    if (leaf) {
      leaf[itemKey].push(...missing);
      leaf.selected = missing[missing.length - 1] || leaf.selected || leaf[itemKey][0];
    }
  }
  return node;
}

function replaceNode(target, source) {
  for (const key of Object.keys(target)) delete target[key];
  Object.assign(target, cloneLayout(source));
}

function layoutTreeMinSize(node, leafWidth, leafHeight) {
  if (!node || node.type === 'leaf') return { w: leafWidth, h: leafHeight };
  const first = layoutTreeMinSize(node.first, leafWidth, leafHeight);
  const second = layoutTreeMinSize(node.second, leafWidth, leafHeight);
  if (node.direction === 'horizontal') {
    return { w: Math.max(first.w, second.w), h: first.h + PANEL_GAP + second.h };
  }
  return { w: first.w + PANEL_GAP + second.w, h: Math.max(first.h, second.h) };
}

function splitterRectFor(rect, node, minSizeFn) {
  if (node.direction === 'horizontal') {
    const [firstH] = splitSizes(rect.h, node.ratio, minSizeFn(node.first).h, minSizeFn(node.second).h);
    return { x: rect.x, y: rect.y + firstH, w: rect.w, h: PANEL_GAP };
  }
  const [firstW] = splitSizes(rect.w, node.ratio, minSizeFn(node.first).w, minSizeFn(node.second).w);
  return { x: rect.x + firstW, y: rect.y, w: PANEL_GAP, h: rect.h };
}

function childRectsFor(rect, node, minSizeFn) {
  if (node.direction === 'horizontal') {
    const [firstH, secondH] = splitSizes(rect.h, node.ratio, minSizeFn(node.first).h, minSizeFn(node.second).h);
    return [
      { x: rect.x, y: rect.y, w: rect.w, h: firstH },
      { x: rect.x, y: rect.y + firstH + PANEL_GAP, w: rect.w, h: secondH },
    ];
  }
  const [firstW, secondW] = splitSizes(rect.w, node.ratio, minSizeFn(node.first).w, minSizeFn(node.second).w);
  return [
    { x: rect.x, y: rect.y, w: firstW, h: rect.h },
    { x: rect.x + firstW + PANEL_GAP, y: rect.y, w: secondW, h: rect.h },
  ];
}

function nodeFromPathIn(root, path) {
  let node = root;
  for (const part of path.split('.').slice(1)) {
    node = part === '0' ? node.first : node.second;
  }
  return node;
}

function findLeafWithItem(node, itemId, itemKey, path = 'root') {
  if (!node) return null;
  if (node.type === 'leaf') {
    return node[itemKey].includes(itemId) ? { node, path } : null;
  }
  return findLeafWithItem(node.first, itemId, itemKey, `${path}.0`)
    || findLeafWithItem(node.second, itemId, itemKey, `${path}.1`);
}

function removeItemFromLayout(node, itemId, itemKey) {
  if (node.type === 'leaf') {
    const index = node[itemKey].indexOf(itemId);
    if (index === -1) return false;
    node[itemKey].splice(index, 1);
    if (node.selected === itemId) node.selected = node[itemKey][0] || null;
    return true;
  }
  return removeItemFromLayout(node.first, itemId, itemKey) || removeItemFromLayout(node.second, itemId, itemKey);
}

function layoutNodeIsEmpty(node, itemKey) {
  if (node.type === 'leaf') return node[itemKey].length === 0;
  return layoutNodeIsEmpty(node.first, itemKey) && layoutNodeIsEmpty(node.second, itemKey);
}

function removeBlankLayoutAreas(node, itemKey) {
  if (!node || node.type !== 'split') return;
  removeBlankLayoutAreas(node.first, itemKey);
  removeBlankLayoutAreas(node.second, itemKey);
  if (layoutNodeIsEmpty(node.first, itemKey) && !layoutNodeIsEmpty(node.second, itemKey)) {
    replaceNode(node, node.second);
  } else if (layoutNodeIsEmpty(node.second, itemKey) && !layoutNodeIsEmpty(node.first, itemKey)) {
    replaceNode(node, node.first);
  }
}

function splitLeafForItemDrop(targetLeaf, itemId, zone, itemKey) {
  const existingItems = targetLeaf[itemKey].slice();
  if (existingItems.length === 0) {
    targetLeaf[itemKey] = [itemId];
    targetLeaf.selected = itemId;
    return;
  }
  const newLeaf = layoutLeaf(itemKey, [itemId], itemId);
  const oldLeaf = layoutLeaf(itemKey, existingItems, targetLeaf.selected || existingItems[0]);
  const placeFirst = zone === 'North' || zone === 'West';
  targetLeaf.type = 'split';
  targetLeaf.direction = zone === 'North' || zone === 'South' ? 'horizontal' : 'vertical';
  targetLeaf.ratio = 0.5;
  targetLeaf.first = placeFirst ? newLeaf : oldLeaf;
  targetLeaf.second = placeFirst ? oldLeaf : newLeaf;
  delete targetLeaf[itemKey];
  delete targetLeaf.selected;
}

function firstLeaf(node) {
  return firstLayoutLeaf(node);
}

function normalizePanelLayout(node) {
  const layout = normalizeLayoutTree(node, PANEL_IDS, 'panels', defaultPanelLayoutTree);
  removeBlankLayoutAreas(layout, 'panels');
  return layout;
}

if (clientState.layoutVersion !== PANEL_LAYOUT_VERSION) {
  clientState.layout = defaultPanelLayoutTree();
  clientState.layoutVersion = PANEL_LAYOUT_VERSION;
}

let layoutRoot = normalizePanelLayout(clientState.layout);
const leafAreas = [];
const layoutRects = new Map();

function writePanelLayout(panel, layout) {
  panel.style.left = `${Math.round(layout.x)}px`;
  panel.style.top = `${Math.round(layout.y)}px`;
  panel.style.width = `${Math.round(layout.w)}px`;
  panel.style.height = `${Math.round(layout.h)}px`;
  panel.style.zIndex = '1';
}

function setDropHighlight(rect) {
  const highlight = document.getElementById('drop-highlight');
  if (!rect) {
    highlight.style.display = 'none';
    return;
  }
  highlight.style.display = 'block';
  highlight.style.left = `${Math.round(rect.x)}px`;
  highlight.style.top = `${Math.round(rect.y)}px`;
  highlight.style.width = `${Math.round(rect.w)}px`;
  highlight.style.height = `${Math.round(rect.h)}px`;
}

function layoutMinSize(node) {
  return layoutTreeMinSize(node, PANEL_MIN_WIDTH, PANEL_MIN_HEIGHT);
}

function splitSizes(total, ratio, firstMin, secondMin) {
  const available = Math.max(0, total - PANEL_GAP);
  let firstSize = available * Math.min(0.9, Math.max(0.1, Number(ratio) || 0.5));
  if (available >= firstMin + secondMin) {
    firstSize = Math.min(available - secondMin, Math.max(firstMin, firstSize));
  } else {
    firstSize = Math.max(0, Math.min(available, firstSize));
  }
  return [firstSize, available - firstSize];
}

function splitterRect(rect, node) {
  return splitterRectFor(rect, node, layoutMinSize);
}

function childRects(rect, node) {
  return childRectsFor(rect, node, layoutMinSize);
}

function renderSplitter(path, rect, node) {
  const splitter = document.createElement('div');
  splitter.className = `splitter splitter-${node.direction}`;
  splitter.dataset.splitPath = path;
  splitter.style.left = `${Math.round(rect.x)}px`;
  splitter.style.top = `${Math.round(rect.y)}px`;
  splitter.style.width = `${Math.round(rect.w)}px`;
  splitter.style.height = `${Math.round(rect.h)}px`;
  splitter.addEventListener('pointerdown', beginSplitResize);
  document.getElementById('main').appendChild(splitter);
}

function renderPanelTabs(panel, leafNode) {
  const header = panel.querySelector('.panel-header');
  let tabs = header.querySelector('.panel-tabs');
  if (!tabs) {
    tabs = document.createElement('span');
    tabs.className = 'panel-tabs';
    header.querySelector('.panel-title').after(tabs);
  }
  tabs.innerHTML = '';
  tabs.style.display = leafNode.panels.length > 1 ? 'inline-flex' : 'none';
  for (const panelId of leafNode.panels) {
    const tab = document.createElement('button');
    tab.type = 'button';
    tab.className = `panel-tab${panelId === leafNode.selected ? ' active' : ''}`;
    tab.textContent = panelLabel(panelId);
    tab.addEventListener('pointerdown', event => event.stopPropagation());
    tab.addEventListener('click', event => {
      event.stopPropagation();
      leafNode.selected = panelId;
      renderPanelLayoutTree();
    });
    tabs.appendChild(tab);
  }
}

function renderLeafNode(node, rect, path) {
  node.selected = node.panels.includes(node.selected) ? node.selected : node.panels[0];
  leafAreas.push({ node, rect, path });
  for (const panelId of node.panels) {
    const panel = panelElement(panelId);
    if (!panel) continue;
    panel.style.display = panelId === node.selected ? 'flex' : 'none';
    panel.dataset.areaPath = path;
    writePanelLayout(panel, rect);
    if (panelId === node.selected) renderPanelTabs(panel, node);
  }
}

function renderLayoutNode(node, rect, path) {
  layoutRects.set(path, rect);
  if (node.type === 'split') {
    const splitRect = splitterRect(rect, node);
    const [firstRect, secondRect] = childRects(rect, node);
    renderSplitter(path, splitRect, node);
    renderLayoutNode(node.first, firstRect, `${path}.0`);
    renderLayoutNode(node.second, secondRect, `${path}.1`);
    return;
  }
  renderLeafNode(node, rect, path);
}

function renderPanelLayoutTree() {
  const workspace = document.getElementById('main');
  workspace.querySelectorAll('.splitter').forEach(splitter => splitter.remove());
  document.querySelectorAll('.panel[data-panel-id]').forEach(panel => {
    panel.style.display = 'none';
    panel.classList.remove('active');
  });
  leafAreas.length = 0;
  layoutRects.clear();
  layoutRoot = normalizePanelLayout(layoutRoot || clientState.layout);
  const size = currentWorkspaceSize();
  renderLayoutNode(layoutRoot, { x: 0, y: 0, w: size.w, h: size.h }, 'root');
  clientState.layout = layoutRoot;
  clientState.workspaceSize = size;
  saveClientState();
  if (lastData) renderPolicyWidgets(lastData);
  renderGlobalPanels(lastGlobalData || {});
}

function nodeFromPath(path) {
  return nodeFromPathIn(layoutRoot, path);
}

function beginSplitResize(event) {
  if (event.button !== 0) return;
  const path = event.currentTarget.dataset.splitPath;
  const node = nodeFromPath(path);
  const rect = layoutRects.get(path);
  if (!node || !rect) return;
  event.stopPropagation();
  event.currentTarget.classList.add('active');
  document.body.classList.add('panel-interaction-active');

  function onMove(moveEvent) {
    node.ratio = node.direction === 'horizontal'
      ? (moveEvent.clientY - document.getElementById('main').getBoundingClientRect().top - rect.y) / rect.h
      : (moveEvent.clientX - document.getElementById('main').getBoundingClientRect().left - rect.x) / rect.w;
    node.ratio = Math.min(0.9, Math.max(0.1, node.ratio));
    renderPanelLayoutTree();
  }

  function onUp() {
    document.body.classList.remove('panel-interaction-active');
    window.removeEventListener('pointermove', onMove);
    saveClientState();
  }

  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp, { once: true });
  event.preventDefault();
}

function isPanelControlTarget(target) {
  return !!target.closest && !!target.closest('button,input,textarea,select,a');
}

function bringPanelToFront(panel) {
  document.querySelectorAll('.panel.active').forEach(active => active.classList.remove('active'));
  panel.classList.add('active');
}

function pointInRect(x, y, rect) {
  return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

function scanPanelDropTarget(clientX, clientY) {
  const workspaceRect = document.getElementById('main').getBoundingClientRect();
  const x = clientX - workspaceRect.left;
  const y = clientY - workspaceRect.top;
  for (const area of leafAreas) {
    const rect = area.rect;
    if (!pointInRect(x, y, rect)) continue;
    const headerRect = { x: rect.x, y: rect.y, w: rect.w, h: AREA_HEADER_HEIGHT };
    const bodyTop = rect.y + AREA_HEADER_HEIGHT;
    const bodyH = Math.max(0, rect.h - AREA_HEADER_HEIGHT);
    const edgeH = Math.max(28, bodyH * 0.2);
    const edgeW = Math.max(36, rect.w * 0.2);
    const north = { x: rect.x, y: bodyTop, w: rect.w, h: edgeH };
    const south = { x: rect.x, y: rect.y + rect.h - edgeH, w: rect.w, h: edgeH };
    const west = { x: rect.x, y: bodyTop, w: edgeW, h: bodyH };
    const east = { x: rect.x + rect.w - edgeW, y: bodyTop, w: edgeW, h: bodyH };
    const body = { x: rect.x, y: bodyTop, w: rect.w, h: bodyH };
    if (pointInRect(x, y, headerRect)) return Object.assign({ zone: 'Header', highlight: headerRect }, area);
    if (pointInRect(x, y, north)) return Object.assign({ zone: 'North', highlight: north }, area);
    if (pointInRect(x, y, south)) return Object.assign({ zone: 'South', highlight: south }, area);
    if (pointInRect(x, y, east)) return Object.assign({ zone: 'East', highlight: east }, area);
    if (pointInRect(x, y, west)) return Object.assign({ zone: 'West', highlight: west }, area);
    if (pointInRect(x, y, body)) return Object.assign({ zone: 'Body', highlight: body }, area);
  }
  return null;
}

function findLeafWithPanel(node, panelId, path = 'root') {
  return findLeafWithItem(node, panelId, 'panels', path);
}

function removePanelFromLayout(node, panelId) {
  return removeItemFromLayout(node, panelId, 'panels');
}

function nodeIsEmpty(node) {
  return layoutNodeIsEmpty(node, 'panels');
}

function removeBlankAreas(node) {
  removeBlankLayoutAreas(node, 'panels');
}

function splitLeafForDrop(targetLeaf, panelId, zone) {
  splitLeafForItemDrop(targetLeaf, panelId, zone, 'panels');
}

function completePanelDrop(panelId, target) {
  if (!target) return;
  const source = findLeafWithPanel(layoutRoot, panelId);
  if (!source) return;
  if (source.node === target.node && source.node.panels.length === 1) return;

  removePanelFromLayout(layoutRoot, panelId);
  if (target.zone === 'Header' || target.zone === 'Body') {
    if (!target.node.panels.includes(panelId)) target.node.panels.push(panelId);
    target.node.selected = panelId;
  } else {
    splitLeafForDrop(target.node, panelId, target.zone);
  }
  removeBlankAreas(layoutRoot);
  renderPanelLayoutTree();
}

function beginPanelDrag(event) {
  if (event.button !== 0 || isPanelControlTarget(event.target)) return;
  event.stopPropagation();
  const panel = event.currentTarget.closest('.panel');
  if (!panel) return;
  const panelId = panel.dataset.panelId;
  bringPanelToFront(panel);
  const startX = event.clientX;
  const startY = event.clientY;
  let dragging = false;
  let target = null;
  event.currentTarget.setPointerCapture(event.pointerId);

  function onMove(moveEvent) {
    const distance = Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY);
    if (!dragging && distance < DRAG_THRESHOLD) return;
    if (!dragging) {
      dragging = true;
      panel.classList.add('is-dragging');
      document.body.classList.add('panel-interaction-active');
    }
    target = scanPanelDropTarget(moveEvent.clientX, moveEvent.clientY);
    setDropHighlight(target ? target.highlight : null);
  }

  function onUp() {
    window.removeEventListener('pointermove', onMove);
    panel.classList.remove('is-dragging');
    document.body.classList.remove('panel-interaction-active');
    setDropHighlight(null);
    if (dragging) completePanelDrop(panelId, target);
  }

  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp, { once: true });
  event.preventDefault();
}

function initPanelWorkspace() {
  if (AGENT_CLIENT_MODE) {
    initPolicyClientWorkspace();
    return;
  }
  document.querySelectorAll('.panel[data-panel-id]').forEach(panel => {
    panel.addEventListener('pointerdown', () => bringPanelToFront(panel));
    panel.querySelector('[data-panel-drag-handle]').addEventListener('pointerdown', beginPanelDrag);
  });
  renderPanelLayoutTree();
  window.addEventListener('resize', () => renderPanelLayoutTree());
  if ('ResizeObserver' in window) {
    new ResizeObserver(() => { if (lastData) renderPolicyWidgets(lastData); })
      .observe(document.getElementById('policy-widget-container'));
    new ResizeObserver(() => renderGlobalPanels(lastGlobalData || {}))
      .observe(document.getElementById('global-panel-container'));
  }
}

  }
}

function agentInventoryValue(agent, resource) {
  const selfFeats = agent?.policy_infos?.obs_grid?.['0,0']?.feats || {};
  if (selfFeats[`inv:${resource}`] != null) return Number(selfFeats[`inv:${resource}`]) || 0;
  const inventory = agent && agent.inventory;
  if (!inventory) return 0;
  if (Array.isArray(inventory)) {
    for (const entry of inventory) {
      if (Array.isArray(entry) && entry[0] === resource) return Number(entry[1]) || 0;
      if (entry && typeof entry === 'object') {
        const name = entry.name || entry.item || entry.resource || entry[0];
        if (name === resource) return Number(entry.amount ?? entry.value ?? entry.count ?? entry[1]) || 0;
      }
    }
    return 0;
  }
  if (typeof inventory === 'object') return Number(inventory[resource]) || 0;
  return 0;
}

function agentConnectionStatus(data, agentId) {
  const statuses = data.agent_connections || data.__agent_connections__ || [];
  const status = (Array.isArray(statuses) ? statuses : [])
    .find(entry => normalizeAgentId(entry.agent_id) === normalizeAgentId(agentId)) || {};
  const agent = Number(status.agent || 0);
  const policy = Number(status.policy || 0);
  const debug = Number(status.policy_debug || 0);
  const total = agent + policy + debug;
  return {
    connected: Boolean(status.connected || total > 0),
    label: total > 0 ? `connected a:${agent} p:${policy} d:${debug}` : 'disconnected',
  };
}

function globalAgentsFromData(data = {}) {

function globalViewerObjectLocation(object = {}) {
  const location = object.location || object.grid_location || object.position || object.pos || null;
  let row = null;
  let col = null;
  if (Array.isArray(location)) {
    row = finiteNumber(location[0]);
    col = finiteNumber(location[1]);
  } else if (location && typeof location === 'object') {
    row = finiteNumber(location.row, finiteNumber(location.r));
    col = finiteNumber(location.col, finiteNumber(location.c));
  }
  row = finiteNumber(object.row, finiteNumber(object.r, row));
  col = finiteNumber(object.col, finiteNumber(object.c, col));
  return { row, col };
}

function globalViewerInventoryProps(inventory) {

        props[`inv:${name}`] = entry.amount ?? entry.value ?? entry.count ?? '';
      }

    Object.entries(inventory).forEach(([name, amount]) => { props[`inv:${name}`] = amount; });

function globalViewerObjectProps(object = {}, extras = {}) {
