  return panels.length > 0 ? [panels[0].id] : [];
}

function activeGlobalPanelIds(panels) {
  const available = new Set(panels.map(panel => panel.id));
  let ids = clientState.globalPanels[GLOBAL_PANEL_KEY];
  if (!Array.isArray(ids)) ids = defaultGlobalPanelIds(panels);
  ids = ids.filter(id => available.has(id));
  clientState.globalPanels[GLOBAL_PANEL_KEY] = ids;
  return ids;
}

function setActiveGlobalPanelIds(ids) {
  clientState.globalPanels[GLOBAL_PANEL_KEY] = Array.from(new Set(ids));
  saveClientState();
}

function defaultGlobalPanelLayout(panelIds) {
  const leaf = panelId => ({ type: 'leaf', globalPanels: [panelId], selected: panelId });
  if (panelIds.length <= 1) return { type: 'leaf', globalPanels: panelIds.slice(0, 1), selected: panelIds[0] || null };
  return {
    type: 'split',
    direction: 'vertical',
    ratio: 0.66,
    first: leaf(panelIds[0]),
    second: { type: 'leaf', globalPanels: panelIds.slice(1), selected: panelIds[1] || null },
  };
}

function globalPanelConfig() {
  return {
    containerId: 'global-panel-container',
    itemKey: 'globalPanels',
    rootPath: 'globalPanels',
    itemClass: 'global-panel',
    headerClass: 'global-panel-header',
    bodyClass: 'global-panel-body',
    titleClass: 'global-panel-title',
    statusClass: 'global-panel-status',
    tabsClass: 'global-panel-tabs',
    tabClass: 'global-panel-tab',
    closeClass: 'global-panel-close',
    splitterClass: 'global-panel-splitter',
    dropHighlightClass: 'global-panel-drop-highlight',
    placeholderClass: 'global-panel-placeholder',
    itemIdDataset: 'globalPanelId',
    itemModuleDataset: 'globalPanelModule',
    itemAreaDataset: 'globalPanelAreaPath',
    splitPathDataset: 'globalPanelSplitPath',
    definitions: globalPanelsFromData,
    activeIds: activeGlobalPanelIds,
    setActiveIds: setActiveGlobalPanelIds,
    getStoredLayout: () => clientState.globalPanelLayouts[GLOBAL_PANEL_KEY],
    setStoredLayout: layout => { clientState.globalPanelLayouts[GLOBAL_PANEL_KEY] = layout; },
    nonClosableIds: new Set(['global_viewer']),
    collapsibleRightIds: new Set(['agents']),
    collapsedRailClass: 'global-panel-collapsed-rail',
    collapsedTabClass: 'global-panel-collapsed-tab',
    getCollapsedRightIds: () => clientState.globalPanelCollapsedRight[GLOBAL_PANEL_KEY],
    setCollapsedRightIds: ids => { clientState.globalPanelCollapsedRight[GLOBAL_PANEL_KEY] = ids; },
    defaultLayout: defaultGlobalPanelLayout,
    currentData: () => lastGlobalData || {},
    emptyText: count => count > 0 ? 'Use + to add a global panel.' : 'No global panels available.',
    allAddedText: count => count > 0 ? 'All panels added' : 'No panels available',
    menuId: 'global-panel-menu',
    addButtonId: 'add-global-panel',
    onRenderItem(body, panel, data) {
      body.className = 'global-panel-body';
      const module = globalPanelModules.get(panel.module);
      if (!module || typeof module.render !== 'function') {
        body.innerHTML = `<div class="global-panel-placeholder">No browser module registered for ${esc(panel.module)}</div>`;
        return;
      }
      module.render(body, createGlobalPanelContext(panel, data, body));
    },
    save: saveClientState,
  };
}

function createEmbeddedWorkspace(config) {
  const leafAreas = [];
  const layoutRects = new Map();
  const itemSelector = `.${config.itemClass}[data-${config.itemIdDataset.replace(/[A-Z]/g, ch => '-' + ch.toLowerCase())}]`;

  function definitions(data) {
    return config.definitions(data || {});
  }

  function definitionMap(items) {
    const map = new Map();
    items.forEach(item => map.set(item.id, item));
    return map;
  }

  function normalizeLayout(node, itemIds) {
    return normalizeLayoutTree(node, itemIds, config.itemKey, () => config.defaultLayout(itemIds));
  }

  function currentLayout(itemIds) {
    const layout = normalizeLayout(config.getStoredLayout(), itemIds);
    config.setStoredLayout(layout);
    return layout;
  }

  function layoutMinSize(node) {
    return layoutTreeMinSize(node, WIDGET_MIN_WIDTH, WIDGET_MIN_HEIGHT);
  }

  function writeLayout(element, rect) {
    element.style.left = `${Math.round(rect.x)}px`;
    element.style.top = `${Math.round(rect.y)}px`;
    element.style.width = `${Math.round(rect.w)}px`;
    element.style.height = `${Math.round(rect.h)}px`;
  }

  function setDropHighlight(rect) {
    const highlight = document.querySelector(`#${config.containerId} .${config.dropHighlightClass}`);
    if (!highlight) return;
    if (!rect) {
      highlight.style.display = 'none';
      return;
    }
    highlight.style.display = 'block';
    highlight.style.left = `${Math.round(rect.x)}px`;
    highlight.style.top = `${Math.round(rect.y)}px`;
    highlight.style.width = `${Math.round(rect.w)}px`;
    highlight.style.height = `${Math.round(rect.h)}px`;
  }

  function itemCollapsesRight(itemId) {
    return Boolean(config.collapsibleRightIds && config.collapsibleRightIds.has(itemId));
  }

  function itemHasCloseControl(itemId) {
    return !(config.nonClosableIds && config.nonClosableIds.has(itemId));
  }

  function collapsedRightIds() {
    const rawIds = typeof config.getCollapsedRightIds === 'function' ? config.getCollapsedRightIds() : [];
    return new Set((Array.isArray(rawIds) ? rawIds : []).filter(itemCollapsesRight));
  }

  function setCollapsedRightIds(ids) {
    if (typeof config.setCollapsedRightIds === 'function') config.setCollapsedRightIds(Array.from(ids));
  }

  function activeCollapsedRightIds(activeIds) {
    const active = new Set(activeIds);
    const collapsed = collapsedRightIds();
    const filtered = new Set(Array.from(collapsed).filter(itemId => active.has(itemId)));
    if (filtered.size !== collapsed.size) setCollapsedRightIds(filtered);
    return filtered;
  }

  function renderCollapsedRightRail(container, items, activeIds, collapsed) {
    if (!config.collapsedRailClass || !config.collapsedTabClass || collapsed.size === 0) return;
    const active = new Set(activeIds);
    const byId = definitionMap(items);
    const rail = document.createElement('div');
    rail.className = config.collapsedRailClass;
    rail.dataset.workspaceCollapsedRight = 'true';
    for (const itemId of collapsed) {
      if (!active.has(itemId)) continue;
      const item = byId.get(itemId);
      if (!item) continue;
      const button = document.createElement('button');
      button.type = 'button';
      button.className = config.collapsedTabClass;
      button.title = `Expand ${item.title}`;
      button.setAttribute('aria-label', `Expand ${item.title}`);
      button.innerHTML = workspaceControlIcon('expandLeft')
        + `<span class="collapsed-tab-title">${esc(item.title)}</span>`;
      button.addEventListener('click', event => expandItemRight(item.id, event));
      rail.appendChild(button);
    }
    if (rail.children.length > 0) container.appendChild(rail);
  }

  function renderSplitter(container, path, rect, node) {
    const splitter = document.createElement('div');
    splitter.className = `${config.splitterClass} ${config.splitterClass}-${node.direction}`;
    splitter.dataset[config.splitPathDataset] = path;
    splitter.style.left = `${Math.round(rect.x)}px`;
    splitter.style.top = `${Math.round(rect.y)}px`;
    splitter.style.width = `${Math.round(rect.w)}px`;
    splitter.style.height = `${Math.round(rect.h)}px`;
    splitter.addEventListener('pointerdown', beginSplitResize);
    container.appendChild(splitter);
  }

  function renderTabs(header, leafNode, data, byId) {
    const tabs = document.createElement('span');
    tabs.className = config.tabsClass;
    tabs.style.display = leafNode[config.itemKey].length > 1 ? 'inline-flex' : 'none';
    for (const itemId of leafNode[config.itemKey]) {
      const tabItem = byId.get(itemId);
      const tab = document.createElement('button');
      tab.type = 'button';
      tab.className = `${config.tabClass}${itemId === leafNode.selected ? ' active' : ''}${tabItem && tabItem.unavailable ? ' unavailable' : ''}`;
      tab.textContent = tabItem ? tabItem.title : itemId;
      tab.title = tabItem ? tabItem.title : itemId;
      tab.addEventListener('pointerdown', event => event.stopPropagation());
      tab.addEventListener('click', event => {
        event.stopPropagation();
        leafNode.selected = itemId;
        config.save();
        render(data);
      });
      tabs.appendChild(tab);
    }
    header.appendChild(tabs);
  }

  function findElement(container, itemId) {
    return Array.from(container.querySelectorAll(itemSelector))
      .find(element => element.dataset[config.itemIdDataset] === itemId) || null;
  }

  function createElement(container, item, leafNode, rect, path, byId, data) {
    let wrapper = findElement(container, item.id);
    if (!wrapper) {
      wrapper = document.createElement('section');
      wrapper.className = config.itemClass;
      const header = document.createElement('div');
      header.className = config.headerClass;
      header.addEventListener('pointerdown', beginDrag);
      const body = document.createElement('div');
      body.className = config.bodyClass;
      wrapper.append(header, body);
      container.appendChild(wrapper);
    }

    wrapper.className = `${config.itemClass}${item.unavailable ? ' is-unavailable' : ''}`;
    wrapper.dataset[config.itemIdDataset] = item.id;
    wrapper.dataset[config.itemModuleDataset] = item.module;
    wrapper.dataset[config.itemAreaDataset] = path;
    wrapper.style.display = 'flex';
    writeLayout(wrapper, rect);

    const header = wrapper.querySelector(`.${config.headerClass}`);
    header.innerHTML = '';
    const title = document.createElement('span');
    title.className = config.titleClass;
    title.textContent = item.title;
    const status = document.createElement('span');
    status.className = config.statusClass;
    status.textContent = item.id === item.module ? '' : item.module;
    const close = document.createElement('button');
    if (itemHasCloseControl(item.id)) {
      close.type = 'button';
      close.className = config.closeClass;
      close.title = itemCollapsesRight(item.id) ? `Collapse ${item.title} to right` : `Close ${item.title}`;
      close.setAttribute('aria-label', close.title);
      close.innerHTML = workspaceControlIcon(itemCollapsesRight(item.id) ? 'collapseRight' : 'close');
      close.addEventListener('pointerdown', event => event.stopPropagation());
      close.addEventListener('click', event => itemCollapsesRight(item.id) ? collapseItemRight(item.id, event) : closeItem(item.id, event));
    }
    header.appendChild(title);
    renderTabs(header, leafNode, data, byId);
    header.appendChild(status);
    if (itemHasCloseControl(item.id)) header.appendChild(close);

    config.onRenderItem(wrapper.querySelector(`.${config.bodyClass}`), item, data);
    return wrapper;
  }

  function renderNode(container, node, rect, path, byId, data) {
    layoutRects.set(path, rect);
    if (node.type === 'split') {
      const splitRect = splitterRectFor(rect, node, layoutMinSize);
      const [firstRect, secondRect] = childRectsFor(rect, node, layoutMinSize);
      renderSplitter(container, path, splitRect, node);
      renderNode(container, node.first, firstRect, `${path}.0`, byId, data);
      renderNode(container, node.second, secondRect, `${path}.1`, byId, data);
      return;
    }

    node.selected = node[config.itemKey].includes(node.selected) ? node.selected : node[config.itemKey][0];
    leafAreas.push({ node, rect, path });
    const item = byId.get(node.selected);
    if (item) createElement(container, item, node, rect, path, byId, data);
  }

  function render(data = config.currentData()) {
    const container = document.getElementById(config.containerId);
    if (!container) return;
    const items = definitions(data);
    const ids = config.activeIds(items);
    const collapsed = activeCollapsedRightIds(ids);
    const visibleIds = ids.filter(itemId => !collapsed.has(itemId));
    const layout = currentLayout(visibleIds);
    if (config.cleanupLoose) config.cleanupLoose(container, visibleIds);
    container.querySelectorAll(`.${config.splitterClass}`).forEach(splitter => splitter.remove());
    container.querySelectorAll('[data-workspace-placeholder="true"]').forEach(placeholder => placeholder.remove());
    container.querySelectorAll('[data-workspace-collapsed-right="true"]').forEach(rail => rail.remove());
    let highlight = container.querySelector(`.${config.dropHighlightClass}`);
    if (!highlight) {
      highlight = document.createElement('div');
      highlight.className = config.dropHighlightClass;
      container.appendChild(highlight);
    }
    leafAreas.length = 0;
    layoutRects.clear();
    container.querySelectorAll(itemSelector).forEach(wrapper => {
      if (!visibleIds.includes(wrapper.dataset[config.itemIdDataset])) wrapper.remove();
      else wrapper.style.display = 'none';
    });

    if (visibleIds.length === 0) {
      const placeholder = document.createElement('div');
      placeholder.className = config.placeholderClass;
      placeholder.dataset.workspacePlaceholder = 'true';
      placeholder.textContent = config.emptyText(items.length);
      container.appendChild(placeholder);
      syncMenu(data);
      renderCollapsedRightRail(container, items, ids, collapsed);
      return;
    }

    const collapsedRailWidth = collapsed.size > 0 ? COLLAPSED_RIGHT_RAIL_WIDTH : 0;
    renderNode(
      container,
      layout,
      {
        x: 0,
        y: 0,
        w: Math.max(container.clientWidth - collapsedRailWidth, WIDGET_MIN_WIDTH),
        h: Math.max(container.clientHeight, WIDGET_MIN_HEIGHT),
      },
      config.rootPath,
      definitionMap(items),
      data,
    );
    config.setStoredLayout(layout);
    config.save();
    syncMenu(data);
    renderCollapsedRightRail(container, items, ids, collapsed);
  }

  function beginSplitResize(event) {
    if (event.button !== 0) return;
    const path = event.currentTarget.dataset[config.splitPathDataset];
    const node = nodeFromPathIn(currentLayout(config.activeIds(definitions(config.currentData()))), path);
    const rect = layoutRects.get(path);
    const container = document.getElementById(config.containerId);
    if (!node || !rect || !container) return;
    event.stopPropagation();
    event.currentTarget.classList.add('active');
    document.body.classList.add('panel-interaction-active');

    function onMove(moveEvent) {
      const bounds = container.getBoundingClientRect();
      node.ratio = node.direction === 'horizontal'
        ? (moveEvent.clientY - bounds.top - rect.y) / rect.h
        : (moveEvent.clientX - bounds.left - rect.x) / rect.w;
      node.ratio = Math.min(0.9, Math.max(0.1, node.ratio));
      render(config.currentData());
    }

    function onUp() {
      document.body.classList.remove('panel-interaction-active');
      window.removeEventListener('pointermove', onMove);
      config.save();
    }

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp, { once: true });
    event.preventDefault();
  }

  function scanDropTarget(clientX, clientY) {
    const container = document.getElementById(config.containerId);
    if (!container) return null;
    const bounds = container.getBoundingClientRect();
    const x = clientX - bounds.left;
    const y = clientY - bounds.top;
    for (const area of leafAreas) {
      const rect = area.rect;
      if (!pointInRect(x, y, rect)) continue;
      const headerRect = { x: rect.x, y: rect.y, w: rect.w, h: WIDGET_HEADER_HEIGHT };
      const bodyTop = rect.y + WIDGET_HEADER_HEIGHT;
      const bodyH = Math.max(0, rect.h - WIDGET_HEADER_HEIGHT);
      const edgeH = Math.max(24, bodyH * 0.22);
      const edgeW = Math.max(32, rect.w * 0.22);
      const north = { x: rect.x, y: bodyTop, w: rect.w, h: edgeH };
      const south = { x: rect.x, y: rect.y + rect.h - edgeH, w: rect.w, h: edgeH };
      const west = { x: rect.x, y: bodyTop, w: edgeW, h: bodyH };
      const east = { x: rect.x + rect.w - edgeW, y: bodyTop, w: edgeW, h: bodyH };
      const body = { x: rect.x, y: bodyTop, w: rect.w, h: bodyH };
      if (pointInRect(x, y, headerRect)) return Object.assign({ zone: 'Header', highlight: headerRect }, area);
      if (pointInRect(x, y, north)) return Object.assign({ zone: 'North', highlight: north }, area);
      if (pointInRect(x, y, south)) return Object.assign({ zone: 'South', highlight: south }, area);
      if (pointInRect(x, y, east)) return Object.assign({ zone: 'East', highlight: east }, area);
      if (pointInRect(x, y, west)) return Object.assign({ zone: 'West', highlight: west }, area);
      if (pointInRect(x, y, body)) return Object.assign({ zone: 'Body', highlight: body }, area);
    }
    return null;
  }

  function completeDrop(itemId, target) {
    if (!target) return;
    const ids = config.activeIds(definitions(config.currentData()));
    const layout = currentLayout(ids);
    const source = findLeafWithItem(layout, itemId, config.itemKey);
    if (!source) return;
    if (source.node === target.node && source.node[config.itemKey].length === 1) return;

    removeItemFromLayout(layout, itemId, config.itemKey);
    if (target.zone === 'Header' || target.zone === 'Body') {
      if (!target.node[config.itemKey].includes(itemId)) target.node[config.itemKey].push(itemId);
      target.node.selected = itemId;
    } else {
      splitLeafForItemDrop(target.node, itemId, target.zone, config.itemKey);
    }
    removeBlankLayoutAreas(layout, config.itemKey);
    config.setStoredLayout(layout);
    config.save();
    render(config.currentData());
  }

  function beginDrag(event) {
    if (event.button !== 0 || isPanelControlTarget(event.target)) return;
    event.stopPropagation();
    const item = event.currentTarget.closest(`.${config.itemClass}`);
    if (!item) return;
    const itemId = item.dataset[config.itemIdDataset];
    const startX = event.clientX;
    const startY = event.clientY;
    let dragging = false;
    let target = null;
    event.currentTarget.setPointerCapture(event.pointerId);

    function onMove(moveEvent) {
      const distance = Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY);
      if (!dragging && distance < DRAG_THRESHOLD) return;
      if (!dragging) {
        dragging = true;
        item.classList.add('is-dragging');
        document.body.classList.add('panel-interaction-active');
      }
      target = scanDropTarget(moveEvent.clientX, moveEvent.clientY);
      setDropHighlight(target ? target.highlight : null);
    }

    function onUp() {
      window.removeEventListener('pointermove', onMove);
      item.classList.remove('is-dragging');
      document.body.classList.remove('panel-interaction-active');
      setDropHighlight(null);
      if (dragging) completeDrop(itemId, target);
    }

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp, { once: true });
    event.preventDefault();
  }

  function collapseItemRight(itemId, event = null) {
    if (event) {
      event.stopPropagation();
      event.preventDefault();
    }
    if (!itemCollapsesRight(itemId)) return closeItem(itemId, event);
    const data = config.currentData();
    const items = definitions(data);
    const currentIds = config.activeIds(items);
    if (!currentIds.includes(itemId)) return;
    const collapsed = collapsedRightIds();
    collapsed.add(itemId);
    setCollapsedRightIds(collapsed);
    let layout = normalizeLayout(config.getStoredLayout(), currentIds);
    removeItemFromLayout(layout, itemId, config.itemKey);
    removeBlankLayoutAreas(layout, config.itemKey);
    const visibleIds = currentIds.filter(id => !collapsed.has(id));
    config.setStoredLayout(visibleIds.length > 0 ? normalizeLayout(layout, visibleIds) : config.defaultLayout([]));
    config.save();
    render(data);
  }

  function expandItemRight(itemId, event = null) {
    if (event) {
      event.stopPropagation();
      event.preventDefault();
    }
    if (!itemCollapsesRight(itemId)) return;
    const data = config.currentData();
    const items = definitions(data);
    const available = new Set(items.map(item => item.id));
    if (!available.has(itemId)) return;
    const collapsed = collapsedRightIds();
    if (!collapsed.has(itemId)) return;
    collapsed.delete(itemId);
    setCollapsedRightIds(collapsed);
    const currentIds = config.activeIds(items);
    if (!currentIds.includes(itemId)) {
      currentIds.push(itemId);
      config.setActiveIds(currentIds);
    }
    const visibleWithoutItem = currentIds.filter(id => id !== itemId && !collapsed.has(id));
    let layout = normalizeLayout(config.getStoredLayout(), visibleWithoutItem);
    removeBlankLayoutAreas(layout, config.itemKey);
    const leaf = firstLayoutLeaf(layout);
    if (leaf) splitLeafForItemDrop(leaf, itemId, 'East', config.itemKey);
    else layout = config.defaultLayout([itemId]);
    const visibleIds = currentIds.filter(id => !collapsed.has(id));
    config.setStoredLayout(normalizeLayout(layout, visibleIds));
    config.save();
    render(data);
  }

  function syncMenu(data = config.currentData()) {
    const menu = document.getElementById(config.menuId);
    const addButton = document.getElementById(config.addButtonId);
    if (!menu || !addButton) return;
    const items = definitions(data);
    const active = new Set(config.activeIds(items));
    const addable = items.filter(item => !active.has(item.id));
    addButton.disabled = false;
    menu.innerHTML = '';
    if (addable.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = config.allAddedText(items.length);
      menu.appendChild(empty);
      return;
    }
    for (const item of addable) {
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = item.title;
      button.addEventListener('click', event => {
        event.stopPropagation();
        addItem(item.id);
        menu.hidden = true;
      });
      menu.appendChild(button);
    }
  }

  function toggleMenu(event) {
    event.stopPropagation();
    const menu = document.getElementById(config.menuId);
    if (!menu) return;
    syncMenu(config.currentData());
    menu.hidden = !menu.hidden;
  }

  function addItem(itemId) {
    const data = config.currentData();
    const items = definitions(data);
    if (!items.some(item => item.id === itemId)) return;
    const ids = config.activeIds(items);
    if (!ids.includes(itemId)) ids.push(itemId);
    config.setActiveIds(ids);
    const layout = currentLayout(ids);
    const leaf = firstLayoutLeaf(layout);
    if (leaf && leaf[config.itemKey].includes(itemId)) leaf.selected = itemId;
    config.setStoredLayout(layout);
    config.save();
    render(data);
  }

  function closeItem(itemId, event = null) {
    if (event) {
      event.stopPropagation();
      event.preventDefault();
    }
    const data = config.currentData();
    const items = definitions(data);
    const currentIds = config.activeIds(items);
    if (!currentIds.includes(itemId)) return;
    const nextIds = currentIds.filter(id => id !== itemId);
    let layout = normalizeLayout(config.getStoredLayout(), currentIds);
    removeItemFromLayout(layout, itemId, config.itemKey);
    removeBlankLayoutAreas(layout, config.itemKey);
    config.setActiveIds(nextIds);
    config.setStoredLayout(nextIds.length > 0 ? normalizeLayout(layout, nextIds) : config.defaultLayout([]));
    config.save();
    render(data);
  }

  return { render, beginSplitResize, scanDropTarget, completeDrop, beginDrag, syncMenu, toggleMenu, addItem, closeItem, currentLayout, normalizeLayout };
}

let globalPanelWorkspace = null;

function getGlobalPanelWorkspace() {
  if (!globalPanelWorkspace) globalPanelWorkspace = createEmbeddedWorkspace(globalPanelConfig());
  return globalPanelWorkspace;
}

function createGlobalPanelContext(panel, data, container) {
  const stateKey = `${GLOBAL_PANEL_KEY}:${panel.id}`;
  if (!globalPanelState[stateKey]) globalPanelState[stateKey] = {};
  return {
    panel,
    config: panel.config || {},
    data,
    container,
    websocket: globalWs,
    state: globalPanelState[stateKey],
    send(message) {
      return sendGlobalPanelRequest(message);
    },
    saveState() {
      clientState.globalPanelState = globalPanelState;
      saveClientState();
    },
  };
}

function sendGlobalPanelRequest(message) {
  if (!globalWs || globalWs.readyState !== WebSocket.OPEN) return false;
  globalWs.send(JSON.stringify(message));
  return true;
}

function renderGlobalPanelLayoutTree(data = lastGlobalData || {}) {
  getGlobalPanelWorkspace().render(data);
}

function renderGlobalPanels(data = {}) {
  renderGlobalPanelLayoutTree(data);
}

function beginGlobalPanelDrag(event) {
  getGlobalPanelWorkspace().beginDrag(event);
}

function completeGlobalPanelDrop(panelId, target) {
  getGlobalPanelWorkspace().completeDrop(panelId, target);
}

function toggleGlobalPanelMenu(event) {
  getGlobalPanelWorkspace().toggleMenu(event);
}

function syncGlobalPanelMenu(data = lastGlobalData) {
  getGlobalPanelWorkspace().syncMenu(data || {});
}

function addGlobalPanel(panelId) {
  getGlobalPanelWorkspace().addItem(panelId);
}

function closeGlobalPanel(panelId, event = null) {
  getGlobalPanelWorkspace().closeItem(panelId, event);
}

function cleanToolsyGoalText(text) {
  let value = String(text || '').trim();
  for (const prefix of ['- [ ] ', '- [x] ', '- [X] ', '- ', '* ', '• ']) {
    if (value.startsWith(prefix)) {
      value = value.slice(prefix.length).trim();
      break;
    }
  }
  const numbered = value.match(/^([0-9]+)\.\s+(.*)$/);
  if (numbered) value = numbered[2].trim();
  return value;
}

function normalizeToolsyGoalTasks(data) {
  const rawTasks = Array.isArray(data?.goal_tasks) ? data.goal_tasks : null;
  if (rawTasks) {
    return rawTasks.map((task, index) => ({
      id: String(task.id || task.goal_id || `goal-${index + 1}`),
      text: cleanToolsyGoalText(task.text || task.goal || ''),
      completed: !!task.completed,
    })).filter(task => task.text);
  }
  return String(data?.current_goals || '').split('\n')
    .map(cleanToolsyGoalText)
    .filter(Boolean)
    .map((text, index) => ({ id: `goal-${index + 1}`, text, completed: false }));
}

function activeToolsyGoalsText(tasks) {
  return tasks.filter(task => !task.completed).map(task => task.text).join('\n');
}

function activeToolsyGoalTexts(tasks) {
  return tasks.filter(task => !task.completed).map(task => task.text);
}

function sendToolsyGoalsUpdate(context, tasks) {
  const sent = context.send({
    type: 'add_goal',
    request_id: `add_goal:${Date.now()}`,
    goals: activeToolsyGoalTexts(tasks),
    goal_tasks: tasks,
  });
  if (!sent) return false;
  if (lastData) {
    lastData.goal_tasks = tasks;
    lastData.current_goals = activeToolsyGoalsText(tasks);
    renderPolicyWidgets(lastData);
  }
  return true;
}

function toggleToolsyGoalCompleted(context, taskId, completed) {
  const tasks = normalizeToolsyGoalTasks(lastData || context.data || {}).map(task => (
    task.id === taskId ? { ...task, completed: !!completed } : task
  ));
  sendToolsyGoalsUpdate(context, tasks);
}

function renderToolsyGoals(data, el, context) {
  if (!el) return;
  const tasks = normalizeToolsyGoalTasks(data);
  let html = '<div class="toolsy-goal-list">';
  if (tasks.length === 0) {
    html += '<div class="policy-widget-placeholder">No active goals.</div>';
  } else {
    for (const task of tasks) {
      html += `<label class="toolsy-goal-task${task.completed ? ' completed' : ''}" data-goal-id="${escAttr(task.id)}">`
        + '<input type="checkbox" class="toolsy-goal-checkbox">'
        + `<span class="toolsy-goal-text">${esc(task.text)}</span>`
        + '</label>';
    }
  }
  html += '</div>';
  el.innerHTML = html;
  el.querySelectorAll('.toolsy-goal-task').forEach(row => {
    const task = tasks.find(item => item.id === row.getAttribute('data-goal-id'));
    if (!task) return;
    const checkbox = row.querySelector('.toolsy-goal-checkbox');
    checkbox.checked = task.completed;
    checkbox.addEventListener('change', () => {
      toggleToolsyGoalCompleted(context, task.id, checkbox.checked);
    });
  });
}

function normalizeToolsyAutoPilocyStatus(data) {
  const raw = data.auto_pilocy || data.auto_pilocy_status || {};
  const name = String(raw.name || data.current_auto_pilocy || data.active_tool || 'Noop');
  const active = raw.active != null ? !!raw.active : name !== 'Noop';
  const ticksUsed = raw.ticks_used == null ? null : Number(raw.ticks_used);
  const timeout = raw.timeout == null ? null : Number(raw.timeout);
  const remaining = raw.remaining == null ? null : Number(raw.remaining);
  return {
    name,
    active,
    status: String(raw.state || (active ? 'running' : 'idle')),
    ticksUsed: Number.isFinite(ticksUsed) ? ticksUsed : null,
    timeout: Number.isFinite(timeout) ? timeout : null,
    remaining: Number.isFinite(remaining) ? remaining : null,
    lastResult: String(data.last_tool_result || ''),
  };
}
