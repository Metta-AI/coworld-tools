<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mettascope</title>
<style>
body { margin: 0; background: #000; overflow: hidden; }
canvas { width: 100%; height: 100%; outline: none; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #666; font-family: monospace; font-size: 14px; }
</style>
</head>
<body>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<div id="loading">Loading mettascope WASM...</div>
<script src="/mettascope_lib.js"></script>
<script>
let mod = null;
let ready = false;
let initialized = false;
let pendingMessages = [];

async function start() {
  const el = document.getElementById('loading');
  try {
    mod = await MettascopeModule({
      canvas: document.getElementById('canvas'),
      locateFile: (path) => '/' + path,
      onRuntimeInitialized: () => {
        console.log('WASM runtime initialized');
      },
    });

    // Call NimMain to initialize Nim runtime.
    if (mod._NimMain) {
      mod._NimMain();
      console.log('NimMain called');
    }

    ready = true;
    el.textContent = 'Waiting for game data...';

    // Process any messages that arrived before we were ready.
    for (const msg of pendingMessages) {
      handleMessage(msg);
    }
    pendingMessages = [];
  } catch (err) {
    el.textContent = 'Failed: ' + err.message;
    console.error('WASM load error:', err);
  }
}

function handleMessage(data) {
  if (!ready) {
    pendingMessages.push(data);
    return;
  }
  try {
    if (data.__replay_init && !initialized) {
      // Allocate strings and call init.
      const dataDir = mod.stringToNewUTF8('/data');
      const replay = mod.stringToNewUTF8(data.__replay_init);
      mod._mettascope_init(dataDir, replay, 1);
      mod._free(dataDir);
      mod._free(replay);
      initialized = true;
      document.getElementById('loading').style.display = 'none';
      console.log('mettascope initialized');
    }
    if (data.__replay_step && initialized) {
      const step = mod.stringToNewUTF8(data.__replay_step);
      mod._mettascope_render(data.__tick || 0, step);
      mod._free(step);
    }
  } catch (err) {
    console.error('mettascope error:', err);
  }
}

window.addEventListener('message', (e) => {
  if (e.data && typeof e.data === 'object') {
    handleMessage(e.data);
  }
});

start();
</script>
</body>
</html>
