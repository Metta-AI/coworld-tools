<!doctype html>
<title>Coworld Paint Arena Player Client</title>
<style>
  :root {
    color-scheme: light;
    --ink: #172033;
    --muted: #637089;
    --line: #cdd6e4;
    --panel: #ffffff;
    --page: #eef2f7;
    --empty: #f8fafc;
    --blue: #2563eb;
    --red: #dc2626;
    --green: #059669;
    --violet: #7c3aed;
  }
  * {
    box-sizing: border-box;
  }
  body {
    background: var(--page);
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    margin: 0;
    min-height: 100vh;
    padding: 22px;
  }
  main {
    display: grid;
    gap: 14px;
    margin: 0 auto;
    max-width: 980px;
  }
  .hud {
    align-items: end;
    display: grid;
    gap: 10px;
  }
  .hud-row {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  #status {
    background: #172033;
    border-radius: 999px;
    color: white;
    display: inline-flex;
    font-size: 15px;
    font-weight: 800;
    justify-self: start;
    padding: 8px 13px;
  }
  #playerName {
    color: var(--ink);
    font-size: 18px;
    font-weight: 900;
  }
  #scores {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .score {
    align-items: center;
    background: white;
    border: 1px solid var(--line);
    border-radius: 999px;
    display: inline-flex;
    font-size: 13px;
    font-weight: 900;
    gap: 7px;
    padding: 6px 10px;
  }
  .score::before {
    background: var(--color);
    border-radius: 999px;
    content: '';
    height: 10px;
    width: 10px;
  }
  #timer {
    background: #d8e0ec;
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    width: 100%;
  }
  #timerFill {
    background: #172033;
    border-radius: inherit;
    height: 100%;
    transition: width 120ms linear;
    width: 100%;
  }
  #arena {
    background: #d8e0ec;
    border: 1px solid #b8c4d8;
    border-radius: 8px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    display: grid;
    gap: 3px;
    overflow: hidden;
    padding: 6px;
    width: 100%;
  }
  .cell {
    aspect-ratio: 1;
    background: var(--empty);
    border-radius: 5px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
    position: relative;
  }
  .owned-0 {
    background: #bfdbfe;
  }
  .owned-1 {
    background: #fecaca;
  }
  .owned-2 {
    background: #bbf7d0;
  }
  .owned-3 {
    background: #ddd6fe;
  }
  .agent {
    color: white;
    display: grid;
    font-size: 13px;
    font-weight: 900;
    place-items: center;
    text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
  }
  .agent::after {
    content: attr(data-heading);
    font-size: clamp(20px, 3.4vw, 42px);
    line-height: 1;
  }
  .agent-0 {
    background: linear-gradient(145deg, #60a5fa, var(--blue));
  }
  .agent-1 {
    background: linear-gradient(145deg, #fb7185, var(--red));
  }
  .agent-2 {
    background: linear-gradient(145deg, #34d399, var(--green));
  }
  .agent-3 {
    background: linear-gradient(145deg, #a78bfa, var(--violet));
  }
  .you {
    box-shadow:
      inset 0 0 0 3px #111827,
      0 0 0 2px white;
  }
  @media (max-width: 860px) {
    body {
      padding: 14px;
    }
  }
</style>
<main>
  <div class="hud">
    <div class="hud-row">
      <div id="status">Connecting</div>
      <div id="playerName">Player</div>
      <div id="scores"></div>
    </div>
    <div id="timer"><div id="timerFill"></div></div>
  </div>
  <div id="arena"></div>
</main>
<script>
  const pageUrl = new URL(window.location.href)

  function websocketAddress(path) {
    const address = pageUrl.searchParams.get('address')
    const target = new URL(address || window.location.href, window.location.href)
    if (target.protocol === 'http:') target.protocol = 'ws:'
    if (target.protocol === 'https:') target.protocol = 'wss:'
    if (!address) target.pathname = target.pathname.replace(/\/clients\/player$/, path)
    target.hash = ''
    return target
  }

  const websocketUrl = websocketAddress('/player')

  const status = document.getElementById('status')
  const arena = document.getElementById('arena')
  const playerName = document.getElementById('playerName')
  const scores = document.getElementById('scores')
  const timerFill = document.getElementById('timerFill')
  const colors = ['#2563eb', '#dc2626', '#059669', '#7c3aed']
  const headingSymbols = { up: '↑', down: '↓', left: '←', right: '→', stay: '•' }
  let heading = 'stay'
  let done = false
  let slot = null
  let socket

  function draw(message) {
    slot = message.slot
    playerName.textContent = message.player_names[slot]
    timerFill.style.width = `${Math.max(100 - (message.tick / message.max_ticks) * 100, 0)}%`
    scores.replaceChildren(
      ...message.scores.map((score, scoreSlot) => {
        const scoreEl = document.createElement('div')
        scoreEl.className = 'score'
        scoreEl.style.setProperty('--color', colors[scoreSlot])
        scoreEl.textContent = `${message.player_names[scoreSlot]}: ${score}`
        return scoreEl
      })
    )
    arena.style.gridTemplateColumns = `repeat(${message.width}, 1fr)`
    const agents = new Map(message.positions.map((position, slot) => [`${position[0]},${position[1]}`, slot]))
    const cells = []
    for (let y = 0; y < message.height; y += 1) {
      for (let x = 0; x < message.width; x += 1) {
        const key = `${x},${y}`
        const owner = message.tile_owners[y * message.width + x]
        const cell = document.createElement('div')
        cell.className = 'cell'
        if (owner >= 0) cell.classList.add(`owned-${owner}`)
        if (agents.has(key)) {
          const agentSlot = agents.get(key)
          cell.className = `cell agent owned-${agentSlot} agent-${agentSlot}`
          if (agentSlot === slot) {
            cell.classList.add('you')
            cell.dataset.heading = headingSymbols[heading]
          } else {
            cell.textContent = agentSlot + 1
          }
        }
        cells.push(cell)
      }
    }
    arena.replaceChildren(...cells)
  }

  socket = new WebSocket(websocketUrl)
  socket.onopen = () => {
    status.textContent = 'Connected'
  }
  socket.onmessage = (event) => {
    const message = JSON.parse(event.data)
    draw(message)
    if (!message.started) status.textContent = 'Waiting for other player'
    if (message.started && !message.done) status.textContent = 'Running'
    if (message.done) {
      done = true
      status.textContent = 'Done'
    }
  }
  socket.onclose = () => {
    if (!done) status.textContent = 'Disconnected'
  }

  function sendMove(move) {
    if (socket.readyState !== WebSocket.OPEN) return
    heading = move
    socket.send(JSON.stringify({ move }))
  }

  window.onkeydown = (event) => {
    const moves = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right', ' ': 'stay' }
    if (event.key in moves) {
      event.preventDefault()
      sendMove(moves[event.key])
    }
  }
</script>
