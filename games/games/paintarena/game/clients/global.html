<!doctype html>
<title>Coworld Paint Arena Global Client</title>
<style>
  :root {
    --ink: #172033;
    --muted: #637089;
    --page: #eef2f7;
    --panel: #ffffff;
    --blue: #2563eb;
    --red: #dc2626;
    --green: #059669;
    --violet: #7c3aed;
  }
  * {
    box-sizing: border-box;
  }
  body {
    background: radial-gradient(circle at top left, #ffffff 0, var(--page) 420px);
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    margin: 0;
    min-height: 100vh;
    padding: 28px;
  }
  main {
    display: grid;
    gap: 18px;
    grid-template-columns: minmax(280px, 720px) minmax(220px, 320px);
  }
  h1 {
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1;
    margin: 0 0 6px;
  }
  .eyebrow {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #status {
    background: #172033;
    border-radius: 999px;
    color: white;
    display: inline-flex;
    font-size: 13px;
    font-weight: 800;
    margin-top: 8px;
    padding: 7px 12px;
  }
  #arena {
    background: #d8e0ec;
    border: 1px solid #b8c4d8;
    border-radius: 8px;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.8),
      0 18px 50px rgba(23, 32, 51, 0.12);
    display: grid;
    gap: 3px;
    margin-top: 16px;
    overflow: hidden;
    padding: 6px;
    width: 100%;
  }
  .cell {
    aspect-ratio: 1;
    background: #f8fafc;
    border-radius: 5px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
    position: relative;
  }
  .agent {
    color: white;
    display: grid;
    font-size: 13px;
    font-weight: 900;
    place-items: center;
    text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
  }
  .owned-0 {
    background: #bfdbfe;
  }
  .owned-1 {
    background: #fecaca;
  }
  .owned-2 {
    background: #bbf7d0;
  }
  .owned-3 {
    background: #ddd6fe;
  }
  .agent-0 {
    background: linear-gradient(145deg, #60a5fa, var(--blue));
  }
  .agent-1 {
    background: linear-gradient(145deg, #fb7185, var(--red));
  }
  .agent-2 {
    background: linear-gradient(145deg, #34d399, var(--green));
  }
  .agent-3 {
    background: linear-gradient(145deg, #a78bfa, var(--violet));
  }
  .panel {
    background: color-mix(in srgb, var(--panel) 92%, transparent);
    border: 1px solid rgba(126, 140, 162, 0.35);
    border-radius: 8px;
    box-shadow: 0 18px 50px rgba(23, 32, 51, 0.12);
    padding: 18px;
  }
  .score {
    display: grid;
    gap: 7px;
    margin-top: 12px;
  }
  .score-row {
    display: grid;
    gap: 8px;
    grid-template-columns: 72px 1fr 34px;
    align-items: center;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
  }
  .bar {
    background: #e2e8f0;
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
  }
  .fill {
    border-radius: inherit;
    height: 100%;
  }
  .fill-0 {
    background: var(--blue);
  }
  .fill-1 {
    background: var(--red);
  }
  .fill-2 {
    background: var(--green);
  }
  .fill-3 {
    background: var(--violet);
  }
  pre {
    background: #101827;
    border-radius: 8px;
    color: #d6e2ff;
    font-size: 13px;
    margin: 16px 0 0;
    overflow: auto;
    padding: 14px;
  }
  @media (max-width: 860px) {
    body {
      padding: 18px;
    }
    main {
      grid-template-columns: 1fr;
    }
  }
</style>
<main>
  <section>
    <div class="eyebrow">Live arena</div>
    <h1>Paint Arena</h1>
    <div id="status">Connecting</div>
    <div id="arena"></div>
  </section>
  <aside class="panel">
    <div class="eyebrow">Scoreboard</div>
    <div id="scoreBars" class="score"></div>
    <pre id="scores"></pre>
  </aside>
</main>
<script>
  const pageUrl = new URL(window.location.href)

  function websocketAddress(path) {
    const address = pageUrl.searchParams.get('address')
    const target = new URL(address || window.location.href, window.location.href)
    if (target.protocol === 'http:') target.protocol = 'ws:'
    if (target.protocol === 'https:') target.protocol = 'wss:'
    if (!address) target.pathname = target.pathname.replace(/\/clients\/global$/, path)
    target.hash = ''
    return target
  }

  const websocketUrl = websocketAddress('/global')

  const arena = document.getElementById('arena')
  const status = document.getElementById('status')
  const scoreBars = document.getElementById('scoreBars')
  const scores = document.getElementById('scores')

  function draw(message) {
    arena.style.gridTemplateColumns = `repeat(${message.width}, 1fr)`
    const agents = new Map(message.positions.map((position, slot) => [`${position[0]},${position[1]}`, slot]))
    const cells = []
    for (let y = 0; y < message.height; y += 1) {
      for (let x = 0; x < message.width; x += 1) {
        const key = `${x},${y}`
        const owner = message.tile_owners[y * message.width + x]
        const cell = document.createElement('div')
        cell.className = 'cell'
        if (owner >= 0) cell.classList.add(`owned-${owner}`)
        if (agents.has(key)) {
          const slot = agents.get(key)
          cell.className = `cell agent owned-${slot} agent-${slot}`
          cell.textContent = slot + 1
        }
        cells.push(cell)
      }
    }
    arena.replaceChildren(...cells)
    status.textContent = `${message.done ? 'Done' : 'Running'} tick ${message.tick}/${message.max_ticks}`
    const maxScore = Math.max(...message.scores, 1)
    scoreBars.replaceChildren(
      ...message.scores.map((score, slot) => {
        const row = document.createElement('div')
        const name = document.createElement('span')
        const bar = document.createElement('span')
        const fill = document.createElement('span')
        const value = document.createElement('span')
        row.className = 'score-row'
        name.textContent = message.player_names[slot]
        bar.className = 'bar'
        fill.className = `fill fill-${slot}`
        fill.style.width = `${(score / maxScore) * 100}%`
        value.textContent = score
        bar.append(fill)
        row.append(name, bar, value)
        return row
      })
    )
    scores.textContent = JSON.stringify({ scores: message.scores, paused: message.paused }, null, 2)
  }

  const socket = new WebSocket(websocketUrl)
  socket.onopen = () => {
    status.textContent = 'Connected'
  }
  socket.onmessage = (event) => draw(JSON.parse(event.data))
  socket.onclose = () => {
    status.textContent = 'Disconnected'
  }
</script>
